      grafana_panel_id: "3666116359"
      grafana_variables: environment,type,stage
      promql_query: |
        max by(datname,environment,shard,stage,tier,type) (
          clamp_min(
            clamp_max(
              (
                max without (series) (
                  label_replace(pg_database_wraparound_age_datfrozenxid{environment="{{ $labels.environment }}",stage="{{ $labels.stage }}",type="{{ $labels.type }}"}, "series", "datfrozenxid", "", "")
                  or
                  label_replace(pg_database_wraparound_age_datminmxid{environment="{{ $labels.environment }}",stage="{{ $labels.stage }}",type="{{ $labels.type }}"}, "series", "datminmxid", "", "")
                )
                and on (instance, job) (pg_replication_is_replica{environment="{{ $labels.environment }}",stage="{{ $labels.stage }}",type="{{ $labels.type }}"} == 0)
              )
              /
              (2^31 - 3000000)
              ,
              1)
          ,
          0)
        )
      promql_template_1: |
        max by(datname,environment,shard,stage,tier,type) (
          clamp_min(
            clamp_max(
              (
                max without (series) (
                  label_replace(pg_database_wraparound_age_datfrozenxid{environment="{{ $labels.environment }}",stage="{{ $labels.stage }}",type="{{ $labels.type }}"}, "series", "datfrozenxid", "", "")
                  or
                  label_replace(pg_database_wraparound_age_datminmxid{environment="{{ $labels.environment }}",stage="{{ $labels.stage }}",type="{{ $labels.type }}"}, "series", "datminmxid", "", "")
                )
                and on (instance, job) (pg_replication_is_replica{environment="{{ $labels.environment }}",stage="{{ $labels.stage }}",type="{{ $labels.type }}"} == 0)
              )
              /
              (2^31 - 3000000)
              ,
              1)
          ,
          0)
        )
      runbook: patroni/pg_xid_wraparound_alert/
    labels:
      alert_type: cause
      pager: pagerduty
      rules_domain: general
      severity: s1
    expr: |
      gitlab_component_saturation:ratio{component="pg_xid_wraparound",env="gprd",type="patroni-sec"} > on(component) group_left
      slo:max:hard:gitlab_component_saturation:ratio{component="pg_xid_wraparound"}
  - alert: component_saturation_slo_out_of_bounds:pg_xlog_position_bytes
    for: 5m
    annotations:
      title: The PostgreSQL WAL Generation Rate resource of the {{ $labels.type }}
        service ({{ $labels.stage }} stage) has a saturation exceeding SLO and is
        close to its capacity limit.
      description: |
        This means that this resource is running close to capacity and is at risk of exceeding its current capacity limit.

        Details of the PostgreSQL WAL Generation Rate resource:

        PostgreSQL Write Ahead Log (WAL) generation rate measures how fast the primary database is producing WAL data.

        High WAL generation is a sign of an impending saturation limit with WAL receiver and/or WAL apply on replicas. At high WAL generation rates (approaching 180 MB/s), replicas may not be able to receive and apply the data fast enough to keep up with generation, leading to saturation-induced replication lag.

        High WAL generation could be caused by: - Query pattern changes - Processes modifying large amounts of data - Database maintenance operations - Increased write workload

        Replication lag means the data on the replicas will be stale compared to the data on the primaries. This could lead to: - The load balancer keeping sticky reads on the primary longer (more load on primary) - If replication lag exceeds 2 minutes, all read traffic redirects to primary (even more load on primary) - Potential data loss if an unexpected failover occurs

        On replicas, both CPU and disk IO increase with WAL generation rate, regardless of the content of that WAL data.

        When this threshold is breached, consider: - Investigating what caused the WAL spike using pg_stat_statements_wal_bytes and pg_stat_statements_wal_fpi metrics - Analyzing query patterns and optimizing queries that generate excessive WAL - Reviewing recent database maintenance operations - Monitoring replication lag on replicas
      grafana_dashboard_id: alerts-sat_pg_xlog_position_bytes
      grafana_dashboard_link: https://dashboards.gitlab.net/d/alerts-sat_pg_xlog_position_bytes?from=now-6h/m&to=now-1m/m&var-environment={{
        $labels.environment }}&var-type={{ $labels.type }}&var-stage={{ $labels.stage
        }}
      grafana_datasource_id: mimir-gitlab-gprd
      grafana_min_zoom_hours: "6"
      grafana_panel_id: "3340163867"
      grafana_variables: environment,type,stage
      promql_query: |
        max by(environment,shard,stage,tier,type) (
          clamp_min(
            clamp_max(
              max by (environment,shard,stage,tier,type) (
                rate(pg_xlog_position_bytes{environment="{{ $labels.environment }}",stage="{{ $labels.stage }}",type="{{ $labels.type }}", shard="default"}[5m])
                and on (fqdn) pg_replication_is_replica == 0
              )
              / (180 * 1000000)
              ,
              1)
          ,
          0)
        )
      promql_template_1: |
        max by(environment,shard,stage,tier,type) (
          clamp_min(
            clamp_max(
              max by (environment,shard,stage,tier,type) (
                rate(pg_xlog_position_bytes{environment="{{ $labels.environment }}",stage="{{ $labels.stage }}",type="{{ $labels.type }}", shard="default"}[5m])
                and on (fqdn) pg_replication_is_replica == 0
