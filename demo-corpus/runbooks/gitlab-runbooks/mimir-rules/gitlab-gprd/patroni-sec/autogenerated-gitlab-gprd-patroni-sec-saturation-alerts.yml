          ,
          0)
        )
      promql_template_1: |
        max by(environment,fqdn,shard,stage,tier,type) (
          clamp_min(
            clamp_max(
              (
                node_memory_Active_anon_bytes{environment="{{ $labels.environment }}",stage="{{ $labels.stage }}",type="{{ $labels.type }}"}
