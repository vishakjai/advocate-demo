  - alert: component_saturation_slo_out_of_bounds:pg_wait_sampling_lock_manager
    for: 5m
    annotations:
      title: The PostgreSQL LockManager LWLock Contention resource of the {{ $labels.type
        }} service ({{ $labels.stage }} stage) has a saturation exceeding SLO and
        is close to its capacity limit.
      description: |
        This means that this resource is running close to capacity and is at risk of exceeding its current capacity limit.

        Details of the PostgreSQL LockManager LWLock Contention resource:

        LockManager LWLock contention indicates high contention for PostgreSQL's lock management system.

        This occurs when the number of requested locks entries for the same backend process is higher than 16, which is the value of FP_LOCK_SLOTS_PER_BACKEND, then the lock manager uses the  DEFAULT non–fast path lock method. PostgreSQL. High LockManager contention can indicate issues such as: - A large number of concurrent active sessions are accessing a table with many partitions and/or with many indexes; - The database is experiencing a connection storm due to slow queries response time; - A large number of sessions query a parent table without pruning partitions. - A data definition language (DDL), data manipulation language (DML), or a maintenance command exclusively locks either a busy relation or tuples that are frequently accessed or modified.

        This metric uses the pg_wait_sampling extension to provide high-frequency sampling of wait events for more accurate monitoring than traditional pg_stat_activity sampling.

        When this threshold is breached, consider: - Adding another replica to spread workload - Analyzing which queries are driving lock spike, and consider:   - reducing number of indexes on the affected tables (any unused index should be dropped immediately);   - tune the query to scan a smaller set of partitions, by using partition pruning;   - tune queries for fast path locking (try to reduce number of relations per query to fewer than 16) - Reduce hardware bottlenecks; - Tune for regular `Lock` wait events, eg. `Lock:Relation`, `Lock:transactionid` or `Lock:tuple`. If the preceding events appear high in the list, consider tuning these wait events first. These events can be a driver for `LWLock:lock_manager`.
      grafana_dashboard_id: alerts-sat_pg_wait_lock_manager
      grafana_dashboard_link: https://dashboards.gitlab.net/d/alerts-sat_pg_wait_lock_manager?from=now-6h/m&to=now-1m/m&var-environment={{
