      description: |
        This means that this resource is running close to capacity and is at risk of exceeding its current capacity limit.

        Details of the PostgreSQL BufferMapping LWLock Contention resource:

        BufferMapping LWLock contention indicates PostgreSQL's shared buffer pool is thrashing.

        This occurs when the workload's working set no longer fits well into the pool of shared buffers, causing frequent evictions that severely degrade query performance. The instance-wide bottleneck becomes contention for the BufferMapping LWLocks, which mediate evicting pages from shared buffers.

        This metric uses the pg_wait_sampling extension to provide high-frequency sampling of wait events for more accurate monitoring than traditional pg_stat_activity sampling.

        When this threshold is breached, consider: - Reducing query concurrency per PostgreSQL instance - Adding another replica to spread workload - Tuning queries to reduce buffer usage - Analyzing which queries are driving buffer churn
      grafana_dashboard_id: alerts-sat_pg_wait_buffer_mapping
      grafana_dashboard_link: https://dashboards.gitlab.net/d/alerts-sat_pg_wait_buffer_mapping?from=now-6h/m&to=now-1m/m&var-environment={{
