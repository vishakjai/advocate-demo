                  rate(pg_wait_sampling_agg_count{environment="{{ $labels.environment }}",stage="{{ $labels.stage }}",type="{{ $labels.type }}", shard="default", wait_type="LWLock", wait_event="BufferMapping"}[5m])
                  /
