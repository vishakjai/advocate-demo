          ,
          0)
        )
      runbook: '{{ $labels.type }}/'
    labels:
      alert_type: cause
      pager: pagerduty
      rules_domain: general
      severity: s2
    expr: |
      gitlab_component_saturation:ratio{component="pg_xlog_position_bytes",env="gprd",type="patroni-sec"} > on(component) group_left
      slo:max:hard:gitlab_component_saturation:ratio{component="pg_xlog_position_bytes"}
