                  rate(pg_wait_sampling_agg_count{environment="{{ $labels.environment }}",stage="{{ $labels.stage }}",type="{{ $labels.type }}", shard="default", wait_type="LWLock", wait_event="LockManager"}[5m])
                  /
                  on (fqdn) group_left() (sum(pg_stat_activity_count{environment="{{ $labels.environment }}",stage="{{ $labels.stage }}",type="{{ $labels.type }}", datname="gitlabhq_production", shard="default", state!~'idle.*'}) by (fqdn) * 100)
                )
              )
              ,
              1)
          ,
          0)
        )
      promql_template_1: |
        max by(environment,shard,stage,tier,type,wait_event) (
          clamp_min(
            clamp_max(
              (
                max by (environment,shard,stage,tier,type,wait_event) (
                  rate(pg_wait_sampling_agg_count{environment="{{ $labels.environment }}",stage="{{ $labels.stage }}",type="{{ $labels.type }}", shard="default", wait_type="LWLock", wait_event="LockManager"}[5m])
                  /
                  on (fqdn) group_left() (sum(pg_stat_activity_count{environment="{{ $labels.environment }}",stage="{{ $labels.stage }}",type="{{ $labels.type }}", datname="gitlabhq_production", shard="default", state!~'idle.*'}) by (fqdn) * 100)
                )
              )
              ,
              1)
          ,
          0)
        )
      runbook: '{{ $labels.type }}/'
    labels:
      alert_type: cause
      pager: pagerduty
      rules_domain: general
      severity: s2
    expr: |
      gitlab_component_saturation:ratio{component="pg_wait_sampling_lock_manager",env="gprd",type="patroni-sec"} > on(component) group_left
