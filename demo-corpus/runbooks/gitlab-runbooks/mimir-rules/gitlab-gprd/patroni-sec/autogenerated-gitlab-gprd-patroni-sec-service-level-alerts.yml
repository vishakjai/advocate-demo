      gitlab_component_ops:rate_30m{component="transactions_replica",env="gprd",monitor="global",stage="main",type="patroni-sec"} == 0
      and
      gitlab_component_ops:rate_30m{component="transactions_replica",env="gprd",monitor="global",stage="main",type="patroni-sec"} offset 1h >= 0.16666666666666666
  - alert: PatroniSecServiceTransactionsReplicaTrafficAbsent
    for: 30m
    annotations:
      title: The transactions_replica SLI of the patroni-sec service (`{{ $labels.stage
        }}` stage) has not reported any traffic in the past 30m
      description: |
        Represents all SQL transactions issued to replica Postgres instances, in aggregate. Errors represent transaction rollbacks.

        This alert signifies that the SLI was previously reporting traffic, but is no longer - the signal is absent.

        This could be caused by a change to the metrics used in the SLI, or by the service not receiving traffic.
      grafana_dashboard_id: patroni-sec-main/patroni-sec-overview
      grafana_dashboard_link: https://dashboards.gitlab.net/d/patroni-sec-main/patroni-sec-overview?from=now-6h/m&to=now-1m/m&var-environment={{
        $labels.environment }}&var-stage={{ $labels.stage }}
      grafana_datasource_id: mimir-gitlab-gprd
      grafana_min_zoom_hours: "6"
      grafana_panel_id: "1864411224"
      grafana_variables: environment,stage
      promql_template_1: |
        sum by (env,environment,tier,stage) (
          label_replace(rate(pg_stat_database_xact_commit{environment="{{ $labels.environment }}",stage="{{ $labels.stage }}",tier="db",type="patroni-sec"}[5m]) and on (fqdn) (pg_replication_is_replica == 1), "_c", "0", "", "")
          or
          label_replace(rate(pg_stat_database_xact_rollback{environment="{{ $labels.environment }}",stage="{{ $labels.stage }}",tier="db",type="patroni-sec"}[5m]) and on (fqdn) (pg_replication_is_replica == 1), "_c", "1", "", "")
        )
      runbook: patroni-sec/#alerts
    labels:
      aggregation: component
      alert_class: traffic_cessation
      alert_type: cause
      feature_category: not_owned
      pager: pagerduty
      rules_domain: general
      severity: s2
      sli_type: ops
      slo_alert: "no"
      user_impacting: "yes"
    expr: |
      gitlab_component_ops:rate_5m{component="transactions_replica",env="gprd",monitor="global",stage="main",type="patroni-sec"} offset 1h
      unless
      gitlab_component_ops:rate_5m{component="transactions_replica",env="gprd",monitor="global",stage="main",type="patroni-sec"}
