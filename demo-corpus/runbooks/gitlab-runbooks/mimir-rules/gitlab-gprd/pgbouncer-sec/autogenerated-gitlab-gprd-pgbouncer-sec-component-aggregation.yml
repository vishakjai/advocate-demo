# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/mimir-aggregations.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'Global SLI Metrics: pgbouncer-sec - Burn-Rate 5m'
  interval: 1m
  rules:
  - record: gitlab_component_ops:rate_5m
    labels:
      component: service
      monitor: global
      stage: main
      tier: db
      type: pgbouncer-sec
    expr: |
      sum by (env,environment) (
        label_replace(rate(pgbouncer_stats_sql_transactions_pooled_total{env="gprd",tier="db",type="pgbouncer-sec"}[5m]), "_c", "0", "", "")
        or
        label_replace(rate(pgbouncer_stats_queries_pooled_total{env="gprd",tier="db",type="pgbouncer-sec"}[5m]), "_c", "1", "", "")
      )
  - record: gitlab_component_errors:rate_5m
    labels:
      component: service
      monitor: global
      stage: main
      tier: db
      type: pgbouncer-sec
    expr: |
      (
        sum by (env,environment) (
          sli_aggregations:pgbouncer_pooler_errors_total:rate_5m{env="gprd",tier="db",type="pgbouncer-sec"}
        )
      )
      or
      (
        0 * group by(env,environment) (
          gitlab_component_ops:rate_5m{component="service",env="gprd",monitor="global",stage="main",tier="db",type="pgbouncer-sec"}
        )
      )
  - record: gitlab_component_errors:ratio_5m
    labels:
      component: service
      monitor: global
      tier: db
      type: pgbouncer-sec
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_errors:rate_5m{component="service",env="gprd",monitor="global",tier="db",type="pgbouncer-sec"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_ops:rate_5m{component="service",env="gprd",monitor="global",tier="db",type="pgbouncer-sec"}
      )
  - record: gitlab_component_apdex:ratio_5m
    labels:
      component: service
      monitor: global
      tier: db
      type: pgbouncer-sec
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_apdex:success:rate_5m{component="service",env="gprd",monitor="global",tier="db",type="pgbouncer-sec"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_apdex:weight:score_5m{component="service",env="gprd",monitor="global",tier="db",type="pgbouncer-sec"}
      )
