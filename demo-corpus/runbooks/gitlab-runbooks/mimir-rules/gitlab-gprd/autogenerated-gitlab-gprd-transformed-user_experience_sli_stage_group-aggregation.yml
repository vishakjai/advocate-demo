# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: Stage Group User Experience SLI Metrics (fast burn)
  interval: 1m
  rules:
  - record: gitlab:user_experience_sli:stage_groups:error:rate_5m
    expr: |
      sum by (env,stage,stage_group,product_stage,user_experience_id,feature_category,urgency) (
        (gitlab:user_experience_sli:error:rate_5m{env="gprd"} >= 0) * on(feature_category) group_left(product_stage,stage_group) (group by (feature_category,product_stage,stage_group) (gitlab:feature_category:stage_group:mapping{}))
      )
  - record: gitlab:user_experience_sli:stage_groups:ops:rate_5m
    expr: |
      sum by (env,stage,stage_group,product_stage,user_experience_id,feature_category,urgency) (
        (gitlab:user_experience_sli:ops:rate_5m{env="gprd"} >= 0) * on(feature_category) group_left(product_stage,stage_group) (group by (feature_category,product_stage,stage_group) (gitlab:feature_category:stage_group:mapping{}))
      )
  - record: gitlab:user_experience_sli:stage_groups:error:ratio_5m
    expr: |
      sum by (env,stage,stage_group,product_stage,user_experience_id,feature_category,urgency)(
        (gitlab:user_experience_sli:error:rate_5m{env="gprd"} >= 0) * on(feature_category) group_left(product_stage,stage_group) (group by (feature_category,product_stage,stage_group) (gitlab:feature_category:stage_group:mapping{}))
      )
      /
      sum by (env,stage,stage_group,product_stage,user_experience_id,feature_category,urgency)(
        (gitlab:user_experience_sli:ops:rate_5m{env="gprd"} >= 0) * on(feature_category) group_left(product_stage,stage_group) (group by (feature_category,product_stage,stage_group) (gitlab:feature_category:stage_group:mapping{}))
        and
        (gitlab:user_experience_sli:error:rate_5m{env="gprd"} >= 0) * on(feature_category) group_left(product_stage,stage_group) (group by (feature_category,product_stage,stage_group) (gitlab:feature_category:stage_group:mapping{}))
