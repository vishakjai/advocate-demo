# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/saturation.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: Saturation Rules (autogenerated)
  interval: 1m
  rules:
  - record: gitlab_component_saturation:ratio
    labels:
      component: elastic_cpu
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            avg by (env,environment,shard,stage,tier,type) (
              avg_over_time(elasticsearch_process_cpu_percent{env="gprd",type="logging"}[1m]) / 100
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: elastic_disk_space
    expr: |
      max by(env,environment,role,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            1 - (
              sum by (env,environment,role,shard,stage,tier,type) (
                elasticsearch_filesystem_data_free_bytes{env="gprd",type="logging"}
                * on (name, cluster) group_left(role) (elasticsearch_nodes_roles{role=~"data_.*", role!~"data_(frozen|content)", env="gprd",type="logging"} == 1)
              )
              / ignoring(role) group_left()
              sum by (env,environment,role,shard,stage,tier,type) (
                elasticsearch_filesystem_data_size_bytes{env="gprd",type="logging"}
              )
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: elastic_jvm_heap_memory
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            elasticsearch_jvm_memory_used_bytes{area="heap", env="gprd",type="logging"}
            /
            elasticsearch_jvm_memory_max_bytes{area="heap", env="gprd",type="logging"}
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: elastic_single_node_cpu
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            avg_over_time(elasticsearch_process_cpu_percent{env="gprd",type="logging"}[5m]) / 100
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: elastic_single_node_disk_space
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            (
              (
                elasticsearch_filesystem_data_size_bytes{env="gprd",type="logging"}
                -
                elasticsearch_filesystem_data_free_bytes{env="gprd",type="logging"}
              )
              /
              elasticsearch_filesystem_data_size_bytes{env="gprd",type="logging"}
              * on (name, cluster) group_left(role) (elasticsearch_nodes_roles{role=~"data_.*", role!~"data_(frozen|content)", env="gprd",type="logging"} == 1)
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: elastic_thread_pools
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            (
              avg_over_time(elasticsearch_thread_pool_active_count{exported_type!~"snapshot|force_merge|inference_utility|searchable_snapshots_cache_prewarming", env="gprd",type="logging"}[5m])
              /
              (avg_over_time(elasticsearch_thread_pool_threads_count{exported_type!~"snapshot|force_merge|inference_utility|searchable_snapshots_cache_prewarming", env="gprd",type="logging"}[5m]) > 0)
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: kube_container_cpu
    expr: |
      quantile by(env,environment,shard,stage,tier,type) (
        0.99,
        clamp_min(
          clamp_max(
            (
              sum by (container,env,environment,pod,shard,stage,tier,type) (
                rate(container_cpu_usage_seconds_total:labeled{container!="", container!="POD", env="gprd",type="logging"}[1h])
                unless on(pod) (
                  kube_pod_labels:labeled{label_gitlab_com_exclude_saturation_point=~"(^|.*[.])kube_container_cpu_request([.].*|$)", env="gprd",type="logging"}
                )
              )
              unless on(container,env,environment,pod,shard,stage,tier,type) (
                last_over_time(container_spec_cpu_quota:labeled{container!="", container!="POD", env="gprd",type="logging"}[1h])
              )
            )
            /
            sum by(container,env,environment,pod,shard,stage,tier,type) (
              kube_pod_container_resource_requests:labeled{container!="", container!="POD", resource="cpu", env="gprd",type="logging"}
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: kube_container_cpu_limit
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            sum by (container,env,environment,pod,shard,stage,tier,type) (
              rate(container_cpu_usage_seconds_total:labeled{container!="", container!="POD", env="gprd",type="logging"}[5m])
              unless on(pod) (
                kube_pod_labels:labeled{label_gitlab_com_exclude_saturation_point=~"(^|.*[.])kube_container_cpu_limit([.].*|$)", env="gprd",type="logging"}
              )
            )
            /
            sum by(container,env,environment,pod,shard,stage,tier,type) (
              container_spec_cpu_quota:labeled{container!="", container!="POD", env="gprd",type="logging"}
              /
              container_spec_cpu_period:labeled{container!="", container!="POD", env="gprd",type="logging"}
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: kube_container_memory_limit
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            (
              container_memory_working_set_bytes:labeled{container!="", container!="POD", env="gprd",type="logging"}
              unless on(pod) (
                kube_pod_labels:labeled{label_gitlab_com_exclude_saturation_point=~"(^|.*[.])kube_container_memory_limit([.].*|$)", env="gprd",type="logging"}
              )
            )
            / on(container,deployment,env,environment,pod,shard,stage,tier,type) group_left()
            max by(container,deployment,env,environment,pod,shard,stage,tier,type) (
              kube_pod_container_resource_limits:labeled{container!="", resource="memory", env="gprd",type="logging"} > 0
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: kube_container_memory_request
    expr: |
      quantile by(env,environment,shard,stage,tier,type) (
        0.99,
        clamp_min(
          clamp_max(
            (
              container_memory_working_set_bytes:labeled{container!="", container!="POD", env="gprd",type="logging"}
              unless on(pod) (
                kube_pod_labels:labeled{label_gitlab_com_exclude_saturation_point=~"(^|.*[.])kube_container_memory_request([.].*|$)", env="gprd",type="logging"}
              )
            )
            / on(container,deployment,env,environment,pod,shard,stage,tier,type) group_left()
            max by(container,deployment,env,environment,pod,shard,stage,tier,type) (
              kube_pod_container_resource_requests:labeled{container!="", resource="memory", env="gprd",type="logging"} > 0
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: kube_container_throttling
    expr: |
      quantile by(env,environment,shard,stage,tier,type) (
        0.99,
        clamp_min(
          clamp_max(
            # This doesn't really aggregate anything as `pod` is one of the resource labels and there's only one series
            max by (container,env,environment,pod,shard,stage,tier,type)(
              rate(container_cpu_cfs_throttled_seconds_total:labeled{container!="", env="gprd",type="logging"}[5m])
              unless on(pod) (
                kube_pod_labels:labeled{label_gitlab_com_exclude_saturation_point=~"(^|.*[.])kube_container_throttling([.].*|$)", env="gprd",type="logging"}
              )
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: kube_horizontalpodautoscaler_desired_replicas
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            kube_horizontalpodautoscaler_status_desired_replicas:labeled{env="gprd",type="logging", shard!~"database-throttled|elasticsearch|gitaly-throttled|urgent-authorized-projects", namespace!~"pubsubbeat"}
            /
            kube_horizontalpodautoscaler_spec_max_replicas:labeled{env="gprd",type="logging", shard!~"database-throttled|elasticsearch|gitaly-throttled|urgent-authorized-projects", namespace!~"pubsubbeat"}
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: open_fds
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            (
              process_open_fds{env="gprd",type="logging"}
              /
              process_max_fds{env="gprd",type="logging"}
            )
            or
            (
              ruby_file_descriptors{env="gprd",type="logging"}
              /
              ruby_process_max_fds{env="gprd",type="logging"}
            )
            or
            (
              node_filefd_allocated{env="gprd",type="logging"}
              /
              node_filefd_maximum{env="gprd",type="logging"}
            )
            ,
            1)
        ,
        0)
      )
