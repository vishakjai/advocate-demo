# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/saturation.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: GitLab Component Saturation Statistics
  interval: 5m
  rules:
  - record: gitlab_component_saturation:ratio_quantile95_1w
    expr: quantile_over_time(0.95, gitlab_component_saturation:ratio{env="gprd",type="memorystore-redis-tracechunks"}[1w])
  - record: gitlab_component_saturation:ratio_quantile99_1w
    expr: quantile_over_time(0.99, gitlab_component_saturation:ratio{env="gprd",type="memorystore-redis-tracechunks"}[1w])
  - record: gitlab_component_saturation:ratio_quantile95_1h
    expr: quantile_over_time(0.95, gitlab_component_saturation:ratio{env="gprd",type="memorystore-redis-tracechunks"}[1h])
  - record: gitlab_component_saturation:ratio_quantile99_1h
    expr: quantile_over_time(0.99, gitlab_component_saturation:ratio{env="gprd",type="memorystore-redis-tracechunks"}[1h])
  - record: gitlab_component_saturation:ratio_avg_1h
    expr: avg_over_time(gitlab_component_saturation:ratio{env="gprd",type="memorystore-redis-tracechunks"}[1h])
- name: GitLab Saturation Alerts
  interval: 1m
  rules:
  - alert: component_saturation_slo_out_of_bounds:memorystore_redis_cpu
    for: 5m
    annotations:
      title: The Memorystore CPU Utilization resource of the {{ $labels.type }} service
        ({{ $labels.stage }} stage) has a saturation exceeding SLO and is close to
        its capacity limit.
      description: |
        This means that this resource is running close to capacity and is at risk of exceeding its current capacity limit.

        Details of the Memorystore CPU Utilization resource:

        Memorystore Redis CPU utilization.

        See https://cloud.google.com/memorystore/docs/redis/general-best-practices#cpu_usage_best_practices for more details
      grafana_dashboard_id: alerts-sat_memorystore_redis_cpu
      grafana_dashboard_link: https://dashboards.gitlab.net/d/alerts-sat_memorystore_redis_cpu?from=now-6h/m&to=now-1m/m&var-environment={{
        $labels.environment }}&var-type={{ $labels.type }}&var-stage={{ $labels.stage
        }}
      grafana_datasource_id: mimir-gitlab-gprd
      grafana_min_zoom_hours: "6"
      grafana_panel_id: "961599757"
      grafana_variables: environment,type,stage
      promql_query: |
        max by(environment,shard,type) (
          clamp_min(
            clamp_max(
              sum by (environment,shard,type)
              (
                stackdriver_redis_instance_redis_googleapis_com_stats_cpu_utilization_main_thread{environment="{{ $labels.environment }}",type="{{ $labels.type }}", role='primary'}
              ) / 60
              ,
              1)
          ,
          0)
        )
      promql_template_1: |
        max by(environment,shard,type) (
          clamp_min(
            clamp_max(
              sum by (environment,shard,type)
              (
                stackdriver_redis_instance_redis_googleapis_com_stats_cpu_utilization_main_thread{environment="{{ $labels.environment }}",type="{{ $labels.type }}", role='primary'}
              ) / 60
              ,
              1)
          ,
          0)
        )
      runbook: '{{ $labels.type }}/'
    labels:
      alert_type: cause
      rules_domain: general
      severity: s4
    expr: |
      gitlab_component_saturation:ratio{component="memorystore_redis_cpu",env="gprd",type="memorystore-redis-tracechunks"} > on(component) group_left
      slo:max:hard:gitlab_component_saturation:ratio{component="memorystore_redis_cpu"}
  - alert: component_saturation_slo_out_of_bounds:memorystore_redis_memory_tracechunks
    for: 5m
    annotations:
      title: The Memorystore Memory Utilization resource of the {{ $labels.type }}
        service ({{ $labels.stage }} stage) has a saturation exceeding SLO and is
        close to its capacity limit.
      description: |
        This means that this resource is running close to capacity and is at risk of exceeding its current capacity limit.

        Details of the Memorystore Memory Utilization resource:

        Memorystore Redis memory utilization.

        As Redis memory saturates node memory, the likelyhood of OOM kills, possibly to the Redis process, become more likely.

        Trace chunks should be extremely transient (written to redis, then offloaded to objectstorage nearly immediately) so any uncontrolled growth in memory saturation implies a potentially significant problem.  Short term mitigation is usually to upsize the instances to have more memory while the underlying problem is identified, but low thresholds give us more time to investigate first

        This threshold is kept deliberately very low; because we use C2 instances we are generally overprovisioned for RAM, and because of the transient nature of the data here, it is advantageous to know early if there is any non-trivial storage occurring

        See https://cloud.google.com/memorystore/docs/redis/monitor-instances#create-stackdriver-alert
      grafana_dashboard_id: alerts-sat_redis_memory_tracechunk
      grafana_dashboard_link: https://dashboards.gitlab.net/d/alerts-sat_redis_memory_tracechunk?from=now-6h/m&to=now-1m/m&var-environment={{
        $labels.environment }}&var-type={{ $labels.type }}&var-stage={{ $labels.stage
        }}
      grafana_datasource_id: mimir-gitlab-gprd
      grafana_min_zoom_hours: "6"
      grafana_panel_id: "1681353625"
      grafana_variables: environment,type,stage
      promql_query: |
        max by(environment,shard,type) (
          clamp_min(
            clamp_max(
              max by (environment,shard,type) (
                stackdriver_redis_instance_redis_googleapis_com_stats_memory_usage_ratio{environment="{{ $labels.environment }}",type="{{ $labels.type }}", role = "primary"}
              )
              ,
              1)
          ,
          0)
        )
      promql_template_1: |
        max by(environment,shard,type) (
          clamp_min(
            clamp_max(
              max by (environment,shard,type) (
                stackdriver_redis_instance_redis_googleapis_com_stats_memory_usage_ratio{environment="{{ $labels.environment }}",type="{{ $labels.type }}", role = "primary"}
              )
              ,
              1)
          ,
          0)
        )
      runbook: '{{ $labels.type }}/'
    labels:
      alert_type: cause
      pager: pagerduty
      rules_domain: general
      severity: s2
    expr: |
      gitlab_component_saturation:ratio{component="memorystore_redis_memory_tracechunks",env="gprd",type="memorystore-redis-tracechunks"} > on(component) group_left
      slo:max:hard:gitlab_component_saturation:ratio{component="memorystore_redis_memory_tracechunks"}
  - alert: component_saturation_slo_out_of_bounds:memorystore_system_memory
    for: 5m
    annotations:
      title: The Memorystore System Memory Utilization resource of the {{ $labels.type
        }} service ({{ $labels.stage }} stage) has a saturation exceeding SLO and
        is close to its capacity limit.
      description: |
        This means that this resource is running close to capacity and is at risk of exceeding its current capacity limit.

        Details of the Memorystore System Memory Utilization resource:

        Memorystore Redis system memory utilization.

        See https://cloud.google.com/memorystore/docs/redis/monitor-instances#system-memory-stackdriver-alert
      grafana_dashboard_id: alerts-sat_memorystore_system_memory
      grafana_dashboard_link: https://dashboards.gitlab.net/d/alerts-sat_memorystore_system_memory?from=now-6h/m&to=now-1m/m&var-environment={{
        $labels.environment }}&var-type={{ $labels.type }}&var-stage={{ $labels.stage
        }}
      grafana_datasource_id: mimir-gitlab-gprd
      grafana_min_zoom_hours: "6"
      grafana_panel_id: "1301495176"
      grafana_variables: environment,type,stage
      promql_query: |
        max by(environment,shard,type) (
          clamp_min(
            clamp_max(
              max by (environment,shard,type) (
                stackdriver_redis_instance_redis_googleapis_com_stats_memory_system_memory_usage_ratio{environment="{{ $labels.environment }}",type="{{ $labels.type }}", role = "primary"}
              )
              ,
              1)
          ,
          0)
        )
      promql_template_1: |
        max by(environment,shard,type) (
          clamp_min(
            clamp_max(
              max by (environment,shard,type) (
                stackdriver_redis_instance_redis_googleapis_com_stats_memory_system_memory_usage_ratio{environment="{{ $labels.environment }}",type="{{ $labels.type }}", role = "primary"}
              )
              ,
              1)
          ,
          0)
        )
      runbook: '{{ $labels.type }}/'
    labels:
      alert_type: cause
      rules_domain: general
      severity: s4
    expr: |
      gitlab_component_saturation:ratio{component="memorystore_system_memory",env="gprd",type="memorystore-redis-tracechunks"} > on(component) group_left
      slo:max:hard:gitlab_component_saturation:ratio{component="memorystore_system_memory"}
  - alert: component_saturation_slo_out_of_bounds:open_fds
    for: 5m
    annotations:
      title: The Open file descriptor utilization per instance resource of the {{
        $labels.type }} service ({{ $labels.stage }} stage) has a saturation exceeding
        SLO and is close to its capacity limit.
      description: |
        This means that this resource is running close to capacity and is at risk of exceeding its current capacity limit.

        Details of the Open file descriptor utilization per instance resource:

        Open file descriptor utilization per instance.

        Saturation on file descriptor limits may indicate a resource-descriptor leak in the application.

        As a temporary fix, you may want to consider restarting the affected process.
      grafana_dashboard_id: alerts-sat_open_fds
      grafana_dashboard_link: https://dashboards.gitlab.net/d/alerts-sat_open_fds?from=now-6h/m&to=now-1m/m&var-environment={{
        $labels.environment }}&var-type={{ $labels.type }}&var-stage={{ $labels.stage
        }}
      grafana_datasource_id: mimir-gitlab-gprd
      grafana_min_zoom_hours: "6"
      grafana_panel_id: "1001792825"
      grafana_variables: environment,type,stage
      promql_query: |
        max by(environment,instance,job,shard,stage,tier,type) (
          clamp_min(
            clamp_max(
              (
                process_open_fds{environment="{{ $labels.environment }}",stage="{{ $labels.stage }}",type="{{ $labels.type }}"}
                /
                process_max_fds{environment="{{ $labels.environment }}",stage="{{ $labels.stage }}",type="{{ $labels.type }}"}
              )
              or
              (
                ruby_file_descriptors{environment="{{ $labels.environment }}",stage="{{ $labels.stage }}",type="{{ $labels.type }}"}
                /
                ruby_process_max_fds{environment="{{ $labels.environment }}",stage="{{ $labels.stage }}",type="{{ $labels.type }}"}
              )
              or
              (
                node_filefd_allocated{environment="{{ $labels.environment }}",stage="{{ $labels.stage }}",type="{{ $labels.type }}"}
                /
                node_filefd_maximum{environment="{{ $labels.environment }}",stage="{{ $labels.stage }}",type="{{ $labels.type }}"}
              )
              ,
              1)
          ,
          0)
        )
      promql_template_1: |
        max by(environment,instance,job,shard,stage,tier,type) (
          clamp_min(
            clamp_max(
              (
                process_open_fds{environment="{{ $labels.environment }}",stage="{{ $labels.stage }}",type="{{ $labels.type }}"}
                /
                process_max_fds{environment="{{ $labels.environment }}",stage="{{ $labels.stage }}",type="{{ $labels.type }}"}
              )
              or
              (
                ruby_file_descriptors{environment="{{ $labels.environment }}",stage="{{ $labels.stage }}",type="{{ $labels.type }}"}
                /
                ruby_process_max_fds{environment="{{ $labels.environment }}",stage="{{ $labels.stage }}",type="{{ $labels.type }}"}
              )
              or
              (
                node_filefd_allocated{environment="{{ $labels.environment }}",stage="{{ $labels.stage }}",type="{{ $labels.type }}"}
                /
                node_filefd_maximum{environment="{{ $labels.environment }}",stage="{{ $labels.stage }}",type="{{ $labels.type }}"}
              )
              ,
              1)
          ,
          0)
        )
      runbook: '{{ $labels.type }}/'
    labels:
      alert_type: cause
      pager: pagerduty
      rules_domain: general
      severity: s2
    expr: |
      gitlab_component_saturation:ratio{component="open_fds",env="gprd",type="memorystore-redis-tracechunks"} > on(component) group_left
      slo:max:hard:gitlab_component_saturation:ratio{component="open_fds"}
