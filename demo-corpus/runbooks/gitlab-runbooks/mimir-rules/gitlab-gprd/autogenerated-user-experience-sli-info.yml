# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/user-experience-sli-info.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: User Experience SLI absent
  interval: 1m
  rules:
  - record: gitlab:user_experience_sli:info
    labels:
      urgency: async_fast
      user_experience_id: create_merge_request
    expr: |
      vector(1) * on() group_left(feature_category, stage_group, product_stage)
      gitlab:feature_category:stage_group:mapping{feature_category="code_review_workflow"}
  - record: gitlab:user_experience_sli:info
    labels:
      urgency: sync_fast
      user_experience_id: load_comments
    expr: |
      vector(1) * on() group_left(feature_category, stage_group, product_stage)
      gitlab:feature_category:stage_group:mapping{feature_category="team_planning"}
