# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/sli_aggregations.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'SLI Aggregations: redis - primary_server - 5m burn-rate'
  interval: 1m
  rules:
  - record: sli_aggregations:redis_commands_processed_total:rate_5m
    expr: |
      sum by (component,env,environment,feature_category,fqdn,instance,product_stage,region,shard,stage,stage_group,tier,type) (
        rate(redis_commands_processed_total{env="gprd",type=~"redis"}[5m])
      )
- name: 'SLI Aggregations: redis - primary_server - 30m burn-rate'
  interval: 2m
  rules:
  - record: sli_aggregations:redis_commands_processed_total:rate_30m
    expr: |
      sum by (component,env,environment,feature_category,fqdn,instance,product_stage,region,shard,stage,stage_group,tier,type) (
        rate(redis_commands_processed_total{env="gprd",type=~"redis"}[30m])
      )
- name: 'SLI Aggregations: redis - primary_server - 1h burn-rate'
  interval: 1m
  rules:
  - record: sli_aggregations:redis_commands_processed_total:rate_1h
    expr: |
      sum by (component,env,environment,feature_category,fqdn,instance,product_stage,region,shard,stage,stage_group,tier,type) (
        rate(redis_commands_processed_total{env="gprd",type=~"redis"}[1h])
      )
