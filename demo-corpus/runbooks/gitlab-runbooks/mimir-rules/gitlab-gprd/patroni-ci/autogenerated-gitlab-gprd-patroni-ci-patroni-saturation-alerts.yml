# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/patroni-saturation-alerts.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: patroni_saturation_alerts
  rules:
  - alert: PrimaryDatabaseCPUSaturation
    for: 1s
    annotations:
      title: Primary Database Node CPU Saturation
      description: The CPU pressure on the `{{ $labels.type }}` primary database node
        is over three standard deviations above average.
      grafana_dashboard_link: https://dashboards.gitlab.net/d/postgres-ai-NEW_postgres_ai_04/cfd803b?from=now-6h&to=now&timezone=utc&var-prometheus=mimir-gitlab-gprd&var-environment={{
        $labels.environment }}&var-type={{ $labels.type }}&var-wait_type=$__all&var-wait_event=$__all
      grafana_variables: environment,type
      runbook: patroni/primary_db_node_cpu_saturation/
    labels:
      alert_type: cause
      severity: s3
      team: verify
    expr: |
      (
        (
            (max_over_time(rate(node_pressure_cpu_waiting_seconds_total{env="gprd",type="patroni-ci"}[5m])[60m:]) >= 0.01)
            -
            avg_over_time(rate(node_pressure_cpu_waiting_seconds_total{env="gprd",type="patroni-ci"}[5m])[1d:])
        ) /
        stddev_over_time(rate(node_pressure_cpu_waiting_seconds_total{env="gprd",type="patroni-ci"}[5m])[1d:])
        and on (fqdn) (pg_replication_is_replica == 0)
      ) > 3
  - alert: PrimaryDatabaseWALGenerationSaturationSustainedOver150MBS
    for: 1s
    annotations:
      title: Sustained Primary Database WAL Generation over 150mb/s on {{ $labels.type
        }} cluster
      description: |
        This alert means Postgres Write Ahead Log (WAL) Generation is exceeding 150 MB/s (over [5m]) on the primary server of the {{ $labels.type }} cluster. High WAL Generation could be caused by many things; query pattern changes, processes modifying large amounts of data, database maintenance etc. Also this is a saturation metric which we will slowly tip toe up to over time, and without other invention this alert will page more frequently as we run out of headroom. High WAL Generation is sign of an impending saturation limit with WAL Receiver and/or WAL apply. We theorize that at 150 MB/s (over [5m]) WAL Generation the replicas will not be able to receive and apply the data fast enough to keep up with generation leading to saturation-induced replication lag. Replication lag means the data on the replicas will be stale compared to the data on the primaries. This could lead to the loadbalancer keeping sticky reads on the primary longer (more load on primary) or if the replication lag gets older than 2 minutes the loadbalancer will redirect all read traffic to primary (even more load on primary). Finally, there could be data loss if an unexpected failover was to occur. Its also worth noting that on the replicas both CPU and disk IO increases with WAL Generation rate, regardless of the content of that WAL data. The recipient should investigate what could have caused the WAL spike, and whether the spike is a early warning sign of an impending saturation limit with WAL Receiver and/or WAL apply.
      runbook: patroni/primary_db_node_wal_generation_saturation/
    labels:
      alert_type: cause
      severity: s3
      team: verify
    expr: |
      rate(pg_xlog_position_bytes{env="gprd",type="patroni-ci"}[5m]) > (150 * 1024 * 1024)
      and on (fqdn)
      pg_replication_is_replica == 0
  - alert: PrimaryDatabaseWALGenerationSaturationSpike
    for: 1s
    annotations:
      title: Primary Database WAL Generation Spike on {{ $labels.type }} cluster
      description: |
        This alert means Postgres Write Ahead Log (WAL) Generation has had a spike on the primary server of the {{ $labels.type }} cluster. High WAL Generation could be caused by many things; query pattern changes, processes modifying large amounts of data, database maintenance etc. Also this is a saturation metric which we will slowly tip toe up to over time, and without other invention this alert will page more frequently as we run out of headroom. High WAL Generation is sign of an impending saturation limit with WAL Receiver and/or WAL apply. We theorize that at 150 MB/s (over [5m]) WAL Generation the replicas will not be able to receive and apply the data fast enough to keep up with generation leading to saturation-induced replication lag. While 150 MB/s is our theoretical Hard SLO, we also want to alert on spikes as we noticed they predict imminent (WAL) Generation exceeding 150 MB/s (over [5m]) and to get a better understanding of WAL Generation. Replication lag means the data on the replicas will be stale compared to the data on the primaries. This could lead to the loadbalancer keeping sticky reads on the primary longer (more load on primary) or if the replication lag gets older than 2 minutes the loadbalancer will redirect all read traffic to primary (even more load on primary). Finally, there could be data loss if an unexpected failover was to occur. Its also worth noting that on the replicas both CPU and disk IO increases with WAL Generation rate, regardless of the content of that WAL data. The recipient should investigate what could have caused the WAL spike, and whether the spike is a early warning sign of an impending saturation limit with WAL Receiver and/or WAL apply.
      runbook: patroni/primary_db_node_wal_generation_saturation/
    labels:
      alert_type: cause
      severity: s3
      team: verify
    expr: |
      (
        (
            (max_over_time(rate(pg_xlog_position_bytes{env="gprd",type="patroni-ci"}[5m])[60m:]) >= (100 * 1024 * 1024))
            -
            avg_over_time(rate(pg_xlog_position_bytes{env="gprd",type="patroni-ci"}[5m])[1d:])
        ) /
        stddev_over_time(rate(pg_xlog_position_bytes{env="gprd",type="patroni-ci"}[5m])[1d:])
        and on (fqdn) (pg_replication_is_replica == 0)
      ) > 3.5
