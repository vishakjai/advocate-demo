# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/saturation.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: Saturation Rules (autogenerated)
  interval: 1m
  rules:
  - record: gitlab_component_saturation:ratio
    labels:
      component: cpu
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            1 - avg by (env,environment,shard,stage,tier,type) (
              rate(node_cpu_seconds_total{mode="idle", env="gprd",type="redis-cluster-queues-meta"}[5m])
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: disk_inodes
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            1 - (
              node_filesystem_files_free{fstype=~"(ext.|xfs)", env="gprd",type="redis-cluster-queues-meta"}
              /
              node_filesystem_files{fstype=~"(ext.|xfs)", env="gprd",type="redis-cluster-queues-meta"}
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: disk_maximum_capacity
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            max by (device,env,environment,fqdn,shard,stage,tier,type) (
              node_filesystem_size_bytes{fstype=~"ext.|xfs", env="gprd",type="redis-cluster-queues-meta"} - node_filesystem_avail_bytes{fstype=~"ext.|xfs", env="gprd",type="redis-cluster-queues-meta"}
              unless on (fqdn) node_disk_info{serial=~"lvm.*", env="gprd",type="redis-cluster-queues-meta"}
            ) / (64*2^40)
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: disk_space
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            (
              1 - node_filesystem_avail_bytes{fstype=~"ext.|xfs", env="gprd",type="redis-cluster-queues-meta"} / node_filesystem_size_bytes{fstype=~"ext.|xfs", env="gprd",type="redis-cluster-queues-meta"}
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: memory
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            instance:node_memory_utilization:ratio{env="gprd",type="redis-cluster-queues-meta"} or instance:node_memory_utilisation:ratio{env="gprd",type="redis-cluster-queues-meta"}
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: nf_conntrack_entries
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            max_over_time(node_nf_conntrack_entries{env="gprd",type="redis-cluster-queues-meta"}[1m])
            /
            node_nf_conntrack_entries_limit{env="gprd",type="redis-cluster-queues-meta"}
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: node_schedstat_waiting
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            avg without (cpu) (rate(node_schedstat_waiting_seconds_total{env="gprd",type="redis-cluster-queues-meta"}[1h]))
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: open_fds
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            (
              process_open_fds{env="gprd",type="redis-cluster-queues-meta"}
              /
              process_max_fds{env="gprd",type="redis-cluster-queues-meta"}
            )
            or
            (
              ruby_file_descriptors{env="gprd",type="redis-cluster-queues-meta"}
              /
              ruby_process_max_fds{env="gprd",type="redis-cluster-queues-meta"}
            )
            or
            (
              node_filefd_allocated{env="gprd",type="redis-cluster-queues-meta"}
              /
              node_filefd_maximum{env="gprd",type="redis-cluster-queues-meta"}
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: redis_cluster_clients
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            max_over_time(redis_connected_clients{env="gprd",type="redis-cluster-queues-meta"}[1m])
            /
            redis_config_maxclients{env="gprd",type="redis-cluster-queues-meta"}
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: redis_cluster_memory
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            max by (env,environment,fqdn,instance,shard,stage,tier,type) (
              label_replace(redis_memory_used_rss_bytes{env="gprd",type="redis-cluster-queues-meta"}, "memtype", "rss","","")
              or
              label_replace(redis_memory_used_bytes{env="gprd",type="redis-cluster-queues-meta"}, "memtype", "used","","")
            )
            /
            avg by (env,environment,fqdn,instance,shard,stage,tier,type) (
              node_memory_MemTotal_bytes{env="gprd",type="redis-cluster-queues-meta"}
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: redis_cluster_primary_cpu
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            sum by (env,environment,fqdn,instance,shard,stage,tier,type) (
              rate(
                namedprocess_namegroup_thread_cpu_seconds_total{env="gprd",type="redis-cluster-queues-meta", groupname="redis-server", threadname="redis-server"}[5m])
            )
            and on (fqdn) redis_instance_info{role="master"}
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: redis_secondary_cpu
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            (
              rate(redis_cpu_user_seconds_total{env="gprd",type="redis-cluster-queues-meta"}[5m])
              +
              rate(redis_cpu_sys_seconds_total{env="gprd",type="redis-cluster-queues-meta"}[5m])
            )
            and on (instance) redis_instance_info{role!="master"}
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: single_node_cpu
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            avg without(cpu, mode) (1 - rate(node_cpu_seconds_total{mode="idle", env="gprd",type="redis-cluster-queues-meta"}[5m]))
            ,
            1)
        ,
        0)
      )
