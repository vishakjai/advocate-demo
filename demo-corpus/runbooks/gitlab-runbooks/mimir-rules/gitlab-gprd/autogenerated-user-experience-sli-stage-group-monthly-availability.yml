# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/user-experience-sli-monthly-availability.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 7d User Experience SLI monthly availability ratio
  interval: 30m
  rules:
  - record: gitlab:user_experience_sli:stage_groups:availability:ratio_7d
    expr: |
      clamp_max(
        sum by (env,stage_group,product_stage,user_experience_id)(
          sum by (env,stage_group,product_stage,user_experience_id,stage_group,component) (
            label_replace(
              sum_over_time(
                gitlab:user_experience_sli:stage_groups:apdex:success:rate_1h{env="gprd",stage="main"}[7d]
              ), 'sli_kind', 'apdex', '', ''
            )
            or
            label_replace(
              sum_over_time(
                gitlab:user_experience_sli:stage_groups:ops:rate_1h{env="gprd",stage="main"}[7d]
              )
              -
              sum_over_time(
                gitlab:user_experience_sli:stage_groups:error:rate_1h{env="gprd",stage="main"}[7d]
              ), 'sli_kind', 'error', '', ''
            )
          ) unless on (stage_group,component) gitlab:ignored_component:stage_group
        )
        /
        sum by (env,stage_group,product_stage,user_experience_id)(
          sum by (env,stage_group,product_stage,user_experience_id,stage_group,component) (
            label_replace(
              sum_over_time(
                gitlab:user_experience_sli:stage_groups:apdex:weight:score_1h{env="gprd",stage="main"}[7d]
              ),
              'sli_kind', 'apdex', '', ''
            )
            or
            label_replace(
              sum_over_time(
                gitlab:user_experience_sli:stage_groups:ops:rate_1h{env="gprd",stage="main"}[7d]
              )
              and sum_over_time(gitlab:user_experience_sli:stage_groups:error:rate_1h{env="gprd",stage="main"}[7d]),
              'sli_kind', 'error', '', ''
            )
          ) unless on (stage_group,component) gitlab:ignored_component:stage_group
        ),
      1)
