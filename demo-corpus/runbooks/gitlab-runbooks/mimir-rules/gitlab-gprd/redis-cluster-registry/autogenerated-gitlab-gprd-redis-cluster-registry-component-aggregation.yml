# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/mimir-aggregations.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'Global SLI Metrics: redis-cluster-registry - Burn-Rate 5m'
  interval: 1m
  rules:
  - record: gitlab_component_ops:rate_5m
    labels:
      component: primary_server
      monitor: global
      stage: main
      tier: db
      type: redis-cluster-registry
    expr: |
      sum by (env,environment) (
        sli_aggregations:redis_commands_processed_total:rate_5m{env="gprd",type="redis-cluster-registry"} and on (instance) redis_instance_info{role="master"}
      )
  - record: gitlab_component_errors:ratio_5m
    labels:
      component: primary_server
      monitor: global
      tier: db
      type: redis-cluster-registry
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_errors:rate_5m{component="primary_server",env="gprd",monitor="global",tier="db",type="redis-cluster-registry"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_ops:rate_5m{component="primary_server",env="gprd",monitor="global",tier="db",type="redis-cluster-registry"}
      )
  - record: gitlab_component_apdex:ratio_5m
    labels:
      component: primary_server
      monitor: global
      tier: db
      type: redis-cluster-registry
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_apdex:success:rate_5m{component="primary_server",env="gprd",monitor="global",tier="db",type="redis-cluster-registry"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_apdex:weight:score_5m{component="primary_server",env="gprd",monitor="global",tier="db",type="redis-cluster-registry"}
      )
  - record: gitlab_component_apdex:success:rate_5m
    labels:
      component: registry_cache_redis_client
      monitor: global
      stage: main
      tier: db
      type: redis-cluster-registry
    expr: |
      (
        sum by (env,environment) (
          sli_aggregations:registry_redis_single_commands_bucket:rate_5m{env="gprd",exported_instance="cache",le="0.25",type="registry"}
        )
        +
        sum by (env,environment) (
          sli_aggregations:registry_redis_single_commands_bucket:rate_5m{env="gprd",exported_instance="cache",le="0.5",type="registry"}
        )
      )
      /
      2
  - record: gitlab_component_apdex:weight:score_5m
