groups:
- name: 'Global SLI Metrics: topology-spanner - Burn-Rate 5m'
  interval: 1m
  rules:
  - record: gitlab_component_ops:rate_5m
    labels:
      component: spanner_api_errors
      monitor: global
      tier: db
      type: topology-spanner
    expr: |
      sum by (env,environment,stage) (
        sum by (env,environment,stage) (
          rate(
            stackdriver_spanner_instance_spanner_googleapis_com_api_request_count{
              job="runway-exporter",
              project_id="gitlab-runway-topo-svc-prod"
            }[5m]
          )
        )
      )
  - record: gitlab_component_errors:rate_5m
    labels:
      component: spanner_api_errors
      monitor: global
      tier: db
      type: topology-spanner
    expr: |
      (
        sum by (env,environment,stage) (
          sum by (env,environment,stage) (
            rate(
              stackdriver_spanner_instance_spanner_googleapis_com_api_request_count{
                job="runway-exporter",
                project_id="gitlab-runway-topo-svc-prod",
                status!="OK"
              }[5m]
            )
          )
        )
      )
      or
      (
        0 * group by(env,environment,stage) (
          gitlab_component_ops:rate_5m{component="spanner_api_errors",env="gprd",monitor="global",tier="db",type="topology-spanner"}
        )
      )
  - record: gitlab_component_errors:ratio_5m
    labels:
      component: spanner_api_errors
      monitor: global
      tier: db
      type: topology-spanner
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_errors:rate_5m{component="spanner_api_errors",env="gprd",monitor="global",tier="db",type="topology-spanner"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_ops:rate_5m{component="spanner_api_errors",env="gprd",monitor="global",tier="db",type="topology-spanner"}
      )
  - record: gitlab_component_apdex:ratio_5m
    labels:
      component: spanner_api_errors
      monitor: global
      tier: db
      type: topology-spanner
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_apdex:success:rate_5m{component="spanner_api_errors",env="gprd",monitor="global",tier="db",type="topology-spanner"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_apdex:weight:score_5m{component="spanner_api_errors",env="gprd",monitor="global",tier="db",type="topology-spanner"}
