      )
  - record: gitlab_component_errors:rate_5m
    labels:
      component: rateLimiterDenies
      monitor: global
      tier: sv
      type: kas
    expr: |
      (
        sum by (env,environment,stage) (
          sli_aggregations:limiter_block_duration_seconds_count:rate_5m{allowed="false",env="gprd",type="kas"}
        )
      )
      or
      (
        0 * group by(env,environment,stage) (
          gitlab_component_ops:rate_5m{component="rateLimiterDenies",env="gprd",monitor="global",tier="sv",type="kas"}
        )
      )
  - record: gitlab_component_errors:ratio_5m
    labels:
      component: rateLimiterDenies
      monitor: global
      tier: sv
      type: kas
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_errors:rate_5m{component="rateLimiterDenies",env="gprd",monitor="global",tier="sv",type="kas"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_ops:rate_5m{component="rateLimiterDenies",env="gprd",monitor="global",tier="sv",type="kas"}
      )
  - record: gitlab_component_apdex:ratio_5m
    labels:
      component: rateLimiterDenies
      monitor: global
      tier: sv
      type: kas
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_apdex:success:rate_5m{component="rateLimiterDenies",env="gprd",monitor="global",tier="sv",type="kas"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_apdex:weight:score_5m{component="rateLimiterDenies",env="gprd",monitor="global",tier="sv",type="kas"}
      )
  - record: gitlab_component_errors:confidence:ratio_5m
    labels:
      component: rateLimiterDenies
      confidence: 98%
      monitor: global
      tier: sv
      type: kas
    expr: |
      (gitlab_component_ops:rate_5m{component="rateLimiterDenies",env="gprd",monitor="global",tier="sv",type="kas"} == 0)
      or
      clamp(
        (
          (
            (gitlab_component_errors:rate_5m{component="rateLimiterDenies",env="gprd",monitor="global",tier="sv",type="kas"} / gitlab_component_ops:rate_5m{component="rateLimiterDenies",env="gprd",monitor="global",tier="sv",type="kas"})
            +
            5.411894 / (2 * (gitlab_component_ops:rate_5m{component="rateLimiterDenies",env="gprd",monitor="global",tier="sv",type="kas"} * 300))
          )
          -
          2.326348
          *
          sqrt(
            (
              (gitlab_component_errors:rate_5m{component="rateLimiterDenies",env="gprd",monitor="global",tier="sv",type="kas"} / gitlab_component_ops:rate_5m{component="rateLimiterDenies",env="gprd",monitor="global",tier="sv",type="kas"}) * (1 - (gitlab_component_errors:rate_5m{component="rateLimiterDenies",env="gprd",monitor="global",tier="sv",type="kas"} / gitlab_component_ops:rate_5m{component="rateLimiterDenies",env="gprd",monitor="global",tier="sv",type="kas"}))
              +
              5.411894 / (4 * (gitlab_component_ops:rate_5m{component="rateLimiterDenies",env="gprd",monitor="global",tier="sv",type="kas"} * 300))
            )
            /
            (gitlab_component_ops:rate_5m{component="rateLimiterDenies",env="gprd",monitor="global",tier="sv",type="kas"} * 300)
          )
        )
        /
        (1 + 5.411894 / (gitlab_component_ops:rate_5m{component="rateLimiterDenies",env="gprd",monitor="global",tier="sv",type="kas"} * 300)),
        0, 1
      )
  - record: gitlab_component_apdex:confidence:ratio_5m
    labels:
      component: rateLimiterDenies
      confidence: 98%
      monitor: global
      tier: sv
      type: kas
    expr: |
      clamp_min(gitlab_component_apdex:weight:score_5m{component="rateLimiterDenies",env="gprd",monitor="global",tier="sv",type="kas"} == 0, 1)
      or
      clamp(
        (
          (
            (gitlab_component_apdex:success:rate_5m{component="rateLimiterDenies",env="gprd",monitor="global",tier="sv",type="kas"} / gitlab_component_apdex:weight:score_5m{component="rateLimiterDenies",env="gprd",monitor="global",tier="sv",type="kas"})
            +
            5.411894 / (2 * (gitlab_component_apdex:weight:score_5m{component="rateLimiterDenies",env="gprd",monitor="global",tier="sv",type="kas"} * 300))
          )
          +
          2.326348
          *
          sqrt(
            (
              (gitlab_component_apdex:success:rate_5m{component="rateLimiterDenies",env="gprd",monitor="global",tier="sv",type="kas"} / gitlab_component_apdex:weight:score_5m{component="rateLimiterDenies",env="gprd",monitor="global",tier="sv",type="kas"}) * (1 - (gitlab_component_apdex:success:rate_5m{component="rateLimiterDenies",env="gprd",monitor="global",tier="sv",type="kas"} / gitlab_component_apdex:weight:score_5m{component="rateLimiterDenies",env="gprd",monitor="global",tier="sv",type="kas"}))
