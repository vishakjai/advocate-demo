# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/mimir-aggregations.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'Global SLI Metrics: kas - Burn-Rate 5m'
  interval: 1m
  rules:
  - record: gitlab_component_ops:rate_5m
    labels:
      component: connections
      monitor: global
      tier: sv
      type: kas
    expr: |
      sum by (env,environment,stage) (
        sli_aggregations:accepted_connections_total:rate_5m{env="gprd",type="kas"}
      )
  - record: gitlab_component_errors:rate_5m
    labels:
      component: connections
      monitor: global
      tier: sv
      type: kas
    expr: |
      (
        sum by (env,environment,stage) (
          sli_aggregations:redis_expiring_hash_api_gc_deleted_keys_count_total:rate_5m{env="gprd",expiring_hash_name=~"^listener_conns_",type="kas"}
        )
      )
      or
      (
        0 * group by(env,environment,stage) (
          gitlab_component_ops:rate_5m{component="connections",env="gprd",monitor="global",tier="sv",type="kas"}
        )
      )
  - record: gitlab_component_errors:ratio_5m
    labels:
      component: connections
      monitor: global
      tier: sv
      type: kas
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_errors:rate_5m{component="connections",env="gprd",monitor="global",tier="sv",type="kas"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_ops:rate_5m{component="connections",env="gprd",monitor="global",tier="sv",type="kas"}
      )
  - record: gitlab_component_apdex:ratio_5m
    labels:
      component: connections
      monitor: global
      tier: sv
      type: kas
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_apdex:success:rate_5m{component="connections",env="gprd",monitor="global",tier="sv",type="kas"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_apdex:weight:score_5m{component="connections",env="gprd",monitor="global",tier="sv",type="kas"}
      )
  - record: gitlab_component_apdex:success:rate_5m
    labels:
      component: grpc_requests
      monitor: global
      tier: sv
      type: kas
    expr: |
      sum by (env,environment,stage) (
        sli_aggregations:tunnel_routing_duration_seconds_bucket:rate_5m{env="gprd",le="4.096",status=~"success",type="kas"}
      )
  - record: gitlab_component_apdex:weight:score_5m
    labels:
      component: grpc_requests
      monitor: global
      tier: sv
      type: kas
    expr: |
      sum by (env,environment,stage) (
        sli_aggregations:tunnel_routing_duration_seconds_bucket:rate_5m{env="gprd",le="+Inf",status=~"success",type="kas"}
      )
  - record: gitlab_component_ops:rate_5m
    labels:
      component: grpc_requests
      monitor: global
      tier: sv
      type: kas
    expr: |
      sum by (env,environment,stage) (
        sli_aggregations:grpc_server_handled_total:rate_5m{env="gprd",type="kas"}
      )
  - record: gitlab_component_errors:rate_5m
    labels:
      component: grpc_requests
      monitor: global
      tier: sv
      type: kas
    expr: |
      (
        sum by (env,environment,stage) (
          sli_aggregations:grpc_server_handled_total:rate_5m{env="gprd",grpc_code!~"^(OK|NotFound|PaymentRequired|FailedPrecondition|Unauthenticated|PermissionDenied|Canceled|DeadlineExceeded|ResourceExhausted)$",grpc_service!="gitlab.agent.kubernetes_api.rpc.KubernetesApi",type="kas"}
        )
      )
      or
      (
        0 * group by(env,environment,stage) (
          gitlab_component_ops:rate_5m{component="grpc_requests",env="gprd",monitor="global",tier="sv",type="kas"}
        )
      )
  - record: gitlab_component_errors:ratio_5m
    labels:
      component: grpc_requests
      monitor: global
      tier: sv
      type: kas
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_errors:rate_5m{component="grpc_requests",env="gprd",monitor="global",tier="sv",type="kas"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_ops:rate_5m{component="grpc_requests",env="gprd",monitor="global",tier="sv",type="kas"}
      )
  - record: gitlab_component_apdex:ratio_5m
    labels:
      component: grpc_requests
      monitor: global
      tier: sv
      type: kas
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_apdex:success:rate_5m{component="grpc_requests",env="gprd",monitor="global",tier="sv",type="kas"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_apdex:weight:score_5m{component="grpc_requests",env="gprd",monitor="global",tier="sv",type="kas"}
      )
  - record: gitlab_component_ops:rate_5m
