# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/mimir-aggregations.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'Global SLI Metrics: patroni-registry - Burn-Rate 5m'
  interval: 1m
  rules:
  - record: gitlab_component_apdex:success:rate_5m
    labels:
      component: dns_lookups
      monitor: global
      stage: main
      tier: db
      type: patroni-registry
    expr: |
      (
        sum by (env,environment) (
          sli_aggregations:registry_database_lb_lookup_seconds_bucket:rate_5m{env="gprd",le="0.05",type="registry"}
        )
        +
        sum by (env,environment) (
          sli_aggregations:registry_database_lb_lookup_seconds_bucket:rate_5m{env="gprd",le="0.1",type="registry"}
        )
      )
      /
      2
  - record: gitlab_component_apdex:weight:score_5m
    labels:
      component: dns_lookups
      monitor: global
      stage: main
      tier: db
      type: patroni-registry
    expr: |
      sum by (env,environment) (
        sli_aggregations:registry_database_lb_lookup_seconds_bucket:rate_5m{env="gprd",le="+Inf",type="registry"}
      )
  - record: gitlab_component_ops:rate_5m
    labels:
      component: dns_lookups
      monitor: global
      stage: main
      tier: db
      type: patroni-registry
    expr: |
      sum by (env,environment) (
        sli_aggregations:registry_database_lb_lookup_seconds_count:rate_5m{env="gprd",type="registry"}
      )
  - record: gitlab_component_errors:ratio_5m
    labels:
      component: dns_lookups
      monitor: global
      tier: db
      type: patroni-registry
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_errors:rate_5m{component="dns_lookups",env="gprd",monitor="global",tier="db",type="patroni-registry"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_ops:rate_5m{component="dns_lookups",env="gprd",monitor="global",tier="db",type="patroni-registry"}
      )
  - record: gitlab_component_apdex:ratio_5m
    labels:
      component: dns_lookups
      monitor: global
      tier: db
      type: patroni-registry
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_apdex:success:rate_5m{component="dns_lookups",env="gprd",monitor="global",tier="db",type="patroni-registry"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_apdex:weight:score_5m{component="dns_lookups",env="gprd",monitor="global",tier="db",type="patroni-registry"}
      )
  - record: gitlab_component_errors:confidence:ratio_5m
    labels:
      component: dns_lookups
      confidence: 98%
      monitor: global
      tier: db
      type: patroni-registry
    expr: |
      (gitlab_component_ops:rate_5m{component="dns_lookups",env="gprd",monitor="global",tier="db",type="patroni-registry"} == 0)
      or
      clamp(
        (
          (
            (gitlab_component_errors:rate_5m{component="dns_lookups",env="gprd",monitor="global",tier="db",type="patroni-registry"} / gitlab_component_ops:rate_5m{component="dns_lookups",env="gprd",monitor="global",tier="db",type="patroni-registry"})
            +
            5.411894 / (2 * (gitlab_component_ops:rate_5m{component="dns_lookups",env="gprd",monitor="global",tier="db",type="patroni-registry"} * 300))
          )
          -
          2.326348
          *
          sqrt(
            (
              (gitlab_component_errors:rate_5m{component="dns_lookups",env="gprd",monitor="global",tier="db",type="patroni-registry"} / gitlab_component_ops:rate_5m{component="dns_lookups",env="gprd",monitor="global",tier="db",type="patroni-registry"}) * (1 - (gitlab_component_errors:rate_5m{component="dns_lookups",env="gprd",monitor="global",tier="db",type="patroni-registry"} / gitlab_component_ops:rate_5m{component="dns_lookups",env="gprd",monitor="global",tier="db",type="patroni-registry"}))
              +
              5.411894 / (4 * (gitlab_component_ops:rate_5m{component="dns_lookups",env="gprd",monitor="global",tier="db",type="patroni-registry"} * 300))
            )
            /
            (gitlab_component_ops:rate_5m{component="dns_lookups",env="gprd",monitor="global",tier="db",type="patroni-registry"} * 300)
          )
        )
        /
        (1 + 5.411894 / (gitlab_component_ops:rate_5m{component="dns_lookups",env="gprd",monitor="global",tier="db",type="patroni-registry"} * 300)),
        0, 1
      )
