            (gitlab_component_apdex:success:rate_5m{component="dns_lookups",env="gprd",monitor="global",tier="db",type="patroni-registry"} / gitlab_component_apdex:weight:score_5m{component="dns_lookups",env="gprd",monitor="global",tier="db",type="patroni-registry"})
