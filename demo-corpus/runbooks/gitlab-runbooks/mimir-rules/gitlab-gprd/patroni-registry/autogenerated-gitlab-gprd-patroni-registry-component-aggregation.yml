              +
              5.411894 / (4 * (gitlab_component_apdex:weight:score_5m{component="dns_lookups",env="gprd",monitor="global",tier="db",type="patroni-registry"} * 300))
            )
            /
            (gitlab_component_apdex:weight:score_5m{component="dns_lookups",env="gprd",monitor="global",tier="db",type="patroni-registry"} * 300)
          )
        )
        /
        (1 + 5.411894 / (gitlab_component_apdex:weight:score_5m{component="dns_lookups",env="gprd",monitor="global",tier="db",type="patroni-registry"} * 300)),
