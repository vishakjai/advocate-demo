  - record: gitlab_component_ops:rate_5m
    labels:
      component: pgbouncer
      monitor: global
      stage: main
      tier: db
      type: patroni-registry
    expr: |
      sum by (env,environment) (
        label_replace(rate(pgbouncer_stats_sql_transactions_pooled_total{env="gprd",tier="db",type="patroni-registry"}[5m]), "_c", "0", "", "")
        or
        label_replace(rate(pgbouncer_stats_queries_pooled_total{env="gprd",tier="db",type="patroni-registry"}[5m]), "_c", "1", "", "")
      )
  - record: gitlab_component_errors:rate_5m
