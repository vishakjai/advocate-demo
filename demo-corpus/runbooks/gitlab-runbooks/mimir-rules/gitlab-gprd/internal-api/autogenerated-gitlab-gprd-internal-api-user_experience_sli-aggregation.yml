# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'User Experience SLI Metrics: internal-api - Burn-Rate 5m'
  interval: 1m
  rules:
  - record: gitlab:user_experience_sli:ops:rate_5m
    expr: |
      sum by (env,type,stage,user_experience_id,feature_category,urgency) (
        rate(gitlab_user_experience_total{env="gprd",type="internal-api"}[5m])
      )
  - record: gitlab:user_experience_sli:apdex:success:rate_5m
    expr: |
      sum by (env,type,stage,user_experience_id,feature_category,urgency) (
        rate(gitlab_user_experience_apdex_total{env="gprd",success="true",type="internal-api"}[5m])
      )
  - record: gitlab:user_experience_sli:apdex:weight:score_5m
    expr: |
      sum by (env,type,stage,user_experience_id,feature_category,urgency) (
        rate(gitlab_user_experience_apdex_total{env="gprd",type="internal-api"}[5m])
      )
  - record: gitlab:user_experience_sli:apdex:ratio_5m
    expr: |
      gitlab:user_experience_sli:apdex:success:rate_5m{env="gprd",type="internal-api"}
      /
      gitlab:user_experience_sli:apdex:weight:score_5m{env="gprd",type="internal-api"}
  - record: gitlab:user_experience_sli:error:rate_5m
    expr: |
      sum by (env,type,stage,user_experience_id,feature_category,urgency) (
        rate(gitlab_user_experience_total{env="gprd",error="true",type="internal-api"}[5m])
      )
  - record: gitlab:user_experience_sli:error:ratio_5m
    expr: |
      gitlab:user_experience_sli:error:rate_5m{env="gprd",type="internal-api"}
      /
      gitlab:user_experience_sli:ops:rate_5m{env="gprd",type="internal-api"}
