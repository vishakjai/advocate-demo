# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/filesystem-ext4-errors-alerts.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: Filesystem EXT4 Errors Alerts
  interval: 1m
  rules:
  - alert: FilesystemExt4Errors
    for: 5m
    annotations:
      title: EXT4 filesystem errors detected on Gitaly node
      description: |
        EXT4 filesystem errors have been detected on Gitaly node {{ $labels.fqdn }} at mountpoint {{ $labels.mountpoint }} (device {{ $labels.device }}).

        This indicates potential disk corruption or hardware issues that could lead to data loss or service degradation. Immediate investigation is required.

        Current error count: {{ $value }}
      runbook: gitaly/filesystem-errors/
    labels:
      alert_type: cause
      severity: s3
      team: tenant_services
    expr: |
      increase(filesystem_ext4_errors_total{env="gprd", service="gitaly"}[5m]) > 0
