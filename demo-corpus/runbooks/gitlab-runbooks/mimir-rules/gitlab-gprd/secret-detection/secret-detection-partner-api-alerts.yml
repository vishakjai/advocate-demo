---
groups:
  - name: secret-detection-partner-api
    interval: 30s
    rules:
      # WARNING (S3): High error rate means users can't verify if their tokens leaked
      - alert: SecretDetectionPartnerAPIHighErrorRate
        expr: |
          (
            sum by (partner) (rate(validity_check_partner_api_requests_total{env="gprd",status="failure"}[5m]))
            /
            sum by (partner) (rate(validity_check_partner_api_requests_total{env="gprd"}[5m]))
          ) > 0.1
          and
          sum by (partner) (rate(validity_check_partner_api_requests_total{env="gprd"}[5m])) > 0
        for: 10m
        labels:
          severity: s3
          alert_type: symptom
          team: secret_detection
          type: secret-detection
          env: gprd
        annotations:
          title: "Secret Detection partner API error rate is {{ $value | humanizePercentage }}"
          description: |
            Partner token verification is failing at {{ $value | humanizePercentage }} over the last 5 minutes.
            This means users cannot verify if their leaked credentials are still active.

            Investigation steps:
            - Check the dashboard to identify which partner is failing
            - Review error_type labels (network_error, rate_limit, response_error)
            - Check recent deployments or configuration changes
            - Review partner API status
          runbook: "docs/secret-detection/troubleshooting.md"
          grafana_dashboard_link: "https://dashboards.gitlab.net/goto/cf3zed4vmgo3ke?orgId=1"

      # WARNING: High latency degrades user experience
      - alert: SecretDetectionPartnerAPIHighLatency
        expr: |
          histogram_quantile(0.95,
            sum(rate(validity_check_partner_api_duration_seconds_bucket{env="gprd"}[5m])) by (partner, le)
          ) > 5
        for: 15m
        labels:
          severity: s3
          alert_type: symptom
          team: secret_detection
          type: secret-detection
          env: gprd
        annotations:
          title: "Secret Detection partner API latency is {{ $value | humanizeDuration }} for {{ $labels.partner }}"
          description: |
            P95 response time for partner token verification is {{ $value | humanizeDuration }}.
            Token verification may time out or degrade user experience.

            Investigation steps:
            - Check partner API status and health
            - Review network latency metrics
            - Check for rate limiting or throttling
            - Review recent traffic pattern changes
          runbook: "docs/secret-detection/troubleshooting.md"
          grafana_dashboard_link: "https://dashboards.gitlab.net/goto/cf3zed4vmgo3ke?orgId=1"

      # INFO: Rate limit hits - may need to adjust limits
      - alert: SecretDetectionPartnerAPIRateLimitHit
        expr: |
          sum(rate(validity_check_rate_limit_hits_total{env="gprd"}[5m])) by (limit_type) > 0.1
        for: 5m
        labels:
          severity: s4
          alert_type: cause
          team: secret_detection
          type: secret-detection
          env: gprd
        annotations:
          title: "Secret Detection hitting {{ $labels.limit_type }} rate limits"
          description: |
            Rate limit {{ $labels.limit_type }} is being hit at {{ $value | humanize }} req/s.
            This may cause verification delays or failures.

            Action items:
            - Review current rate limit configuration
            - Check if traffic pattern has changed
            - Consider implementing exponential backoff
            - Evaluate if higher limits are needed
          runbook: "docs/secret-detection/troubleshooting.md"
          grafana_dashboard_link: "https://dashboards.gitlab.net/goto/cf3zed4vmgo3ke?orgId=1"

      # WARNING: Network connectivity issues to partner APIs
      - alert: SecretDetectionPartnerAPINetworkErrors
        expr: |
          sum(rate(validity_check_network_errors_total{env="gprd"}[5m])) by (partner, error_class) > 0.5
        for: 10m
        labels:
          severity: s3
          alert_type: cause
          team: secret_detection
          type: secret-detection
          env: gprd
        annotations:
          title: "Network errors connecting to partner API: {{ $labels.partner }}"
          description: |
            Experiencing {{ $value | humanize }} {{ $labels.error_class }} errors/sec connecting to {{ $labels.partner }}.

            Common error classes:
            - Timeout: Partner API is slow or overloaded
            - ConnectionRefused: Partner API is unreachable
            - HTTPError: Partner API returned error responses

            Investigation steps:
            - Check partner API health and status
            - Review network connectivity and DNS resolution
            - Check firewall rules and security groups
            - Review error logs for detailed failure messages
          runbook: "docs/secret-detection/troubleshooting.md"
          grafana_dashboard_link: "https://dashboards.gitlab.net/goto/cf3zed4vmgo3ke?orgId=1"
