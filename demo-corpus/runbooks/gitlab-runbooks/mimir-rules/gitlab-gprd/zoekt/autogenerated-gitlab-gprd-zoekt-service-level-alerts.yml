# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/service-component-alerts.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'Service Component Alerts: zoekt'
  interval: 1m
  rules:
  - alert: ZoektServiceZoektSearchingApdexSLOViolation
    for: 2m
    annotations:
      title: The zoekt_searching SLI of the zoekt service (`{{ $labels.stage }}` stage)
        has an apdex violating SLO
      description: |
        Aggregation of all search queries on GitLab.com, as measured from exact code search (backed by Zoekt).

        Currently the apdex value is {{ $value | humanizePercentage }}.
      grafana_dashboard_id: zoekt-main/zoekt-overview
      grafana_dashboard_link: https://dashboards.gitlab.net/d/zoekt-main/zoekt-overview?from=now-6h/m&to=now-1m/m&var-environment={{
        $labels.environment }}&var-stage={{ $labels.stage }}
      grafana_datasource_id: mimir-gitlab-gprd
      grafana_min_zoom_hours: "6"
      grafana_panel_id: "644016269"
      grafana_variables: environment,stage
      promql_template_1: |
        histogram_quantile(
          0.950000,
          sum by (env,environment,tier,stage,le) (
            rate(zoekt_search_duration_seconds_bucket{container="zoekt-webserver",environment="{{ $labels.environment }}",stage="{{ $labels.stage }}"}[5m])
          )
        )
      runbook: zoekt/#alerts
    labels:
      aggregation: component
      alert_class: slo_violation
      alert_type: symptom
      confidence: 98%
      feature_category: global_search
      rules_domain: general
      severity: s3
      sli_type: apdex
      slo_alert: "yes"
      user_impacting: "yes"
      window: 1h
    expr: |
      (
        (
          gitlab_component_apdex:confidence:ratio_1h{component="zoekt_searching",confidence="98%",env="gprd",monitor="global",type="zoekt"}
          < (1 - 14.4 * 0.001000)
        )
        and on (env,environment,tier,type,stage,component)
        (
          gitlab_component_apdex:confidence:ratio_5m{component="zoekt_searching",confidence="98%",env="gprd",monitor="global",type="zoekt"}
          < (1 - 14.4 * 0.001000)
        )
      )
      and on(env,environment,tier,type,stage,component)
      (
        sum by(env,environment,tier,type,stage,component) (gitlab_component_ops:rate_1h{component="zoekt_searching",env="gprd",monitor="global",type="zoekt"}) >= 1
      )
  - alert: ZoektServiceZoektSearchingApdexSLOViolation
