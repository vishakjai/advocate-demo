      severity: s3
      sli_type: ops
      slo_alert: "no"
      user_impacting: "yes"
    expr: |
      gitlab_component_ops:rate_5m{component="zoekt_searching",env="gprd",monitor="global",stage="main",type="zoekt"} offset 1h
