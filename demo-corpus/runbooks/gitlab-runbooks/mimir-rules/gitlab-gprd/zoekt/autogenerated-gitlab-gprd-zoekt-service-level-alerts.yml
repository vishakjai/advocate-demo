      alert_class: traffic_cessation
      alert_type: cause
      feature_category: global_search
      rules_domain: general
      severity: s3
      sli_type: ops
      slo_alert: "no"
      user_impacting: "yes"
    expr: |
      gitlab_component_ops:rate_30m{component="zoekt_searching",env="gprd",monitor="global",stage="main",type="zoekt"} == 0
      and
