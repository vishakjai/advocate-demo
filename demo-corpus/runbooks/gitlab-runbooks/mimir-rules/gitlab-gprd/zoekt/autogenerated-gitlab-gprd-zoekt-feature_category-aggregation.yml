# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/mimir-aggregations.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'Feature Category Metrics: zoekt - Burn-Rate 5m'
  interval: 1m
  rules:
  - record: gitlab:component:feature_category:execution:apdex:success:rate_5m
    labels:
      component: zoekt_searching
      feature_category: global_search
      monitor: global
      stage: main
      tier: inf
      type: zoekt
    expr: |
      (
        sum by (env,environment) (
          sli_aggregations:zoekt_search_duration_seconds_bucket:rate_5m{container="zoekt-webserver",env="gprd",le=~"5|5\\.0"}
        )
        +
        sum by (env,environment) (
          sli_aggregations:zoekt_search_duration_seconds_bucket:rate_5m{container="zoekt-webserver",env="gprd",le=~"10|10\\.0"}
        )
      )
      /
      2
  - record: gitlab:component:feature_category:execution:apdex:weight:score_5m
    labels:
      component: zoekt_searching
      feature_category: global_search
      monitor: global
      stage: main
      tier: inf
      type: zoekt
    expr: |
      sum by (env,environment) (
        sli_aggregations:zoekt_search_duration_seconds_bucket:rate_5m{container="zoekt-webserver",env="gprd",le="+Inf"}
      )
  - record: gitlab:component:feature_category:execution:ops:rate_5m
    labels:
      component: zoekt_searching
      feature_category: global_search
      monitor: global
      stage: main
      tier: inf
      type: zoekt
    expr: |
      sum by (env,environment) (
        sli_aggregations:zoekt_search_requests_total:rate_5m{container="zoekt-webserver",env="gprd"} offset 30s
      )
  - record: gitlab:component:feature_category:execution:error:rate_5m
    labels:
      component: zoekt_searching
      feature_category: global_search
      monitor: global
      stage: main
      tier: inf
      type: zoekt
    expr: |
      (
        sum by (env,environment) (
          sli_aggregations:zoekt_search_failed_total:rate_5m{container="zoekt-webserver",env="gprd"} offset 30s
        )
      )
      or
      (
        0 * group by(env,environment) (
          gitlab:component:feature_category:execution:ops:rate_5m{component="zoekt_searching",env="gprd",feature_category="global_search",monitor="global",stage="main",tier="inf",type="zoekt"}
        )
      )
  - record: gitlab:component:feature_category:execution:apdex:success:rate_5m
    labels:
      component: zoekt_tasks
      feature_category: global_search
      monitor: global
      stage: main
      tier: inf
      type: zoekt
    expr: |
      sum by (env,environment) (
        sli_aggregations:gitlab_sli_search_zoekt_tasks_apdex_success_total:rate_5m{env="gprd",type="zoekt"} offset 30s
      )
  - record: gitlab:component:feature_category:execution:apdex:weight:score_5m
    labels:
      component: zoekt_tasks
      feature_category: global_search
      monitor: global
      stage: main
      tier: inf
      type: zoekt
    expr: |
      sum by (env,environment) (
        sli_aggregations:gitlab_sli_search_zoekt_tasks_apdex_total:rate_5m{env="gprd",type="zoekt"} offset 30s
      )
  - record: gitlab:component:feature_category:execution:ops:rate_5m
    labels:
      component: zoekt_tasks
      feature_category: global_search
      monitor: global
      stage: main
      tier: inf
      type: zoekt
    expr: |
      sum by (env,environment) (
        sli_aggregations:gitlab_sli_search_zoekt_tasks_requests_total:rate_5m{env="gprd",type="zoekt"} offset 30s
      )
  - record: gitlab:component:feature_category:execution:error:rate_5m
    labels:
      component: zoekt_tasks
      feature_category: global_search
      monitor: global
