groups:
- name: 'Global SLI Metrics: zoekt - Burn-Rate 5m'
  interval: 1m
  rules:
  - record: gitlab_component_apdex:success:rate_5m
    labels:
      component: zoekt_searching
      monitor: global
      stage: main
      tier: inf
      type: zoekt
    expr: |
      (
        sum by (env,environment) (
          sli_aggregations:zoekt_search_duration_seconds_bucket:rate_5m{container="zoekt-webserver",env="gprd",le=~"5|5\\.0"}
        )
        +
        sum by (env,environment) (
          sli_aggregations:zoekt_search_duration_seconds_bucket:rate_5m{container="zoekt-webserver",env="gprd",le=~"10|10\\.0"}
        )
      )
