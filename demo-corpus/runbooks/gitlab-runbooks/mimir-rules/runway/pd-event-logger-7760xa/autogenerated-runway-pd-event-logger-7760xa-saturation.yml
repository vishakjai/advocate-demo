# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/saturation.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: Saturation Rules (autogenerated)
  interval: 1m
  rules:
  - record: gitlab_component_saturation:ratio
    labels:
      component: open_fds
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            (
              process_open_fds{type="pd-event-logger-7760xa"}
              /
              process_max_fds{type="pd-event-logger-7760xa"}
            )
            or
            (
              ruby_file_descriptors{type="pd-event-logger-7760xa"}
              /
              ruby_process_max_fds{type="pd-event-logger-7760xa"}
            )
            or
            (
              node_filefd_allocated{type="pd-event-logger-7760xa"}
              /
              node_filefd_maximum{type="pd-event-logger-7760xa"}
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: runway_container_cpu_utilization
      stage: main
      tier: inf
    expr: |
      max by(env,environment,shard,type) (
        clamp_min(
          clamp_max(
            histogram_quantile(0.9999, sum by(le, env,environment,location,region,revision_name,shard,type)
              (
                avg_over_time(
                  stackdriver_cloud_run_revision_run_googleapis_com_container_cpu_utilizations_bucket{job="runway-exporter",type="pd-event-logger-7760xa"}[30m]
                )
              )
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: runway_container_instance_utilization
      stage: main
      tier: inf
    expr: |
      max by(env,environment,shard,type) (
        clamp_min(
          clamp_max(
            sum by (env,environment,location,region,revision_name,shard,type) (
              stackdriver_cloud_run_revision_run_googleapis_com_container_instance_count{job="runway-exporter",state="active",type="pd-event-logger-7760xa"}
            )
            /
            100
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: runway_container_max_concurrent_requests
      stage: main
      tier: inf
    expr: |
      max by(env,environment,shard,type) (
        clamp_min(
          clamp_max(
            histogram_quantile(0.9999, sum by(le, env,environment,location,region,revision_name,shard,type)
              (
                rate(
                  stackdriver_cloud_run_revision_run_googleapis_com_container_max_request_concurrencies_bucket{job="runway-exporter",state="active",type="pd-event-logger-7760xa"}[30m]
                )
              )
            ) / 100
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: runway_container_memory_utilization
      stage: main
      tier: inf
    expr: |
      max by(env,environment,shard,type) (
        clamp_min(
          clamp_max(
            histogram_quantile(0.9999, sum by(le, env,environment,region,revision_name,shard,type)
              (
                avg_over_time(
                  stackdriver_cloud_run_revision_run_googleapis_com_container_memory_utilizations_bucket{job="runway-exporter",type="pd-event-logger-7760xa"}[30m]
                )
              )
            )
            ,
            1)
        ,
        0)
      )
