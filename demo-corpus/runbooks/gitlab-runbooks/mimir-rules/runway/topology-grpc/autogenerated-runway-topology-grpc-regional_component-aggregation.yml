# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/mimir-aggregations.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'Regional SLI Metrics: topology-grpc - Burn-Rate 5m'
  interval: 1m
  rules:
  - record: gitlab_regional_sli_apdex:success:rate_5m
    labels:
      component: auth_requests
      monitor: global
      stage: main
      tier: sv
      type: topology-grpc
    expr: |
      (
        sum by (env,environment,region) (
          sli_aggregations:auth_request_duration_seconds_bucket:rate_5m{job="topology-service",le=~"1|1\\.0",type="topology-grpc"}
        )
        +
        sum by (env,environment,region) (
          sli_aggregations:auth_request_duration_seconds_bucket:rate_5m{job="topology-service",le=~"5|5\\.0",type="topology-grpc"}
        )
      )
      /
      2
  - record: gitlab_regional_sli_apdex:weight:score_5m
    labels:
      component: auth_requests
      monitor: global
      stage: main
      tier: sv
      type: topology-grpc
    expr: |
      sum by (env,environment,region) (
        sli_aggregations:auth_request_duration_seconds_bucket:rate_5m{job="topology-service",le="+Inf",type="topology-grpc"}
      )
  - record: gitlab_regional_sli_ops:rate_5m
    labels:
      component: auth_requests
      monitor: global
      stage: main
      tier: sv
      type: topology-grpc
    expr: |
      sum by (env,environment,region) (
        rate(auth_requests_total{job="topology-service",type="topology-grpc"}[5m])
      )
  - record: gitlab_regional_sli_errors:rate_5m
    labels:
      component: auth_requests
      monitor: global
      stage: main
      tier: sv
      type: topology-grpc
    expr: |
      (
        sum by (env,environment,region) (
          rate(auth_requests_total{job="topology-service",status="failure",type="topology-grpc"}[5m])
        )
      )
      or
      (
        0 * group by(env,environment,region) (
          gitlab_regional_sli_ops:rate_5m{component="auth_requests",monitor="global",stage="main",tier="sv",type="topology-grpc"}
        )
      )
  - record: gitlab_regional_sli_errors:ratio_5m
    labels:
      component: auth_requests
      monitor: global
      tier: sv
      type: topology-grpc
    expr: |
      sum by (env,environment,stage,region) (
        gitlab_regional_sli_errors:rate_5m{component="auth_requests",monitor="global",tier="sv",type="topology-grpc"}
      )
      /
      sum by (env,environment,stage,region) (
        gitlab_regional_sli_ops:rate_5m{component="auth_requests",monitor="global",tier="sv",type="topology-grpc"}
      )
  - record: gitlab_regional_sli_apdex:ratio_5m
    labels:
      component: auth_requests
      monitor: global
      tier: sv
      type: topology-grpc
    expr: |
      sum by (env,environment,stage,region) (
        gitlab_regional_sli_apdex:success:rate_5m{component="auth_requests",monitor="global",tier="sv",type="topology-grpc"}
      )
      /
      sum by (env,environment,stage,region) (
        gitlab_regional_sli_apdex:weight:score_5m{component="auth_requests",monitor="global",tier="sv",type="topology-grpc"}
      )
  - record: gitlab_regional_sli_ops:rate_5m
    labels:
      component: go_runtime
      monitor: global
      stage: main
      tier: sv
      type: topology-grpc
    expr: |
      sum by (env,environment,region) (
        rate(rpc_server_duration_milliseconds_count{job="topology-service",type="topology-grpc"}[5m])
      )
  - record: gitlab_regional_sli_errors:ratio_5m
    labels:
      component: go_runtime
      monitor: global
      tier: sv
      type: topology-grpc
    expr: |
      sum by (env,environment,stage,region) (
        gitlab_regional_sli_errors:rate_5m{component="go_runtime",monitor="global",tier="sv",type="topology-grpc"}
      )
      /
      sum by (env,environment,stage,region) (
        gitlab_regional_sli_ops:rate_5m{component="go_runtime",monitor="global",tier="sv",type="topology-grpc"}
      )
  - record: gitlab_regional_sli_apdex:ratio_5m
    labels:
      component: go_runtime
      monitor: global
      tier: sv
      type: topology-grpc
    expr: |
      sum by (env,environment,stage,region) (
        gitlab_regional_sli_apdex:success:rate_5m{component="go_runtime",monitor="global",tier="sv",type="topology-grpc"}
      )
      /
      sum by (env,environment,stage,region) (
        gitlab_regional_sli_apdex:weight:score_5m{component="go_runtime",monitor="global",tier="sv",type="topology-grpc"}
      )
