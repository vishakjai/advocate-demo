# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/sli_aggregations.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'SLI Aggregations: topology-grpc - auth_requests - 5m burn-rate'
  interval: 1m
  rules:
  - record: sli_aggregations:auth_request_duration_seconds_bucket:rate_5m
    expr: |
      sum by (component,env,environment,feature_category,fqdn,job,le,product_stage,reason,region,rpc_method,rpc_service,shard,stage,stage_group,tier,type) (
        rate(auth_request_duration_seconds_bucket{job=~"topology-service",type=~"topology-grpc"}[5m])
      )
  - record: sli_aggregations:auth_requests_total:rate_5m
    expr: |
      sum by (component,env,environment,feature_category,fqdn,job,product_stage,reason,region,rpc_method,rpc_service,shard,stage,stage_group,status,tier,type) (
        rate(auth_requests_total{job=~"topology-service",type=~"topology-grpc"}[5m])
      )
- name: 'SLI Aggregations: topology-grpc - go_runtime - 5m burn-rate'
  interval: 1m
  rules:
  - record: sli_aggregations:rpc_server_duration_milliseconds_count:rate_5m
    expr: |
      sum by (component,env,environment,feature_category,fqdn,grpc_status_code,instance,job,product_stage,region,rpc_method,rpc_service,shard,stage,stage_group,tier,type) (
        rate(rpc_server_duration_milliseconds_count{job=~"topology-service",type=~"topology-grpc"}[5m])
      )
- name: 'SLI Aggregations: topology-grpc - grpc_server - 5m burn-rate'
