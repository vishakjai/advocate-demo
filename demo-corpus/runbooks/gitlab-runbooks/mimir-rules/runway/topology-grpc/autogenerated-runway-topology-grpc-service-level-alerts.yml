# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/service-component-alerts.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'Service Component Alerts: topology-grpc'
  interval: 1m
  rules:
  - alert: TopologyGrpcServiceAuthRequestsApdexSLOViolation
    for: 2m
    annotations:
      title: The auth_requests SLI of the topology-grpc service (`{{ $labels.stage
        }}` stage) has an apdex violating SLO
      description: |
        RBAC mTLS authentication metrics for the Topology Service. Tracks authentication success/failure rates and authentication duration for all gRPC methods. Note: auth_request_duration_seconds histogram may have limited data until traffic ramps up — apdex thresholds will be tuned after real data.

        Currently the apdex value is {{ $value | humanizePercentage }}.
      grafana_dashboard_id: topology-grpc-main/topology-grpc-overview
      grafana_dashboard_link: https://dashboards.gitlab.net/d/topology-grpc-main/topology-grpc-overview?from=now-6h/m&to=now-1m/m&var-environment={{
        $labels.environment }}&var-stage={{ $labels.stage }}
      grafana_datasource_id: mimir-runway
      grafana_min_zoom_hours: "6"
      grafana_panel_id: "1253435697"
      grafana_variables: environment,stage
      promql_template_1: |
        histogram_quantile(
          0.950000,
          sum by (env,environment,tier,stage,le) (
            rate(auth_request_duration_seconds_bucket{environment="{{ $labels.environment }}",job="topology-service",stage="{{ $labels.stage }}",type="topology-grpc"}[5m])
          )
        )
      runbook: topology-grpc/#alerts
    labels:
      aggregation: component
      alert_class: slo_violation
      alert_type: symptom
      feature_category: not_owned
      rules_domain: general
      severity: s4
      sli_type: apdex
      slo_alert: "yes"
      team: cells_infrastructure
      user_impacting: "yes"
      window: 1h
    expr: |
      (
        (
          gitlab_component_apdex:ratio_1h{component="auth_requests",monitor="global",type="topology-grpc"}
          < (1 - 14.4 * 0.500000)
        )
        and on (env,environment,tier,type,stage,component)
        (
          gitlab_component_apdex:ratio_5m{component="auth_requests",monitor="global",type="topology-grpc"}
          < (1 - 14.4 * 0.500000)
        )
      )
      and on(env,environment,tier,type,stage,component)
      (
        sum by(env,environment,tier,type,stage,component) (gitlab_component_ops:rate_1h{component="auth_requests",monitor="global",type="topology-grpc"}) >= 1
      )
