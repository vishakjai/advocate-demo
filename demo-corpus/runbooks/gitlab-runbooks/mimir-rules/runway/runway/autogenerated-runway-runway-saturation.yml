# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/saturation.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: Saturation Rules (autogenerated)
  interval: 1m
  rules:
  - record: gitlab_component_saturation:ratio
    labels:
      component: nat_gateway_port_allocation
      stage: main
      tier: inf
      type: nat
    expr: |
      max by(env,environment,shard) (
        clamp_min(
          clamp_max(
            sum without(nat_ip) (
              stackdriver_nat_gateway_router_googleapis_com_nat_allocated_ports{}
            )
            /
            on(router_id, gateway_name, region, project_id) group_left
            gcp_cloud_nat_ports_capacity_total
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: open_fds
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            (
              process_open_fds{type="runway"}
              /
              process_max_fds{type="runway"}
            )
            or
            (
              ruby_file_descriptors{type="runway"}
              /
              ruby_process_max_fds{type="runway"}
            )
            or
            (
              node_filefd_allocated{type="runway"}
              /
              node_filefd_maximum{type="runway"}
            )
            ,
            1)
        ,
        0)
      )
