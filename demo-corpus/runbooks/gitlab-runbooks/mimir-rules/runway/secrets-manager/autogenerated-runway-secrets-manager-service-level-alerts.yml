# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/service-component-alerts.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'Service Component Alerts: secrets-manager'
  interval: 1m
  rules:
  - alert: SecretsManagerServiceOpenbaoRequestsTrafficCessation
    for: 5m
    annotations:
      title: The openbao_requests SLI of the secrets-manager service (`{{ $labels.stage
        }}` stage) has not received any traffic in the past 30m
      description: |
        This alert signifies that the SLI is reporting a cessation of traffic; the signal is present, but is zero.
      grafana_dashboard_id: secrets-manager-main/secrets-manager-overview
      grafana_dashboard_link: https://dashboards.gitlab.net/d/secrets-manager-main/secrets-manager-overview?from=now-6h/m&to=now-1m/m&var-environment={{
        $labels.environment }}&var-stage={{ $labels.stage }}
      grafana_datasource_id: mimir-runway
      grafana_min_zoom_hours: "6"
      grafana_panel_id: "2619383282"
      grafana_variables: environment,stage
      promql_template_1: |
        sum by (env,environment,tier,stage) (
          rate(secrets_manager_openbao_core_handle_request_count{environment="{{ $labels.environment }}",stage="{{ $labels.stage }}"}[5m])
        )
      runbook: secrets-manager/#alerts
    labels:
      aggregation: component
      alert_class: traffic_cessation
      alert_type: cause
      feature_category: secrets_management
      pager: pagerduty
      rules_domain: general
      severity: s2
      sli_type: ops
      slo_alert: "no"
      user_impacting: "yes"
    expr: |
      gitlab_component_ops:rate_30m{component="openbao_requests",monitor="global",stage="main",type="secrets-manager"} == 0
      and
      gitlab_component_ops:rate_30m{component="openbao_requests",monitor="global",stage="main",type="secrets-manager"} offset 1h >= 0.16666666666666666
  - alert: SecretsManagerServiceOpenbaoRequestsTrafficAbsent
    for: 30m
    annotations:
      title: The openbao_requests SLI of the secrets-manager service (`{{ $labels.stage
        }}` stage) has not reported any traffic in the past 30m
      description: |
        This alert signifies that the SLI was previously reporting traffic, but is no longer - the signal is absent.

        This could be caused by a change to the metrics used in the SLI, or by the service not receiving traffic.
      grafana_dashboard_id: secrets-manager-main/secrets-manager-overview
      grafana_dashboard_link: https://dashboards.gitlab.net/d/secrets-manager-main/secrets-manager-overview?from=now-6h/m&to=now-1m/m&var-environment={{
        $labels.environment }}&var-stage={{ $labels.stage }}
      grafana_datasource_id: mimir-runway
      grafana_min_zoom_hours: "6"
      grafana_panel_id: "2619383282"
      grafana_variables: environment,stage
      promql_template_1: |
        sum by (env,environment,tier,stage) (
          rate(secrets_manager_openbao_core_handle_request_count{environment="{{ $labels.environment }}",stage="{{ $labels.stage }}"}[5m])
        )
      runbook: secrets-manager/#alerts
    labels:
      aggregation: component
      alert_class: traffic_cessation
      alert_type: cause
      feature_category: secrets_management
      pager: pagerduty
      rules_domain: general
      severity: s2
      sli_type: ops
      slo_alert: "no"
      user_impacting: "yes"
    expr: |
      gitlab_component_ops:rate_5m{component="openbao_requests",monitor="global",stage="main",type="secrets-manager"} offset 1h
      unless
      gitlab_component_ops:rate_5m{component="openbao_requests",monitor="global",stage="main",type="secrets-manager"}
  - alert: SecretsManagerServiceRunwayIngressApdexSLOViolation
    for: 2m
    annotations:
      title: The runway_ingress SLI of the secrets-manager service (`{{ $labels.stage
        }}` stage) has an apdex violating SLO
      description: |
        Application load balancer serving ingress HTTP requests for the Runway service.

        Currently the apdex value is {{ $value | humanizePercentage }}.
      grafana_dashboard_id: secrets-manager-main/secrets-manager-overview
      grafana_dashboard_link: https://dashboards.gitlab.net/d/secrets-manager-main/secrets-manager-overview?from=now-6h/m&to=now-1m/m&var-environment={{
        $labels.environment }}&var-stage={{ $labels.stage }}
      grafana_datasource_id: mimir-runway
      grafana_min_zoom_hours: "6"
      grafana_panel_id: "3996186971"
      grafana_variables: environment,stage
      promql_template_1: |
        histogram_quantile(
          0.950000,
          sum by (env,environment,tier,stage,le) (
            avg_over_time(stackdriver_cloud_run_revision_run_googleapis_com_request_latencies_bucket{environment="{{ $labels.environment }}",response_code_class!~"4xx|5xx",stage="{{ $labels.stage }}",type="secrets-manager"}[5m])
          )
        )
      runbook: secrets-manager/#alerts
    labels:
      aggregation: component
      alert_class: slo_violation
      alert_type: symptom
      feature_category: secrets_management
      rules_domain: general
      severity: s4
      sli_type: apdex
      slo_alert: "yes"
      user_impacting: "yes"
      window: 1h
    expr: |
      (
        (
          gitlab_component_apdex:ratio_1h{component="runway_ingress",monitor="global",type="secrets-manager"}
          < (1 - 14.4 * 0.001000)
        )
        and on (env,environment,tier,type,stage,component)
        (
          gitlab_component_apdex:ratio_5m{component="runway_ingress",monitor="global",type="secrets-manager"}
          < (1 - 14.4 * 0.001000)
        )
      )
      and on(env,environment,tier,type,stage,component)
      (
        sum by(env,environment,tier,type,stage,component) (gitlab_component_ops:rate_1h{component="runway_ingress",monitor="global",type="secrets-manager"}) >= 1
      )
