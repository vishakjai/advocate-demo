# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/mimir-aggregations.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'Feature Category Metrics: duo-workflow-svc - Burn-Rate 5m'
  interval: 1m
  rules:
  - record: gitlab:component:feature_category:execution:ops:rate_5m
    labels:
      component: checkpoint_errors
      feature_category: duo_agent_platform
      monitor: global
      stage: main
      tier: sv
      type: duo-workflow-svc
    expr: |
      sum by (env,environment) (
        sli_aggregations:duo_workflow_checkpoint_total:rate_5m{type="duo-workflow-svc"} offset 30s
      )
  - record: gitlab:component:feature_category:execution:error:rate_5m
    labels:
      component: checkpoint_errors
      feature_category: duo_agent_platform
      monitor: global
      stage: main
      tier: sv
      type: duo-workflow-svc
    expr: |
      (
        sum by (env,environment) (
          sli_aggregations:duo_workflow_checkpoint_total:rate_5m{status_code=~"[45]..",type="duo-workflow-svc"} offset 30s
        )
      )
      or
      (
        0 * group by(env,environment) (
          gitlab:component:feature_category:execution:ops:rate_5m{component="checkpoint_errors",feature_category="duo_agent_platform",monitor="global",stage="main",tier="sv",type="duo-workflow-svc"}
        )
      )
  - record: gitlab:component:feature_category:execution:ops:rate_5m
    labels:
      component: llm
