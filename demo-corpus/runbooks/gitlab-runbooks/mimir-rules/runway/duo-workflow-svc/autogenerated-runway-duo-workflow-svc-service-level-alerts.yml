# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/service-component-alerts.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'Service Component Alerts: duo-workflow-svc'
  interval: 1m
  rules:
  - alert: DuoWorkflowSvcServiceCheckpointErrorsErrorSLOViolation
    for: 2m
    annotations:
      title: The checkpoint_errors SLI of the duo-workflow-svc service (`{{ $labels.stage
        }}` stage) has an error rate violating SLO
      description: |
        This SLI monitors checkpoint errors in Duo Workflow Service. Tracks checkpoint operation failures that could impact workflow persistence.

        Currently the error-rate is {{ $value | humanizePercentage }}.
      grafana_dashboard_id: duo-workflow-svc-main/duo-workflow-svc-overview
      grafana_dashboard_link: https://dashboards.gitlab.net/d/duo-workflow-svc-main/duo-workflow-svc-overview?from=now-6h/m&to=now-1m/m&var-environment={{
        $labels.environment }}&var-stage={{ $labels.stage }}
      grafana_datasource_id: mimir-runway
      grafana_min_zoom_hours: "6"
      grafana_panel_id: "1506666722"
      grafana_variables: environment,stage
      promql_template_1: |
        sum by (env,environment,tier,stage) (
          rate(duo_workflow_checkpoint_total{environment="{{ $labels.environment }}",stage="{{ $labels.stage }}",status_code=~"[45]..",type="duo-workflow-svc"}[5m])
        )
      runbook: duo-workflow-svc/#alerts
    labels:
      aggregation: component
      alert_class: slo_violation
      alert_type: symptom
      confidence: 98%
      feature_category: duo_agent_platform
      pager: pagerduty
      rules_domain: general
      severity: s2
      sli_type: error
      slo_alert: "yes"
      user_impacting: "yes"
      window: 1h
    expr: |
      (
        (
          gitlab_component_errors:confidence:ratio_1h{component="checkpoint_errors",confidence="98%",monitor="global",type="duo-workflow-svc"}
          > (14.4 * 0.050000)
        )
        and on (env,environment,tier,type,stage,component)
        (
          gitlab_component_errors:confidence:ratio_5m{component="checkpoint_errors",confidence="98%",monitor="global",type="duo-workflow-svc"}
          > (14.4 * 0.050000)
        )
      )
      and on(env,environment,tier,type,stage,component)
      (
        sum by(env,environment,tier,type,stage,component) (gitlab_component_ops:rate_1h{component="checkpoint_errors",monitor="global",type="duo-workflow-svc"}) >= 1
      )
