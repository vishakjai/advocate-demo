# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/service-slos.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: Autogenerated Service SLOs
  interval: 5m
  rules:
  - record: slo:min:events:gitlab_service_apdex:ratio
    labels:
      monitor: global
      tier: sv
      type: duo-workflow-svc
    expr: "0.950000"
  - record: slo:max:events:gitlab_service_errors:ratio
    labels:
      monitor: global
      tier: sv
      type: duo-workflow-svc
    expr: "0.050000"
  - record: slo:max:events:gitlab_service_errors:ratio
    labels:
      component: checkpoint_errors
      monitor: global
      tier: sv
      type: duo-workflow-svc
    expr: "0.050000"
  - record: slo:max:events:gitlab_service_errors:ratio
    labels:
      component: llm
      monitor: global
      tier: sv
      type: duo-workflow-svc
    expr: "0.010000"
  - record: slo:max:events:gitlab_service_errors:ratio
    labels:
      component: llm_finish_reason
      monitor: global
      tier: sv
      type: duo-workflow-svc
    expr: "0.050000"
  - record: slo:min:events:gitlab_service_apdex:ratio
    labels:
      component: runway_ingress
      monitor: global
      tier: sv
      type: duo-workflow-svc
    expr: "0.950000"
