# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/mimir-aggregations.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'Global SLI Metrics: duo-workflow-svc - Burn-Rate 5m'
  interval: 1m
  rules:
  - record: gitlab_component_ops:rate_5m
    labels:
      component: checkpoint_errors
      monitor: global
      stage: main
      tier: sv
      type: duo-workflow-svc
    expr: |
      sum by (env,environment) (
        sli_aggregations:duo_workflow_checkpoint_total:rate_5m{type="duo-workflow-svc"}
      )
  - record: gitlab_component_errors:rate_5m
    labels:
      component: checkpoint_errors
      monitor: global
      stage: main
      tier: sv
      type: duo-workflow-svc
    expr: |
      (
        sum by (env,environment) (
          sli_aggregations:duo_workflow_checkpoint_total:rate_5m{status_code=~"[45]..",type="duo-workflow-svc"}
        )
      )
      or
      (
        0 * group by(env,environment) (
          gitlab_component_ops:rate_5m{component="checkpoint_errors",monitor="global",stage="main",tier="sv",type="duo-workflow-svc"}
        )
      )
  - record: gitlab_component_errors:ratio_5m
    labels:
      component: checkpoint_errors
      monitor: global
      tier: sv
      type: duo-workflow-svc
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_errors:rate_5m{component="checkpoint_errors",monitor="global",tier="sv",type="duo-workflow-svc"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_ops:rate_5m{component="checkpoint_errors",monitor="global",tier="sv",type="duo-workflow-svc"}
      )
  - record: gitlab_component_apdex:ratio_5m
    labels:
      component: checkpoint_errors
      monitor: global
      tier: sv
      type: duo-workflow-svc
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_apdex:success:rate_5m{component="checkpoint_errors",monitor="global",tier="sv",type="duo-workflow-svc"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_apdex:weight:score_5m{component="checkpoint_errors",monitor="global",tier="sv",type="duo-workflow-svc"}
      )
  - record: gitlab_component_errors:confidence:ratio_5m
    labels:
      component: checkpoint_errors
      confidence: 98%
      monitor: global
      tier: sv
      type: duo-workflow-svc
    expr: |
      (gitlab_component_ops:rate_5m{component="checkpoint_errors",monitor="global",tier="sv",type="duo-workflow-svc"} == 0)
      or
      clamp(
        (
          (
            (gitlab_component_errors:rate_5m{component="checkpoint_errors",monitor="global",tier="sv",type="duo-workflow-svc"} / gitlab_component_ops:rate_5m{component="checkpoint_errors",monitor="global",tier="sv",type="duo-workflow-svc"})
            +
            5.411894 / (2 * (gitlab_component_ops:rate_5m{component="checkpoint_errors",monitor="global",tier="sv",type="duo-workflow-svc"} * 300))
          )
          -
          2.326348
          *
          sqrt(
            (
              (gitlab_component_errors:rate_5m{component="checkpoint_errors",monitor="global",tier="sv",type="duo-workflow-svc"} / gitlab_component_ops:rate_5m{component="checkpoint_errors",monitor="global",tier="sv",type="duo-workflow-svc"}) * (1 - (gitlab_component_errors:rate_5m{component="checkpoint_errors",monitor="global",tier="sv",type="duo-workflow-svc"} / gitlab_component_ops:rate_5m{component="checkpoint_errors",monitor="global",tier="sv",type="duo-workflow-svc"}))
              +
              5.411894 / (4 * (gitlab_component_ops:rate_5m{component="checkpoint_errors",monitor="global",tier="sv",type="duo-workflow-svc"} * 300))
            )
            /
            (gitlab_component_ops:rate_5m{component="checkpoint_errors",monitor="global",tier="sv",type="duo-workflow-svc"} * 300)
          )
        )
        /
        (1 + 5.411894 / (gitlab_component_ops:rate_5m{component="checkpoint_errors",monitor="global",tier="sv",type="duo-workflow-svc"} * 300)),
        0, 1
      )
