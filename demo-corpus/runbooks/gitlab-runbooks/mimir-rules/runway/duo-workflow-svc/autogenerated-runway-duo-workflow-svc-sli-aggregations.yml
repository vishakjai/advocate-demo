# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/sli_aggregations.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'SLI Aggregations: duo-workflow-svc - checkpoint_errors - 5m burn-rate'
  interval: 1m
  rules:
  - record: sli_aggregations:duo_workflow_checkpoint_total:rate_5m
    expr: |
      sum by (client_type,component,env,environment,feature_category,fqdn,gitlab_realm,gitlab_version,lsp_version,product_stage,region,shard,stage,stage_group,status_code,tier,type) (
        rate(duo_workflow_checkpoint_total{type=~"duo-workflow-svc"}[5m])
      )
- name: 'SLI Aggregations: duo-workflow-svc - llm - 5m burn-rate'
  interval: 1m
  rules:
  - record: sli_aggregations:model_inferences_total:rate_5m
    expr: |
      sum by (client_type,component,env,environment,error,error_type,feature_category,finish_reason,fqdn,gitlab_realm,gitlab_version,lsp_version,model_engine,model_name,product_stage,region,shard,stage,stage_group,tier,type) (
        rate(model_inferences_total{type=~"duo-workflow-svc"}[5m])
      )
- name: 'SLI Aggregations: duo-workflow-svc - runway_ingress - 5m burn-rate'
  interval: 1m
  rules:
  - record: sli_aggregations:stackdriver_cloud_run_revision_run_googleapis_com_request_count:rate_5m
    expr: |
      sum by (component,env,environment,feature_category,fqdn,product_stage,region,response_code,response_code_class,revision_name,shard,stage,stage_group,tier,type) (
        rate(stackdriver_cloud_run_revision_run_googleapis_com_request_count{type=~"duo-workflow-svc"}[5m])
      )
  - record: sli_aggregations:stackdriver_cloud_run_revision_run_googleapis_com_request_latencies_bucket:rate_5m
    expr: |
      sum by (component,env,environment,feature_category,fqdn,le,product_stage,region,response_code,response_code_class,revision_name,shard,stage,stage_group,tier,type) (
        rate(stackdriver_cloud_run_revision_run_googleapis_com_request_latencies_bucket{type=~"duo-workflow-svc"}[5m])
      )
- name: 'SLI Aggregations: duo-workflow-svc - runway_lb - 5m burn-rate'
  interval: 1m
  rules:
  - record: sli_aggregations:stackdriver_https_lb_rule_loadbalancing_googleapis_com_https_request_count:rate_5m
    expr: |
      sum by (component,env,environment,feature_category,fqdn,job,product_stage,proxy_continent,region,response_code,response_code_class,shard,stage,stage_group,tier,type,url_map_name) (
        rate(stackdriver_https_lb_rule_loadbalancing_googleapis_com_https_request_count{job=~"runway-exporter",url_map_name=~"duo-workflow-svc-url-map"}[5m])
      )
- name: 'SLI Aggregations: duo-workflow-svc - server_chat - 5m burn-rate'
  interval: 1m
  rules:
  - record: sli_aggregations:duo_workflow_time_to_first_response_seconds_bucket:rate_5m
    expr: |
      sum by (client_type,component,env,environment,feature_category,flow_type,fqdn,gitlab_realm,gitlab_version,grpc_code,grpc_method,grpc_service,grpc_type,le,lsp_version,product_stage,region,shard,stage,stage_group,tier,type) (
        rate(duo_workflow_time_to_first_response_seconds_bucket{gitlab_realm=~"saas",type=~"duo-workflow-svc"}[5m])
      )
  - record: sli_aggregations:grpc_server_handled_total:rate_5m
    expr: |
      sum by (client_type,component,env,environment,feature_category,flow_type,fqdn,gitlab_realm,gitlab_version,grpc_code,grpc_method,grpc_service,grpc_type,lsp_version,product_stage,region,shard,stage,stage_group,tier,type) (
        rate(grpc_server_handled_total{type=~"duo-workflow-svc"}[5m])
      )
