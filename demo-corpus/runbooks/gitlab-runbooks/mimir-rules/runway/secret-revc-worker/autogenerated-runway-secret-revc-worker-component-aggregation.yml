# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/mimir-aggregations.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'Global SLI Metrics: secret-revc-worker - Burn-Rate 5m'
  interval: 1m
  rules:
  - record: gitlab_component_apdex:success:rate_5m
    labels:
      component: runway_ingress
      monitor: global
      stage: main
      tier: sv
      type: secret-revc-worker
    expr: |
      sum by (env,environment) (
        avg_over_time(stackdriver_cloud_run_revision_run_googleapis_com_request_latencies_bucket{le="1067.1895716335973",response_code_class!~"4xx|5xx",type="secret-revc-worker"}[5m])
      )
  - record: gitlab_component_apdex:weight:score_5m
    labels:
      component: runway_ingress
      monitor: global
      stage: main
      tier: sv
      type: secret-revc-worker
    expr: |
      sum by (env,environment) (
        avg_over_time(stackdriver_cloud_run_revision_run_googleapis_com_request_latencies_bucket{le="+Inf",response_code_class!~"4xx|5xx",type="secret-revc-worker"}[5m])
      )
  - record: gitlab_component_ops:rate_5m
    labels:
      component: runway_ingress
      monitor: global
      stage: main
      tier: sv
      type: secret-revc-worker
    expr: |
      sum by (env,environment) (
        avg_over_time(stackdriver_cloud_run_revision_run_googleapis_com_request_count{type="secret-revc-worker"}[5m]) / 60
      )
  - record: gitlab_component_errors:rate_5m
    labels:
      component: runway_ingress
      monitor: global
      stage: main
      tier: sv
      type: secret-revc-worker
    expr: |
      (
        sum by (env,environment) (
          avg_over_time(stackdriver_cloud_run_revision_run_googleapis_com_request_count{response_code_class="5xx",type="secret-revc-worker"}[5m]) / 60
        )
      )
      or
      (
        0 * group by(env,environment) (
          gitlab_component_ops:rate_5m{component="runway_ingress",monitor="global",stage="main",tier="sv",type="secret-revc-worker"}
        )
      )
  - record: gitlab_component_errors:ratio_5m
    labels:
      component: runway_ingress
      monitor: global
      tier: sv
      type: secret-revc-worker
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_errors:rate_5m{component="runway_ingress",monitor="global",tier="sv",type="secret-revc-worker"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_ops:rate_5m{component="runway_ingress",monitor="global",tier="sv",type="secret-revc-worker"}
      )
  - record: gitlab_component_apdex:ratio_5m
    labels:
      component: runway_ingress
      monitor: global
      tier: sv
      type: secret-revc-worker
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_apdex:success:rate_5m{component="runway_ingress",monitor="global",tier="sv",type="secret-revc-worker"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_apdex:weight:score_5m{component="runway_ingress",monitor="global",tier="sv",type="secret-revc-worker"}
      )
