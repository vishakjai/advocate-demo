groups:
- name: 'Regional SLI Metrics: topology-rest - Burn-Rate 5m'
  interval: 1m
  rules:
  - record: gitlab_regional_sli_ops:rate_5m
    labels:
      component: go_runtime
      monitor: global
      stage: main
      tier: sv
      type: topology-rest
    expr: |
      sum by (env,environment,region) (
        rate(topology_service_http_requests_total{job="topology-service",type="topology-rest"}[5m])
      )
  - record: gitlab_regional_sli_errors:ratio_5m
    labels:
      component: go_runtime
      monitor: global
      tier: sv
      type: topology-rest
    expr: |
      sum by (env,environment,stage,region) (
        gitlab_regional_sli_errors:rate_5m{component="go_runtime",monitor="global",tier="sv",type="topology-rest"}
      )
      /
      sum by (env,environment,stage,region) (
        gitlab_regional_sli_ops:rate_5m{component="go_runtime",monitor="global",tier="sv",type="topology-rest"}
      )
  - record: gitlab_regional_sli_apdex:ratio_5m
