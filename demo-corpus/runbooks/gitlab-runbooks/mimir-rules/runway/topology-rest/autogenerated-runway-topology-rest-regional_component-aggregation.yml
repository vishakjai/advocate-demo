      component: go_runtime
      monitor: global
      tier: sv
      type: topology-rest
    expr: |
      sum by (env,environment,stage,region) (
        gitlab_regional_sli_apdex:success:rate_5m{component="go_runtime",monitor="global",tier="sv",type="topology-rest"}
      )
      /
      sum by (env,environment,stage,region) (
        gitlab_regional_sli_apdex:weight:score_5m{component="go_runtime",monitor="global",tier="sv",type="topology-rest"}
      )
