        sum by (env,environment,tier,stage) (
          rate(topology_service_http_requests_total{environment="{{ $labels.environment }}",job="topology-service",stage="{{ $labels.stage }}",type="topology-rest"}[5m])
        )
      runbook: topology-rest/#alerts
    labels:
      aggregation: component
      alert_class: traffic_cessation
      alert_type: cause
      feature_category: not_owned
      rules_domain: general
      severity: s4
      sli_type: ops
      slo_alert: "no"
      team: cells_infrastructure
      user_impacting: "no"
    expr: |
      gitlab_component_ops:rate_5m{component="go_runtime",monitor="global",stage="main",type="topology-rest"} offset 1h
      unless
      gitlab_component_ops:rate_5m{component="go_runtime",monitor="global",stage="main",type="topology-rest"}
