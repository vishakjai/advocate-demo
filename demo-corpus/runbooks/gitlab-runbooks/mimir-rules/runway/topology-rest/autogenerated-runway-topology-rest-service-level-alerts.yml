  - alert: TopologyRestServiceHttpServerApdexSLOViolation
    for: 2m
    annotations:
      title: The http_server SLI of the topology-rest service (`{{ $labels.stage }}`
        stage) has an apdex violating SLO
      description: |
        HTTP REST API request performance from OTEL instrumentation. Tracks request latency, rate, and errors across all HTTP endpoints.

        Currently the apdex value is {{ $value | humanizePercentage }}.
      grafana_dashboard_id: topology-rest-main/topology-rest-overview
      grafana_dashboard_link: https://dashboards.gitlab.net/d/topology-rest-main/topology-rest-overview?from=now-6h/m&to=now-1m/m&var-environment={{
        $labels.environment }}&var-stage={{ $labels.stage }}
      grafana_datasource_id: mimir-runway
      grafana_min_zoom_hours: "6"
      grafana_panel_id: "2668530772"
      grafana_variables: environment,stage
      promql_template_1: |
        histogram_quantile(
          0.950000,
          sum by (env,environment,tier,stage,le) (
            rate(topology_service_http_request_duration_seconds_bucket{environment="{{ $labels.environment }}",job="topology-service",stage="{{ $labels.stage }}",type="topology-rest"}[5m])
          )
        )
      runbook: topology-rest/#alerts
    labels:
      aggregation: component
      alert_class: slo_violation
      alert_type: symptom
      feature_category: not_owned
      rules_domain: general
      severity: s4
      sli_type: apdex
      slo_alert: "yes"
      team: cells_infrastructure
      user_impacting: "yes"
      window: 1h
    expr: |
      (
        (
          gitlab_component_apdex:ratio_1h{component="http_server",monitor="global",type="topology-rest"}
          < (1 - 14.4 * 0.500000)
        )
        and on (env,environment,tier,type,stage,component)
        (
          gitlab_component_apdex:ratio_5m{component="http_server",monitor="global",type="topology-rest"}
          < (1 - 14.4 * 0.500000)
        )
      )
      and on(env,environment,tier,type,stage,component)
      (
        sum by(env,environment,tier,type,stage,component) (gitlab_component_ops:rate_1h{component="http_server",monitor="global",type="topology-rest"}) >= 1
      )
