    labels:
      aggregation: regional_component
      alert_class: slo_violation
      alert_type: symptom
      feature_category: not_owned
      rules_domain: general
      severity: s3
      sli_type: error
      slo_alert: "yes"
      team: cells_infrastructure
      user_impacting: "yes"
      window: 6h
    expr: |
      (
        (
          gitlab_regional_sli_errors:ratio_6h{component="runway_lb",monitor="global",type="topology-rest"}
          > (6 * 0.000500)
        )
        and on (env,environment,tier,type,stage,region,component)
        (
          gitlab_regional_sli_errors:ratio_30m{component="runway_lb",monitor="global",type="topology-rest"}
          > (6 * 0.000500)
        )
      )
      and on(env,environment,tier,type,stage,region,component)
      (
        sum by(env,environment,tier,type,stage,region,component) (gitlab_regional_sli_ops:rate_6h{component="runway_lb",monitor="global",type="topology-rest"}) >= 0.16667
      )
