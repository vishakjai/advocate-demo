# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/service-component-alerts.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'Service Component Alerts: topology-rest'
  interval: 1m
  rules:
  - alert: TopologyRestServiceGoRuntimeTrafficCessation
    for: 5m
    annotations:
      title: The go_runtime SLI of the topology-rest service (`{{ $labels.stage }}`
        stage) has not received any traffic in the past 30m
      description: |
        Go runtime metrics: goroutines, garbage collection, memory statistics. Monitors Go-specific runtime behavior and performance characteristics.

        This alert signifies that the SLI is reporting a cessation of traffic; the signal is present, but is zero.
      grafana_dashboard_id: topology-rest-main/topology-rest-overview
      grafana_dashboard_link: https://dashboards.gitlab.net/d/topology-rest-main/topology-rest-overview?from=now-6h/m&to=now-1m/m&var-environment={{
        $labels.environment }}&var-stage={{ $labels.stage }}
      grafana_datasource_id: mimir-runway
      grafana_min_zoom_hours: "6"
      grafana_panel_id: "3555588286"
      grafana_variables: environment,stage
      promql_template_1: |
        sum by (env,environment,tier,stage) (
          rate(topology_service_http_requests_total{environment="{{ $labels.environment }}",job="topology-service",stage="{{ $labels.stage }}",type="topology-rest"}[5m])
        )
      runbook: topology-rest/#alerts
    labels:
      aggregation: component
      alert_class: traffic_cessation
      alert_type: cause
      feature_category: not_owned
      rules_domain: general
      severity: s4
      sli_type: ops
      slo_alert: "no"
      team: cells_infrastructure
      user_impacting: "no"
    expr: |
      gitlab_component_ops:rate_30m{component="go_runtime",monitor="global",stage="main",type="topology-rest"} == 0
      and
      gitlab_component_ops:rate_30m{component="go_runtime",monitor="global",stage="main",type="topology-rest"} offset 1h >= 0.16666666666666666
  - alert: TopologyRestServiceGoRuntimeTrafficAbsent
    for: 30m
    annotations:
      title: The go_runtime SLI of the topology-rest service (`{{ $labels.stage }}`
        stage) has not reported any traffic in the past 30m
      description: |
        Go runtime metrics: goroutines, garbage collection, memory statistics. Monitors Go-specific runtime behavior and performance characteristics.

        This alert signifies that the SLI was previously reporting traffic, but is no longer - the signal is absent.

        This could be caused by a change to the metrics used in the SLI, or by the service not receiving traffic.
      grafana_dashboard_id: topology-rest-main/topology-rest-overview
      grafana_dashboard_link: https://dashboards.gitlab.net/d/topology-rest-main/topology-rest-overview?from=now-6h/m&to=now-1m/m&var-environment={{
        $labels.environment }}&var-stage={{ $labels.stage }}
