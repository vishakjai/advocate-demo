# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/sli_aggregations.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'SLI Aggregations: topology-rest - go_runtime - 5m burn-rate'
  interval: 1m
  rules:
  - record: sli_aggregations:topology_service_http_requests_total:rate_5m
    expr: |
      sum by (code,component,env,environment,feature_category,fqdn,instance,job,method,product_stage,region,route,shard,stage,stage_group,tier,type) (
        rate(topology_service_http_requests_total{job=~"topology-service",type=~"topology-rest"}[5m])
      )
- name: 'SLI Aggregations: topology-rest - http_server - 5m burn-rate'
  interval: 1m
  rules:
  - record: sli_aggregations:topology_service_http_request_duration_seconds_bucket:rate_5m
    expr: |
      sum by (code,component,env,environment,feature_category,fqdn,job,le,method,product_stage,region,route,shard,stage,stage_group,tier,type) (
        rate(topology_service_http_request_duration_seconds_bucket{job=~"topology-service",type=~"topology-rest"}[5m])
      )
- name: 'SLI Aggregations: topology-rest - runway_ingress - 5m burn-rate'
  interval: 1m
  rules:
  - record: sli_aggregations:stackdriver_cloud_run_revision_run_googleapis_com_request_count:rate_5m
    expr: |
      sum by (component,env,environment,feature_category,fqdn,location,product_stage,region,response_code,response_code_class,revision_name,shard,stage,stage_group,tier,type) (
        rate(stackdriver_cloud_run_revision_run_googleapis_com_request_count{type=~"topology-rest"}[5m])
      )
  - record: sli_aggregations:stackdriver_cloud_run_revision_run_googleapis_com_request_latencies_bucket:rate_5m
    expr: |
      sum by (component,env,environment,feature_category,fqdn,le,location,product_stage,region,response_code,response_code_class,revision_name,shard,stage,stage_group,tier,type) (
        rate(stackdriver_cloud_run_revision_run_googleapis_com_request_latencies_bucket{type=~"topology-rest"}[5m])
      )
- name: 'SLI Aggregations: topology-rest - runway_lb - 5m burn-rate'
  interval: 1m
  rules:
  - record: sli_aggregations:stackdriver_https_lb_rule_loadbalancing_googleapis_com_https_request_count:rate_5m
