# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/service-slos.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: Autogenerated Service SLOs
  interval: 5m
  rules:
  - record: slo:max:events:gitlab_service_errors:ratio
    labels:
      component: job_infra_failure_ratio
      monitor: global
      tier: sv
      type: ci-orchestration
    expr: "0.050000"
  - record: slo:min:events:gitlab_service_apdex:ratio
    labels:
      component: non_shared_runner_job_queue_duration
      monitor: global
      tier: sv
      type: ci-orchestration
    expr: "0.950000"
  - record: slo:min:events:gitlab_service_apdex:ratio
    labels:
      component: pipeline_creation_sidekiq_execution
      monitor: global
      tier: sv
      type: ci-orchestration
    expr: "0.990000"
  - record: slo:max:events:gitlab_service_errors:ratio
    labels:
      component: pipeline_creation_sidekiq_execution
      monitor: global
      tier: sv
      type: ci-orchestration
    expr: "0.000500"
  - record: slo:min:events:gitlab_service_apdex:ratio
    labels:
      component: pipeline_creation_sidekiq_queue_duration
      monitor: global
      tier: sv
      type: ci-orchestration
    expr: "0.990000"
  - record: slo:min:events:gitlab_service_apdex:ratio
    labels:
      component: pipeline_processing_sidekiq_execution
      monitor: global
      tier: sv
      type: ci-orchestration
    expr: "0.990000"
  - record: slo:max:events:gitlab_service_errors:ratio
    labels:
      component: pipeline_processing_sidekiq_execution
      monitor: global
      tier: sv
      type: ci-orchestration
    expr: "0.000500"
  - record: slo:min:events:gitlab_service_apdex:ratio
    labels:
      component: pipeline_processing_sidekiq_queueing
      monitor: global
      tier: sv
      type: ci-orchestration
    expr: "0.990000"
  - record: slo:min:events:gitlab_service_apdex:ratio
    labels:
      component: shared_runner_job_queue_duration
      monitor: global
      tier: sv
      type: ci-orchestration
    expr: "0.900000"
  - record: gitlab_component_service:mapping
    labels:
      component: job_infra_failure_ratio
      global_aggregation: "no"
      monitor: global
      regional_aggregation: "no"
      service_aggregation: "no"
      tier: sv
      type: ci-orchestration
    expr: "1"
  - record: gitlab_component_service:mapping
    labels:
      component: non_shared_runner_job_queue_duration
      global_aggregation: "no"
      monitor: global
      regional_aggregation: "no"
      service_aggregation: "no"
      tier: sv
      type: ci-orchestration
    expr: "1"
  - record: gitlab_component_service:mapping
    labels:
      component: pipeline_creation_sidekiq_execution
      global_aggregation: "no"
      monitor: global
      regional_aggregation: "no"
      service_aggregation: "no"
      tier: sv
      type: ci-orchestration
    expr: "1"
  - record: gitlab_component_service:mapping
    labels:
      component: pipeline_creation_sidekiq_queue_duration
      global_aggregation: "no"
      monitor: global
      regional_aggregation: "no"
      service_aggregation: "no"
      tier: sv
      type: ci-orchestration
    expr: "1"
  - record: gitlab_component_service:mapping
    labels:
      component: pipeline_processing_sidekiq_execution
      global_aggregation: "no"
      monitor: global
      regional_aggregation: "no"
      service_aggregation: "no"
      tier: sv
      type: ci-orchestration
    expr: "1"
  - record: gitlab_component_service:mapping
    labels:
      component: pipeline_processing_sidekiq_queueing
      global_aggregation: "no"
      monitor: global
      regional_aggregation: "no"
      service_aggregation: "no"
      tier: sv
      type: ci-orchestration
    expr: "1"
  - record: gitlab_component_service:mapping
    labels:
      component: pipelines_created
      global_aggregation: "no"
      monitor: global
      regional_aggregation: "no"
      service_aggregation: "no"
      tier: sv
      type: ci-orchestration
    expr: "1"
  - record: gitlab_component_service:mapping
    labels:
      component: shared_runner_job_queue_duration
      global_aggregation: "no"
      monitor: global
      regional_aggregation: "no"
      service_aggregation: "no"
      tier: sv
      type: ci-orchestration
    expr: "1"
