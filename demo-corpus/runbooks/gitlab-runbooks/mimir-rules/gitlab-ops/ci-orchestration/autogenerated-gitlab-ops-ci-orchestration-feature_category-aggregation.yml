# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/mimir-aggregations.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'Feature Category Metrics: ci-orchestration - Burn-Rate 5m'
  interval: 1m
  rules:
  - record: gitlab:component:feature_category:execution:ops:rate_5m
    labels:
      component: job_infra_failure_ratio
      feature_category: continuous_integration
      monitor: global
      stage: main
      tier: sv
      type: ci-orchestration
    expr: |
      sum by (env,environment) (
        sli_aggregations:gitlab_ci_job_failure_reasons:rate_5m{env="ops"} offset 30s
      )
  - record: gitlab:component:feature_category:execution:error:rate_5m
    labels:
      component: job_infra_failure_ratio
      feature_category: continuous_integration
      monitor: global
      stage: main
      tier: sv
      type: ci-orchestration
    expr: |
      (
        sum by (env,environment) (
          sli_aggregations:gitlab_ci_job_failure_reasons:rate_5m{env="ops",reason!~"script_failure|ci_quota_exceeded|builds_disabled|user_blocked|stale_schedule|forward_deployment_failure|failed_outdated_deployment_job|api_failure|downstream_pipeline_creation_failed|downstream_bridge_project_not_found|insufficient_bridge_permissions|protected_environment_failure|no_matching_runner|runner_unsupported|secrets_provider_not_found|ip_restriction_failure|deployment_rejected|duo_workflow_not_allowed|invalid_bridge_trigger|job_token_expired|pipeline_loop_detected|reached_max_descendant_pipelines_depth|trace_size_exceeded|unmet_prerequisites|upstream_bridge_project_not_found|job_execution_timeout|missing_dependency_failure"} offset 30s
        )
      )
      or
      (
        0 * group by(env,environment) (
          gitlab:component:feature_category:execution:ops:rate_5m{component="job_infra_failure_ratio",env="ops",feature_category="continuous_integration",monitor="global",stage="main",tier="sv",type="ci-orchestration"}
        )
      )
  - record: gitlab:component:feature_category:execution:apdex:success:rate_5m
    labels:
      component: non_shared_runner_job_queue_duration
      feature_category: continuous_integration
      monitor: global
      stage: main
      tier: sv
      type: ci-orchestration
    expr: |
      sum by (env,environment) (
        sli_aggregations:job_queue_duration_seconds_bucket:rate_5m{env="ops",le=~"30|30\\.0",shared_runner="false"}
      )
  - record: gitlab:component:feature_category:execution:apdex:weight:score_5m
    labels:
      component: non_shared_runner_job_queue_duration
      feature_category: continuous_integration
      monitor: global
      stage: main
      tier: sv
      type: ci-orchestration
    expr: |
      sum by (env,environment) (
        sli_aggregations:job_queue_duration_seconds_bucket:rate_5m{env="ops",le="+Inf",shared_runner="false"}
      )
  - record: gitlab:component:feature_category:execution:ops:rate_5m
    labels:
