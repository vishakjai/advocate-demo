# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/sli_aggregations.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'SLI Aggregations: argocd - istio_public_ingress - 5m burn-rate'
  interval: 1m
  rules:
  - record: sli_aggregations:istio_request_duration_milliseconds_bucket:rate_5m
    expr: |
      sum by (component,destination_service,destination_workload,env,environment,feature_category,fqdn,le,product_stage,region,response_code,shard,source_workload,stage,stage_group,tier,type) (
        rate(istio_request_duration_milliseconds_bucket{destination_workload=~"argocd-server",env="ops",source_workload=~"istio-gateway"}[5m])
      )
  - record: sli_aggregations:istio_requests_total:rate_5m
    expr: |
      sum by (component,destination_service,destination_workload,env,environment,feature_category,fqdn,product_stage,region,response_code,shard,source_workload,stage,stage_group,tier,type) (
        rate(istio_requests_total{destination_workload=~"argocd-server",env="ops",source_workload=~"istio-gateway"}[5m])
      )
- name: 'SLI Aggregations: argocd - redis_client - 5m burn-rate'
  interval: 1m
  rules:
  - record: sli_aggregations:argocd_redis_request_duration_seconds_bucket:rate_5m
    expr: |
      sum by (component,env,environment,feature_category,fqdn,le,product_stage,region,shard,stage,stage_group,tier,type) (
        rate(argocd_redis_request_duration_seconds_bucket{env="ops",type=~"argocd"}[5m])
      )
  - record: sli_aggregations:argocd_redis_request_total:rate_5m
    expr: |
      sum by (component,env,environment,failed,feature_category,fqdn,product_stage,region,shard,stage,stage_group,tier,type) (
        rate(argocd_redis_request_total{env="ops",failed=~"false|true",type=~"argocd"}[5m])
      )
- name: 'SLI Aggregations: argocd - redis_primary_server - 5m burn-rate'
  interval: 1m
  rules:
  - record: sli_aggregations:redis_commands_processed_total:rate_5m
    expr: |
      sum by (component,env,environment,feature_category,fqdn,instance,product_stage,region,shard,stage,stage_group,tier,type) (
        rate(redis_commands_processed_total{env="ops",type=~"argocd"}[5m])
      )
