# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/service-component-alerts.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'Service Component Alerts: argocd'
  interval: 1m
  rules:
  - alert: ArgocdServiceIstioPublicIngressApdexSLOViolation
    for: 2m
    annotations:
      title: The istio_public_ingress SLI of the argocd service (`{{ $labels.stage
        }}` stage) has an apdex violating SLO
      description: |
        Currently the apdex value is {{ $value | humanizePercentage }}.
      grafana_dashboard_id: argocd-main/argocd-overview
      grafana_dashboard_link: https://dashboards.gitlab.net/d/argocd-main/argocd-overview?from=now-6h/m&to=now-1m/m&var-environment={{
        $labels.environment }}&var-stage={{ $labels.stage }}
      grafana_datasource_id: mimir-gitlab-ops
      grafana_min_zoom_hours: "6"
      grafana_panel_id: "1170118037"
      grafana_variables: environment,stage
      promql_template_1: |
        histogram_quantile(
          0.950000,
          sum by (env,environment,tier,stage,le) (
            rate(istio_request_duration_milliseconds_bucket{destination_workload="argocd-server",environment="{{ $labels.environment }}",source_workload="istio-gateway",stage="{{ $labels.stage }}"}[5m])
          )
        )
      runbook: argocd/#alerts
    labels:
      aggregation: component
      alert_class: slo_violation
      alert_type: symptom
      feature_category: not_owned
      pager: pagerduty
      rules_domain: general
      severity: s2
      sli_type: apdex
      slo_alert: "yes"
      user_impacting: "yes"
      window: 1h
    expr: |
      (
        (
          gitlab_component_apdex:ratio_1h{component="istio_public_ingress",env="ops",monitor="global",type="argocd"}
          < (1 - 14.4 * 0.050000)
        )
        and on (env,environment,tier,type,stage,component)
        (
          gitlab_component_apdex:ratio_5m{component="istio_public_ingress",env="ops",monitor="global",type="argocd"}
          < (1 - 14.4 * 0.050000)
        )
      )
      and on(env,environment,tier,type,stage,component)
      (
        sum by(env,environment,tier,type,stage,component) (gitlab_component_ops:rate_1h{component="istio_public_ingress",env="ops",monitor="global",type="argocd"}) >= 1
      )
  - alert: ArgocdServiceIstioPublicIngressApdexSLOViolation
