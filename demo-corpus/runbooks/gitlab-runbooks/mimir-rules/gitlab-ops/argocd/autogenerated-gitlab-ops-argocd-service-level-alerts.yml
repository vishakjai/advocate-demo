  - alert: ArgocdServiceRedisClientTrafficCessation
    for: 5m
    annotations:
      title: The redis_client SLI of the argocd service (`{{ $labels.stage }}` stage)
        has not received any traffic in the past 30m
      description: |
        This alert signifies that the SLI is reporting a cessation of traffic; the signal is present, but is zero.
      grafana_dashboard_id: argocd-main/argocd-overview
      grafana_dashboard_link: https://dashboards.gitlab.net/d/argocd-main/argocd-overview?from=now-6h/m&to=now-1m/m&var-environment={{
