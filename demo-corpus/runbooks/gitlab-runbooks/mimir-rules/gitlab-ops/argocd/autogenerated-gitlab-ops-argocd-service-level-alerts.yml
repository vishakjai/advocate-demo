      severity: s4
      sli_type: ops
      slo_alert: "no"
      team: runway
      user_impacting: "no"
    expr: |
      gitlab_component_ops:rate_5m{component="redis_client",env="ops",monitor="global",stage="main",type="argocd"} offset 1h
      unless
      gitlab_component_ops:rate_5m{component="redis_client",env="ops",monitor="global",stage="main",type="argocd"}
