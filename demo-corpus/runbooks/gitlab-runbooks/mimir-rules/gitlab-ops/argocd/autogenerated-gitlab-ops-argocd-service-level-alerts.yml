      runbook: argocd/#alerts
    labels:
      aggregation: component
      alert_class: traffic_cessation
      alert_type: cause
      feature_category: not_owned
      rules_domain: general
      severity: s4
      sli_type: ops
      slo_alert: "no"
      team: runway
      user_impacting: "no"
    expr: |
      gitlab_component_ops:rate_30m{component="redis_client",env="ops",monitor="global",stage="main",type="argocd"} == 0
      and
      gitlab_component_ops:rate_30m{component="redis_client",env="ops",monitor="global",stage="main",type="argocd"} offset 1h >= 0.16666666666666666
  - alert: ArgocdServiceRedisClientTrafficAbsent
