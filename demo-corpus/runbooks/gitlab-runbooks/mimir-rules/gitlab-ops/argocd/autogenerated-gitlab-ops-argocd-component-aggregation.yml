    labels:
      component: redis_secondary_servers
      monitor: global
      stage: main
      tier: inf
      type: argocd
    expr: |
      sum by (env,environment) (
        sli_aggregations:redis_commands_processed_total:rate_5m{env="ops",type="argocd"} and on (instance) redis_instance_info{role="slave"}
      )
  - record: gitlab_component_errors:ratio_5m
    labels:
      component: redis_secondary_servers
      monitor: global
      tier: inf
      type: argocd
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_errors:rate_5m{component="redis_secondary_servers",env="ops",monitor="global",tier="inf",type="argocd"}
      )
      /
      sum by (env,environment,stage) (
