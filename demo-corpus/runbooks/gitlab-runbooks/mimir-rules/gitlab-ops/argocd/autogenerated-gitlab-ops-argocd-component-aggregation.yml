# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/mimir-aggregations.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'Global SLI Metrics: argocd - Burn-Rate 5m'
  interval: 1m
  rules:
  - record: gitlab_component_apdex:success:rate_5m
    labels:
      component: istio_public_ingress
      monitor: global
      stage: main
      tier: inf
      type: argocd
    expr: |
      sum by (env,environment) (
        sli_aggregations:istio_request_duration_milliseconds_bucket:rate_5m{destination_workload="argocd-server",env="ops",le="1000.0",source_workload="istio-gateway"}
      )
  - record: gitlab_component_apdex:weight:score_5m
    labels:
      component: istio_public_ingress
      monitor: global
      stage: main
      tier: inf
      type: argocd
    expr: |
      sum by (env,environment) (
        sli_aggregations:istio_request_duration_milliseconds_bucket:rate_5m{destination_workload="argocd-server",env="ops",le="+Inf",source_workload="istio-gateway"}
      )
  - record: gitlab_component_ops:rate_5m
    labels:
      component: istio_public_ingress
      monitor: global
      stage: main
      tier: inf
      type: argocd
    expr: |
      sum by (env,environment) (
        sli_aggregations:istio_requests_total:rate_5m{destination_workload="argocd-server",env="ops",source_workload="istio-gateway"}
      )
  - record: gitlab_component_errors:rate_5m
    labels:
      component: istio_public_ingress
      monitor: global
      stage: main
      tier: inf
      type: argocd
    expr: |
      (
        sum by (env,environment) (
          sli_aggregations:istio_requests_total:rate_5m{destination_workload="argocd-server",env="ops",response_code=~"^5.*",source_workload="istio-gateway"}
        )
      )
      or
      (
        0 * group by(env,environment) (
          gitlab_component_ops:rate_5m{component="istio_public_ingress",env="ops",monitor="global",stage="main",tier="inf",type="argocd"}
        )
      )
  - record: gitlab_component_errors:ratio_5m
    labels:
      component: istio_public_ingress
      monitor: global
      tier: inf
      type: argocd
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_errors:rate_5m{component="istio_public_ingress",env="ops",monitor="global",tier="inf",type="argocd"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_ops:rate_5m{component="istio_public_ingress",env="ops",monitor="global",tier="inf",type="argocd"}
      )
  - record: gitlab_component_apdex:ratio_5m
    labels:
      component: istio_public_ingress
      monitor: global
      tier: inf
      type: argocd
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_apdex:success:rate_5m{component="istio_public_ingress",env="ops",monitor="global",tier="inf",type="argocd"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_apdex:weight:score_5m{component="istio_public_ingress",env="ops",monitor="global",tier="inf",type="argocd"}
      )
  - record: gitlab_component_apdex:success:rate_5m
    labels:
      component: redis_client
      monitor: global
      stage: main
      tier: inf
      type: argocd
    expr: |
      sum by (env,environment) (
        sli_aggregations:argocd_redis_request_duration_seconds_bucket:rate_5m{env="ops",le="2.0",type="argocd"}
      )
  - record: gitlab_component_apdex:weight:score_5m
    labels:
      component: redis_client
      monitor: global
      stage: main
      tier: inf
      type: argocd
    expr: |
      sum by (env,environment) (
        sli_aggregations:argocd_redis_request_duration_seconds_bucket:rate_5m{env="ops",le="+Inf",type="argocd"}
      )
  - record: gitlab_component_ops:rate_5m
    labels:
      component: redis_client
      monitor: global
      stage: main
      tier: inf
      type: argocd
    expr: |
      sum by (env,environment) (
        sli_aggregations:argocd_redis_request_total:rate_5m{env="ops",failed="false",type="argocd"}
      )
  - record: gitlab_component_errors:rate_5m
    labels:
      component: redis_client
      monitor: global
      stage: main
      tier: inf
      type: argocd
    expr: |
      (
        sum by (env,environment) (
          sli_aggregations:argocd_redis_request_total:rate_5m{env="ops",failed="true",type="argocd"}
        )
      )
      or
      (
        0 * group by(env,environment) (
          gitlab_component_ops:rate_5m{component="redis_client",env="ops",monitor="global",stage="main",tier="inf",type="argocd"}
        )
      )
  - record: gitlab_component_errors:ratio_5m
    labels:
      component: redis_client
      monitor: global
      tier: inf
      type: argocd
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_errors:rate_5m{component="redis_client",env="ops",monitor="global",tier="inf",type="argocd"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_ops:rate_5m{component="redis_client",env="ops",monitor="global",tier="inf",type="argocd"}
      )
  - record: gitlab_component_apdex:ratio_5m
    labels:
      component: redis_client
      monitor: global
      tier: inf
      type: argocd
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_apdex:success:rate_5m{component="redis_client",env="ops",monitor="global",tier="inf",type="argocd"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_apdex:weight:score_5m{component="redis_client",env="ops",monitor="global",tier="inf",type="argocd"}
      )
  - record: gitlab_component_ops:rate_5m
    labels:
      component: redis_primary_server
      monitor: global
      stage: main
      tier: inf
      type: argocd
    expr: |
      sum by (env,environment) (
        sli_aggregations:redis_commands_processed_total:rate_5m{env="ops",type="argocd"} and on (instance) redis_instance_info{role="master"}
