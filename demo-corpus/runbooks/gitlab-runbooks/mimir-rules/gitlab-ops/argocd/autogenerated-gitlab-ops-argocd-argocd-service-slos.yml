# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/service-slos.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: Autogenerated Service SLOs
  interval: 5m
  rules:
  - record: slo:min:events:gitlab_service_apdex:ratio
    labels:
      monitor: global
      tier: inf
      type: argocd
    expr: "0.950000"
  - record: slo:max:events:gitlab_service_errors:ratio
    labels:
      monitor: global
      tier: inf
      type: argocd
    expr: "0.050000"
  - record: slo:min:events:gitlab_service_apdex:ratio
    labels:
      component: istio_public_ingress
      monitor: global
      tier: inf
      type: argocd
    expr: "0.950000"
  - record: slo:max:events:gitlab_service_errors:ratio
    labels:
      component: istio_public_ingress
      monitor: global
      tier: inf
      type: argocd
    expr: "0.050000"
  - record: slo:min:events:gitlab_service_apdex:ratio
    labels:
      component: redis_client
      monitor: global
      tier: inf
      type: argocd
    expr: "0.950000"
  - record: slo:max:events:gitlab_service_errors:ratio
    labels:
      component: redis_client
      monitor: global
      tier: inf
      type: argocd
    expr: "0.050000"
  - record: slo:min:events:gitlab_service_apdex:ratio
    labels:
      component: redis_primary_server
      monitor: global
      tier: inf
      type: argocd
    expr: "0.950000"
  - record: slo:max:events:gitlab_service_errors:ratio
    labels:
      component: redis_primary_server
      monitor: global
      tier: inf
      type: argocd
    expr: "0.050000"
  - record: slo:min:events:gitlab_service_apdex:ratio
    labels:
      component: redis_secondary_servers
      monitor: global
      tier: inf
      type: argocd
    expr: "0.950000"
  - record: slo:max:events:gitlab_service_errors:ratio
    labels:
      component: redis_secondary_servers
      monitor: global
      tier: inf
      type: argocd
    expr: "0.050000"
  - record: gitlab_component_service:mapping
    labels:
      component: istio_public_ingress
      global_aggregation: "no"
      monitor: global
      regional_aggregation: "no"
      service_aggregation: "yes"
      tier: inf
      type: argocd
    expr: "1"
  - record: gitlab_component_service:mapping
    labels:
      component: redis_client
      global_aggregation: "no"
      monitor: global
      regional_aggregation: "no"
      service_aggregation: "yes"
      tier: inf
      type: argocd
    expr: "1"
  - record: gitlab_component_service:mapping
    labels:
      component: redis_primary_server
      global_aggregation: "no"
      monitor: global
      regional_aggregation: "no"
      service_aggregation: "no"
      tier: inf
      type: argocd
    expr: "1"
  - record: gitlab_component_service:mapping
    labels:
      component: redis_secondary_servers
      global_aggregation: "no"
      monitor: global
      regional_aggregation: "no"
      service_aggregation: "no"
      tier: inf
      type: argocd
    expr: "1"
