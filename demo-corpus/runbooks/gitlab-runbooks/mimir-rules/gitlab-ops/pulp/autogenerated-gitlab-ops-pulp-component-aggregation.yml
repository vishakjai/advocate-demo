# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/mimir-aggregations.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'Global SLI Metrics: pulp - Burn-Rate 5m'
  interval: 1m
  rules:
  - record: gitlab_component_apdex:success:rate_5m
    labels:
      component: pulp_app_api
      monitor: global
      stage: main
      tier: inf
      type: pulp
    expr: |
      (
        sum by (env,environment) (
          sli_aggregations:api_request_duration_milliseconds_bucket:rate_5m{env="ops",le=~"2000|2000\\.0",namespace="pulp",type="pulp"}
        )
        +
        sum by (env,environment) (
          sli_aggregations:api_request_duration_milliseconds_bucket:rate_5m{env="ops",le=~"10000|10000\\.0",namespace="pulp",type="pulp"}
        )
      )
      /
      2
  - record: gitlab_component_apdex:weight:score_5m
    labels:
      component: pulp_app_api
      monitor: global
      stage: main
      tier: inf
      type: pulp
    expr: |
      sum by (env,environment) (
        sli_aggregations:api_request_duration_milliseconds_bucket:rate_5m{env="ops",le="+Inf",namespace="pulp",type="pulp"}
      )
  - record: gitlab_component_ops:rate_5m
    labels:
      component: pulp_app_api
      monitor: global
      stage: main
      tier: inf
      type: pulp
    expr: |
      sum by (env,environment) (
        sli_aggregations:api_request_duration_milliseconds_count:rate_5m{env="ops",namespace="pulp",type="pulp"}
      )
  - record: gitlab_component_errors:rate_5m
    labels:
      component: pulp_app_api
      monitor: global
      stage: main
      tier: inf
      type: pulp
    expr: |
      (
        sum by (env,environment) (
          sli_aggregations:api_request_duration_milliseconds_count:rate_5m{env="ops",http_status_code=~"^5.*",namespace="pulp",type="pulp"}
        )
      )
      or
      (
        0 * group by(env,environment) (
          gitlab_component_ops:rate_5m{component="pulp_app_api",env="ops",monitor="global",stage="main",tier="inf",type="pulp"}
        )
      )
  - record: gitlab_component_errors:ratio_5m
    labels:
      component: pulp_app_api
      monitor: global
      tier: inf
      type: pulp
    expr: |
      sum by (env,environment,stage) (
