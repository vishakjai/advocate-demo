# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/sli_aggregations.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'SLI Aggregations: pulp - pulp_app_api - 5m burn-rate'
  interval: 1m
  rules:
  - record: sli_aggregations:api_request_duration_milliseconds_bucket:rate_5m
    expr: |
      sum by (component,env,environment,feature_category,fqdn,http_method,http_status_code,http_target,le,namespace,product_stage,region,shard,stage,stage_group,tier,type) (
        rate(api_request_duration_milliseconds_bucket{env="ops",namespace=~"pulp",type=~"pulp"}[5m])
      )
  - record: sli_aggregations:api_request_duration_milliseconds_count:rate_5m
    expr: |
      sum by (component,env,environment,feature_category,fqdn,http_method,http_status_code,http_target,namespace,product_stage,region,shard,stage,stage_group,tier,type) (
        rate(api_request_duration_milliseconds_count{env="ops",namespace=~"pulp",type=~"pulp"}[5m])
      )
- name: 'SLI Aggregations: pulp - pulp_app_content - 5m burn-rate'
  interval: 1m
  rules:
  - record: sli_aggregations:content_request_duration_milliseconds_bucket:rate_5m
    expr: |
      sum by (component,env,environment,feature_category,fqdn,http_method,http_route,http_status_code,le,namespace,product_stage,region,shard,stage,stage_group,tier,type) (
        rate(content_request_duration_milliseconds_bucket{env="ops",namespace=~"pulp",type=~"pulp"}[5m])
      )
  - record: sli_aggregations:content_request_duration_milliseconds_count:rate_5m
    expr: |
      sum by (component,env,environment,feature_category,fqdn,http_method,http_route,http_status_code,namespace,product_stage,region,shard,stage,stage_group,tier,type) (
        rate(content_request_duration_milliseconds_count{env="ops",namespace=~"pulp",type=~"pulp"}[5m])
      )
- name: 'SLI Aggregations: pulp - pulp_cloudsql - 5m burn-rate - emitted by monitoring'
  interval: 1m
  rules:
  - record: sli_aggregations:stackdriver_cloudsql_database_cloudsql_googleapis_com_database_postgresql_statements_executed_count:rate_5m
    expr: |
      sum by (component,database,database_id,env,environment,feature_category,fqdn,operation_type,product_stage,region,shard,stage,stage_group,tier,type) (
        rate(stackdriver_cloudsql_database_cloudsql_googleapis_com_database_postgresql_statements_executed_count{database_id=~".+:pulp-.+",env="ops",type=~"monitoring"}[5m])
      )
- name: 'SLI Aggregations: pulp - pulp_gcs - 5m burn-rate - emitted by monitoring'
  interval: 1m
  rules:
  - record: sli_aggregations:stackdriver_gcs_bucket_storage_googleapis_com_api_request_count:rate_5m
    expr: |
      sum by (bucket_name,component,env,environment,feature_category,fqdn,method,product_stage,region,shard,stage,stage_group,tier,type) (
        rate(stackdriver_gcs_bucket_storage_googleapis_com_api_request_count{bucket_name=~"packages-pre",env="ops",type=~"monitoring"}[5m])
      )
