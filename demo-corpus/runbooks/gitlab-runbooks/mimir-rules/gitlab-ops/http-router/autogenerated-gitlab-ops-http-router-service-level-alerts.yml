# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/service-component-alerts.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'Service Component Alerts: http-router'
  interval: 1m
  rules:
  - alert: HttpRouterServiceWorkerRequestsErrorSLOViolationSingleShard
    for: 10m
    annotations:
      title: The worker_requests SLI of the http-router service on shard `{{ $labels.shard
        }}` has an error rate violating SLO
      description: |
        Aggregation of request that are flowing through the `http-router`.

        Errors on this SLI may indicate issues within the deployed `http-router` codebase as errors are limited to those originating inside of the worker.

        See: https://runbooks.gitlab.com/http-router/logging/

        Since the `{{ $labels.type }}` service is not fully redundant, SLI violations on a single shard may represent a user-impacting service degradation.

        Currently the error-rate is {{ $value | humanizePercentage }}.
      grafana_dashboard_id: http-router-main/http-router-overview
      grafana_dashboard_link: https://dashboards.gitlab.net/d/http-router-main/http-router-overview?from=now-6h/m&to=now-1m/m&var-environment={{
        $labels.environment }}&var-stage={{ $labels.stage }}&var-shard={{ $labels.shard
        }}
      grafana_datasource_id: mimir-gitlab-ops
      grafana_min_zoom_hours: "6"
      grafana_panel_id: "1908761530"
      grafana_variables: environment,stage,shard
      promql_template_1: |
        sum by (env,environment,tier,stage,shard) (
          rate(cloudflare_worker_errors_count{environment="{{ $labels.environment }}",shard="{{ $labels.shard }}",stage="{{ $labels.stage }}"}[5m])
        )
      runbook: http-router/#alerts
    labels:
      aggregation: component_shard
      alert_class: slo_violation
      alert_type: symptom
      feature_category: not_owned
      pager: pagerduty
      rules_domain: general
      severity: s2
      sli_type: error
      slo_alert: "yes"
      team: cells_infrastructure
      user_impacting: "yes"
      window: 1h
    expr: |
      (
        (
          gitlab_component_shard_errors:ratio_1h{component="worker_requests",env=~"gprd|gstg",monitor="global",type="http-router"}
          > (14.4 * 0.000010)
        )
        and on (env,environment,tier,type,stage,shard,component)
        (
          gitlab_component_shard_errors:ratio_5m{component="worker_requests",env=~"gprd|gstg",monitor="global",type="http-router"}
          > (14.4 * 0.000010)
        )
      )
      and on(env,environment,tier,type,stage,shard,component)
      (
        sum by(env,environment,tier,type,stage,shard,component) (gitlab_component_shard_ops:rate_1h{component="worker_requests",env=~"gprd|gstg",monitor="global",type="http-router"}) >= 1
      )
  - alert: HttpRouterServiceWorkerRequestsErrorSLOViolationSingleShard
    for: 10m
    annotations:
      title: The worker_requests SLI of the http-router service on shard `{{ $labels.shard
        }}` has an error rate violating SLO
      description: |
        Aggregation of request that are flowing through the `http-router`.

        Errors on this SLI may indicate issues within the deployed `http-router` codebase as errors are limited to those originating inside of the worker.

        See: https://runbooks.gitlab.com/http-router/logging/

        Since the `{{ $labels.type }}` service is not fully redundant, SLI violations on a single shard may represent a user-impacting service degradation.

        Currently the error-rate is {{ $value | humanizePercentage }}.
      grafana_dashboard_id: http-router-main/http-router-overview
      grafana_dashboard_link: https://dashboards.gitlab.net/d/http-router-main/http-router-overview?from=now-6h/m&to=now-1m/m&var-environment={{
        $labels.environment }}&var-stage={{ $labels.stage }}&var-shard={{ $labels.shard
        }}
      grafana_datasource_id: mimir-gitlab-ops
      grafana_min_zoom_hours: "6"
      grafana_panel_id: "1908761530"
      grafana_variables: environment,stage,shard
      promql_template_1: |
        sum by (env,environment,tier,stage,shard) (
          rate(cloudflare_worker_errors_count{environment="{{ $labels.environment }}",shard="{{ $labels.shard }}",stage="{{ $labels.stage }}"}[5m])
        )
      runbook: http-router/#alerts
    labels:
      aggregation: component_shard
      alert_class: slo_violation
      alert_type: symptom
      feature_category: not_owned
      pager: pagerduty
      rules_domain: general
      severity: s2
      sli_type: error
      slo_alert: "yes"
      team: cells_infrastructure
      user_impacting: "yes"
      window: 6h
    expr: |
      (
        (
          gitlab_component_shard_errors:ratio_6h{component="worker_requests",env=~"gprd|gstg",monitor="global",type="http-router"}
          > (6 * 0.000010)
        )
        and on (env,environment,tier,type,stage,shard,component)
        (
          gitlab_component_shard_errors:ratio_30m{component="worker_requests",env=~"gprd|gstg",monitor="global",type="http-router"}
          > (6 * 0.000010)
        )
      )
      and on(env,environment,tier,type,stage,shard,component)
      (
        sum by(env,environment,tier,type,stage,shard,component) (gitlab_component_shard_ops:rate_6h{component="worker_requests",env=~"gprd|gstg",monitor="global",type="http-router"}) >= 0.16667
      )
  - alert: HttpRouterServiceWorkerRequestsTrafficCessationSingleShard
    for: 5m
    annotations:
      title: The worker_requests SLI of the http-router service on shard `{{ $labels.shard
        }}` has not received any traffic in the past 30m
      description: |
        Aggregation of request that are flowing through the `http-router`.

        Errors on this SLI may indicate issues within the deployed `http-router` codebase as errors are limited to those originating inside of the worker.

        See: https://runbooks.gitlab.com/http-router/logging/

        This alert signifies that the SLI is reporting a cessation of traffic; the signal is present, but is zero.

        Since the `{{ $labels.type }}` service is not fully redundant, SLI violations on a single shard may represent a user-impacting service degradation.
      grafana_dashboard_id: http-router-main/http-router-overview
      grafana_dashboard_link: https://dashboards.gitlab.net/d/http-router-main/http-router-overview?from=now-6h/m&to=now-1m/m&var-environment={{
        $labels.environment }}&var-stage={{ $labels.stage }}&var-shard={{ $labels.shard
        }}
      grafana_datasource_id: mimir-gitlab-ops
      grafana_min_zoom_hours: "6"
      grafana_panel_id: "296992239"
      grafana_variables: environment,stage,shard
      promql_template_1: |
        sum by (env,environment,tier,stage,shard) (
          rate(cloudflare_worker_requests_count{environment="{{ $labels.environment }}",shard="{{ $labels.shard }}",stage="{{ $labels.stage }}"}[5m])
        )
      runbook: http-router/#alerts
    labels:
      aggregation: component_shard
      alert_class: traffic_cessation
      alert_type: cause
      feature_category: not_owned
      pager: pagerduty
      rules_domain: general
      severity: s2
      sli_type: ops
      slo_alert: "no"
      team: cells_infrastructure
      user_impacting: "yes"
    expr: |
      gitlab_component_shard_ops:rate_30m{component="worker_requests",env=~"gprd|gstg",monitor="global",type="http-router"} == 0
      and
      gitlab_component_shard_ops:rate_30m{component="worker_requests",env=~"gprd|gstg",monitor="global",type="http-router"} offset 1h >= 0.16666666666666666
  - alert: HttpRouterServiceWorkerRequestsTrafficAbsentSingleShard
    for: 30m
    annotations:
      title: The worker_requests SLI of the http-router service on shard `{{ $labels.shard
        }}` has not reported any traffic in the past 30m
      description: |
        Aggregation of request that are flowing through the `http-router`.

        Errors on this SLI may indicate issues within the deployed `http-router` codebase as errors are limited to those originating inside of the worker.

        See: https://runbooks.gitlab.com/http-router/logging/

        This alert signifies that the SLI was previously reporting traffic, but is no longer - the signal is absent.

        This could be caused by a change to the metrics used in the SLI, or by the service not receiving traffic.

        Since the `{{ $labels.type }}` service is not fully redundant, SLI violations on a single shard may represent a user-impacting service degradation.
      grafana_dashboard_id: http-router-main/http-router-overview
      grafana_dashboard_link: https://dashboards.gitlab.net/d/http-router-main/http-router-overview?from=now-6h/m&to=now-1m/m&var-environment={{
        $labels.environment }}&var-stage={{ $labels.stage }}&var-shard={{ $labels.shard
        }}
      grafana_datasource_id: mimir-gitlab-ops
      grafana_min_zoom_hours: "6"
      grafana_panel_id: "296992239"
      grafana_variables: environment,stage,shard
      promql_template_1: |
        sum by (env,environment,tier,stage,shard) (
          rate(cloudflare_worker_requests_count{environment="{{ $labels.environment }}",shard="{{ $labels.shard }}",stage="{{ $labels.stage }}"}[5m])
        )
      runbook: http-router/#alerts
    labels:
      aggregation: component_shard
      alert_class: traffic_cessation
      alert_type: cause
      feature_category: not_owned
      pager: pagerduty
      rules_domain: general
      severity: s2
      sli_type: ops
      slo_alert: "no"
      team: cells_infrastructure
      user_impacting: "yes"
    expr: |
      gitlab_component_shard_ops:rate_5m{component="worker_requests",env=~"gprd|gstg",monitor="global",type="http-router"} offset 1h
      unless
      gitlab_component_shard_ops:rate_5m{component="worker_requests",env=~"gprd|gstg",monitor="global",type="http-router"}
