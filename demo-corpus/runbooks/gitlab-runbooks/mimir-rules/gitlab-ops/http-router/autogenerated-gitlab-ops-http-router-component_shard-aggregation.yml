# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/mimir-aggregations.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'Global Shard-Aggregated SLI Metrics: http-router - Burn-Rate 5m'
  interval: 1m
  rules:
  - record: gitlab_component_shard_ops:rate_5m
    labels:
      component: worker_requests
      monitor: global
      stage: main
      tier: lb
      type: http-router
    expr: |
      sum by (env,environment,shard) (
        sli_aggregations:cloudflare_worker_requests_count:rate_5m{env=~"gprd|gstg",type="http-router"}
      )
  - record: gitlab_component_shard_errors:rate_5m
    labels:
      component: worker_requests
      monitor: global
      stage: main
      tier: lb
      type: http-router
    expr: |
      (
        sum by (env,environment,shard) (
          sli_aggregations:cloudflare_worker_errors_count:rate_5m{env=~"gprd|gstg",type="http-router"}
        )
      )
      or
      (
        0 * group by(env,environment,shard) (
          gitlab_component_shard_ops:rate_5m{component="worker_requests",env=~"gprd|gstg",monitor="global",stage="main",tier="lb",type="http-router"}
        )
      )
  - record: gitlab_component_shard_errors:ratio_5m
    labels:
      component: worker_requests
      monitor: global
      tier: lb
      type: http-router
    expr: |
      sum by (env,environment,stage,shard) (
        gitlab_component_shard_errors:rate_5m{component="worker_requests",env=~"gprd|gstg",monitor="global",tier="lb",type="http-router"}
      )
      /
      sum by (env,environment,stage,shard) (
        gitlab_component_shard_ops:rate_5m{component="worker_requests",env=~"gprd|gstg",monitor="global",tier="lb",type="http-router"}
      )
  - record: gitlab_component_shard_apdex:ratio_5m
    labels:
      component: worker_requests
      monitor: global
      tier: lb
      type: http-router
    expr: |
      sum by (env,environment,stage,shard) (
        gitlab_component_shard_apdex:success:rate_5m{component="worker_requests",env=~"gprd|gstg",monitor="global",tier="lb",type="http-router"}
      )
      /
      sum by (env,environment,stage,shard) (
        gitlab_component_shard_apdex:weight:score_5m{component="worker_requests",env=~"gprd|gstg",monitor="global",tier="lb",type="http-router"}
      )
