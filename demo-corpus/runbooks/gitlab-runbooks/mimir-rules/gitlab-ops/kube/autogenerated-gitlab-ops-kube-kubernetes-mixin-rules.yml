- name: k8s.rules.pod_owner
  rules:
  - record: namespace_workload_pod:kube_pod_owner:relabel
    labels:
      workload_type: replicaset
    expr: |
      max by (cluster, namespace, workload, pod) (
        label_replace(
          label_replace(
            kube_pod_owner{env="ops",job="kube-state-metrics", owner_kind="ReplicaSet"},
            "replicaset", "$1", "owner_name", "(.*)"
          ) * on (cluster, replicaset, namespace) group_left(owner_name) topk by(cluster, replicaset, namespace) (
            1, max by (cluster, replicaset, namespace, owner_name) (
              kube_replicaset_owner{env="ops",job="kube-state-metrics", owner_kind=""}
            )
          ),
          "workload", "$1", "replicaset", "(.*)"
        )
      )
  - record: namespace_workload_pod:kube_pod_owner:relabel
    labels:
      workload_type: deployment
    expr: |
      max by (cluster, namespace, workload, pod) (
        label_replace(
          label_replace(
            kube_pod_owner{env="ops",job="kube-state-metrics", owner_kind="ReplicaSet"},
            "replicaset", "$1", "owner_name", "(.*)"
          ) * on(replicaset, namespace, cluster) group_left(owner_name) topk by(cluster, replicaset, namespace) (
            1, max by (cluster, replicaset, namespace, owner_name) (
              kube_replicaset_owner{env="ops",job="kube-state-metrics", owner_kind="Deployment"}
            )
          ),
          "workload", "$1", "owner_name", "(.*)"
        )
      )
  - record: namespace_workload_pod:kube_pod_owner:relabel
    labels:
      workload_type: daemonset
    expr: |
      max by (cluster, namespace, workload, pod) (
        label_replace(
          kube_pod_owner{env="ops",job="kube-state-metrics", owner_kind="DaemonSet"},
          "workload", "$1", "owner_name", "(.*)"
        )
      )
  - record: namespace_workload_pod:kube_pod_owner:relabel
    labels:
      workload_type: statefulset
    expr: |
      max by (cluster, namespace, workload, pod) (
        label_replace(
          kube_pod_owner{env="ops",job="kube-state-metrics", owner_kind="StatefulSet"},
        "workload", "$1", "owner_name", "(.*)")
      )
  - record: namespace_workload_pod:kube_pod_owner:relabel
    labels:
      workload_type: job
    expr: |
      group by (cluster, namespace, workload, pod) (
        label_join(
          group by (cluster, namespace, job_name, pod, owner_name) (
            label_join(
              kube_pod_owner{env="ops",job="kube-state-metrics", owner_kind="Job"}
            , "job_name", "", "owner_name")
          )
          * on (cluster, namespace, job_name) group_left()
          group by (cluster, namespace, job_name) (
            kube_job_owner{env="ops",job="kube-state-metrics", owner_kind=~"Pod|"}
          )
        , "workload", "", "owner_name")
      )
  - record: namespace_workload_pod:kube_pod_owner:relabel
    labels:
      workload_type: barepod
    expr: |
      max by (cluster, namespace, workload, pod) (
        label_replace(
          kube_pod_owner{env="ops",job="kube-state-metrics", owner_kind="", owner_name=""},
        "workload", "$1", "pod", "(.+)")
      )
  - record: namespace_workload_pod:kube_pod_owner:relabel
    labels:
      workload_type: staticpod
    expr: |
      max by (cluster, namespace, workload, pod) (
        label_replace(
          kube_pod_owner{env="ops",job="kube-state-metrics", owner_kind="Node"},
        "workload", "$1", "pod", "(.+)")
      )
  - record: namespace_workload_pod:kube_pod_owner:relabel
    expr: |
      group by (cluster, namespace, workload, workload_type, pod) (
        label_join(
          label_join(
            group by (cluster, namespace, job_name, pod) (
              label_join(
                kube_pod_owner{env="ops",job="kube-state-metrics", owner_kind="Job"}
              , "job_name", "", "owner_name")
            )
            * on (cluster, namespace, job_name) group_left(owner_kind, owner_name)
            group by (cluster, namespace, job_name, owner_kind, owner_name) (
              kube_job_owner{env="ops",job="kube-state-metrics", owner_kind!="Pod", owner_kind!=""}
            )
          , "workload", "", "owner_name")
        , "workload_type", "", "owner_kind")

        OR

        label_replace(
          label_replace(
            label_replace(
              kube_pod_owner{env="ops",job="kube-state-metrics", owner_kind="ReplicaSet"}
              , "replicaset", "$1", "owner_name", "(.+)"
            )
            * on(cluster, namespace, replicaset) group_left(owner_kind, owner_name)
            group by (cluster, namespace, replicaset, owner_kind, owner_name) (
              kube_replicaset_owner{env="ops",job="kube-state-metrics", owner_kind!="Deployment", owner_kind!=""}
            )
          , "workload", "$1", "owner_name", "(.+)")
          OR
          label_replace(
            group by (cluster, namespace, pod, owner_name, owner_kind) (
              kube_pod_owner{env="ops",job="kube-state-metrics", owner_kind!="ReplicaSet", owner_kind!="DaemonSet", owner_kind!="StatefulSet", owner_kind!="Job", owner_kind!="Node", owner_kind!=""}
            )
            , "workload", "$1", "owner_name", "(.+)"
          )
        , "workload_type", "$1", "owner_kind", "(.+)")
      )
- name: node.rules
  rules:
  - record: 'node_namespace_pod:kube_pod_info:'
    expr: |
      topk by(cluster, namespace, pod) (1,
        max by (cluster, node, namespace, pod) (
          label_replace(kube_pod_info{env="ops",job="kube-state-metrics",node!=""}, "pod", "$1", "pod", "(.*)")
      ))
  - record: node:node_num_cpu:sum
    expr: |
      count by (cluster, node) (
        node_cpu_seconds_total{mode="idle",env="ops",job="node-exporter"}
        * on (cluster, namespace, pod) group_left(node)
        topk by(cluster, namespace, pod) (1, node_namespace_pod:kube_pod_info:)
      )
  - record: :node_memory_MemAvailable_bytes:sum
    expr: |
      sum(
        node_memory_MemAvailable_bytes{env="ops",job="node-exporter"} or
        (
          node_memory_Buffers_bytes{env="ops",job="node-exporter"} +
          node_memory_Cached_bytes{env="ops",job="node-exporter"} +
          node_memory_MemFree_bytes{env="ops",job="node-exporter"} +
          node_memory_Slab_bytes{env="ops",job="node-exporter"}
        )
      ) by (cluster)
  - record: node:node_cpu_utilization:ratio_rate5m
    expr: |
      avg by (cluster, node) (
        sum without (mode) (
          rate(node_cpu_seconds_total{mode!="idle",mode!="iowait",mode!="steal",env="ops",job="node-exporter"}[5m])
        )
      )
  - record: cluster:node_cpu:ratio_rate5m
    expr: |
      avg by (cluster) (
        node:node_cpu_utilization:ratio_rate5m
      )
- name: kubelet.rules
  rules:
  - record: node_quantile:kubelet_pleg_relist_duration_seconds:histogram_quantile
    labels:
      quantile: "0.99"
    expr: |
      histogram_quantile(
        0.99,
        sum(rate(kubelet_pleg_relist_duration_seconds_bucket{env="ops",job="kubelet"}[5m])) by (cluster, instance, le)
        * on(cluster, instance) group_left (node)
        max by (cluster, instance, node) (kubelet_node_name{env="ops",job="kubelet"})
      )
  - record: node_quantile:kubelet_pleg_relist_duration_seconds:histogram_quantile
    labels:
      quantile: "0.9"
    expr: |
      histogram_quantile(
        0.9,
        sum(rate(kubelet_pleg_relist_duration_seconds_bucket{env="ops",job="kubelet"}[5m])) by (cluster, instance, le)
        * on(cluster, instance) group_left (node)
        max by (cluster, instance, node) (kubelet_node_name{env="ops",job="kubelet"})
      )
  - record: node_quantile:kubelet_pleg_relist_duration_seconds:histogram_quantile
    labels:
      quantile: "0.5"
    expr: |
      histogram_quantile(
        0.5,
        sum(rate(kubelet_pleg_relist_duration_seconds_bucket{env="ops",job="kubelet"}[5m])) by (cluster, instance, le)
        * on(cluster, instance) group_left (node)
        max by (cluster, instance, node) (kubelet_node_name{env="ops",job="kubelet"})
      )
