# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/mimir-aggregations.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'Global SLI Metrics: customersdot - Burn-Rate 5m'
  interval: 1m
  rules:
  - record: gitlab_component_ops:rate_5m
    labels:
      component: clickhouse_reads
      monitor: global
      tier: sv
      type: customersdot
    expr: |
      sum by (env,environment,stage) (
        sli_aggregations:ClickHouseProfileEvents_SelectQuery:rate_5m{type="customersdot"}
      )
  - record: gitlab_component_errors:rate_5m
    labels:
      component: clickhouse_reads
      monitor: global
      tier: sv
      type: customersdot
    expr: |
      (
        sum by (env,environment,stage) (
          sli_aggregations:ClickHouseProfileEvents_FailedSelectQuery:rate_5m{type="customersdot"}
        )
      )
      or
      (
        0 * group by(env,environment,stage) (
          gitlab_component_ops:rate_5m{component="clickhouse_reads",monitor="global",tier="sv",type="customersdot"}
        )
      )
  - record: gitlab_component_errors:ratio_5m
    labels:
      component: clickhouse_reads
      monitor: global
      tier: sv
      type: customersdot
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_errors:rate_5m{component="clickhouse_reads",monitor="global",tier="sv",type="customersdot"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_ops:rate_5m{component="clickhouse_reads",monitor="global",tier="sv",type="customersdot"}
      )
  - record: gitlab_component_apdex:ratio_5m
    labels:
      component: clickhouse_reads
      monitor: global
      tier: sv
      type: customersdot
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_apdex:success:rate_5m{component="clickhouse_reads",monitor="global",tier="sv",type="customersdot"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_apdex:weight:score_5m{component="clickhouse_reads",monitor="global",tier="sv",type="customersdot"}
      )
