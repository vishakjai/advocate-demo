      alert_type: cause
      feature_category: fulfillment_infradev
      pager: pagerduty
      rules_domain: general
      severity: s2
      sli_type: ops
      slo_alert: "no"
      team: fulfillment_platform
      user_impacting: "yes"
    expr: |
      gitlab_component_ops:rate_5m{component="clickhouse_reads",monitor="global",stage="main",type="customersdot"} offset 1h
      unless
      gitlab_component_ops:rate_5m{component="clickhouse_reads",monitor="global",stage="main",type="customersdot"}
