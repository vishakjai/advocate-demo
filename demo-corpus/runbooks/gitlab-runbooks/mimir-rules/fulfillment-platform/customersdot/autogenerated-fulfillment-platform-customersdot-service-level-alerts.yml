# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/service-component-alerts.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'Service Component Alerts: customersdot'
  interval: 1m
  rules:
  - alert: CustomersdotServiceClickhouseReadsErrorSLOViolation
    for: 2m
    annotations:
      title: The clickhouse_reads SLI of the customersdot service (`{{ $labels.stage
        }}` stage) has an error rate violating SLO
      description: |
        Reads SLI for ClickHouse instances hosted via ClickHouse Cloud.

        Currently the error-rate is {{ $value | humanizePercentage }}.
      grafana_dashboard_id: customersdot-main/customersdot-overview
      grafana_dashboard_link: https://dashboards.gitlab.net/d/customersdot-main/customersdot-overview?from=now-6h/m&to=now-1m/m&var-environment={{
        $labels.environment }}&var-stage={{ $labels.stage }}
      grafana_datasource_id: mimir-fulfillment-platform
      grafana_min_zoom_hours: "6"
      grafana_panel_id: "3016799866"
      grafana_variables: environment,stage
      promql_template_1: |
        sum by (env,environment,tier,stage) (
          rate(ClickHouseProfileEvents_FailedSelectQuery{environment="{{ $labels.environment }}",stage="{{ $labels.stage }}"}[5m])
        )
      runbook: customersdot/#alerts
    labels:
      aggregation: component
      alert_class: slo_violation
      alert_type: symptom
      feature_category: fulfillment_infradev
      pager: pagerduty
      rules_domain: general
      severity: s2
      sli_type: error
      slo_alert: "yes"
      team: fulfillment_platform
      user_impacting: "yes"
      window: 1h
    expr: |
      (
        (
          gitlab_component_errors:ratio_1h{component="clickhouse_reads",monitor="global",type="customersdot"}
          > (14.4 * 0.005000)
        )
        and on (env,environment,tier,type,stage,component)
        (
          gitlab_component_errors:ratio_5m{component="clickhouse_reads",monitor="global",type="customersdot"}
          > (14.4 * 0.005000)
        )
      )
      and on(env,environment,tier,type,stage,component)
      (
        sum by(env,environment,tier,type,stage,component) (gitlab_component_ops:rate_1h{component="clickhouse_reads",monitor="global",type="customersdot"}) >= 1
      )
  - alert: CustomersdotServiceClickhouseReadsErrorSLOViolation
    for: 2m
    annotations:
      title: The clickhouse_reads SLI of the customersdot service (`{{ $labels.stage
        }}` stage) has an error rate violating SLO
      description: |
        Reads SLI for ClickHouse instances hosted via ClickHouse Cloud.

        Currently the error-rate is {{ $value | humanizePercentage }}.
      grafana_dashboard_id: customersdot-main/customersdot-overview
      grafana_dashboard_link: https://dashboards.gitlab.net/d/customersdot-main/customersdot-overview?from=now-6h/m&to=now-1m/m&var-environment={{
        $labels.environment }}&var-stage={{ $labels.stage }}
      grafana_datasource_id: mimir-fulfillment-platform
      grafana_min_zoom_hours: "6"
      grafana_panel_id: "3016799866"
      grafana_variables: environment,stage
      promql_template_1: |
        sum by (env,environment,tier,stage) (
          rate(ClickHouseProfileEvents_FailedSelectQuery{environment="{{ $labels.environment }}",stage="{{ $labels.stage }}"}[5m])
        )
      runbook: customersdot/#alerts
    labels:
      aggregation: component
      alert_class: slo_violation
      alert_type: symptom
      feature_category: fulfillment_infradev
      pager: pagerduty
      rules_domain: general
      severity: s2
      sli_type: error
      slo_alert: "yes"
      team: fulfillment_platform
      user_impacting: "yes"
      window: 6h
    expr: |
      (
        (
          gitlab_component_errors:ratio_6h{component="clickhouse_reads",monitor="global",type="customersdot"}
          > (6 * 0.005000)
        )
        and on (env,environment,tier,type,stage,component)
        (
          gitlab_component_errors:ratio_30m{component="clickhouse_reads",monitor="global",type="customersdot"}
          > (6 * 0.005000)
        )
      )
      and on(env,environment,tier,type,stage,component)
      (
        sum by(env,environment,tier,type,stage,component) (gitlab_component_ops:rate_6h{component="clickhouse_reads",monitor="global",type="customersdot"}) >= 0.16667
      )
  - alert: CustomersdotServiceClickhouseReadsTrafficCessation
    for: 5m
    annotations:
      title: The clickhouse_reads SLI of the customersdot service (`{{ $labels.stage
        }}` stage) has not received any traffic in the past 30m
      description: |
        Reads SLI for ClickHouse instances hosted via ClickHouse Cloud.

        This alert signifies that the SLI is reporting a cessation of traffic; the signal is present, but is zero.
      grafana_dashboard_id: customersdot-main/customersdot-overview
      grafana_dashboard_link: https://dashboards.gitlab.net/d/customersdot-main/customersdot-overview?from=now-6h/m&to=now-1m/m&var-environment={{
        $labels.environment }}&var-stage={{ $labels.stage }}
      grafana_datasource_id: mimir-fulfillment-platform
      grafana_min_zoom_hours: "6"
      grafana_panel_id: "1581526774"
      grafana_variables: environment,stage
      promql_template_1: |
        sum by (env,environment,tier,stage) (
          rate(ClickHouseProfileEvents_SelectQuery{environment="{{ $labels.environment }}",stage="{{ $labels.stage }}"}[5m])
        )
      runbook: customersdot/#alerts
    labels:
      aggregation: component
      alert_class: traffic_cessation
      alert_type: cause
      feature_category: fulfillment_infradev
      pager: pagerduty
      rules_domain: general
      severity: s2
      sli_type: ops
      slo_alert: "no"
      team: fulfillment_platform
      user_impacting: "yes"
    expr: |
      gitlab_component_ops:rate_30m{component="clickhouse_reads",monitor="global",stage="main",type="customersdot"} == 0
      and
      gitlab_component_ops:rate_30m{component="clickhouse_reads",monitor="global",stage="main",type="customersdot"} offset 1h >= 0.16666666666666666
