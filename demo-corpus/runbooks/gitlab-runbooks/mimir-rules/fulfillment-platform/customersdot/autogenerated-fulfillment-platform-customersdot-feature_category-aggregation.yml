        sum by (env,environment,stage) (
          sli_aggregations:ClickHouseProfileEvents_FailedSelectQuery:rate_5m{type="customersdot"} offset 30s
        )
      )
      or
      (
        0 * group by(env,environment,stage) (
          gitlab:component:feature_category:execution:ops:rate_5m{component="clickhouse_reads",feature_category="fulfillment_infradev",monitor="global",tier="sv",type="customersdot"}
