groups:
- name: 'Feature Category Metrics: customersdot - Burn-Rate 5m'
  interval: 1m
  rules:
  - record: gitlab:component:feature_category:execution:ops:rate_5m
    labels:
      component: clickhouse_reads
      feature_category: fulfillment_infradev
      monitor: global
      tier: sv
      type: customersdot
    expr: |
      sum by (env,environment,stage) (
        sli_aggregations:ClickHouseProfileEvents_SelectQuery:rate_5m{type="customersdot"} offset 30s
      )
  - record: gitlab:component:feature_category:execution:error:rate_5m
    labels:
      component: clickhouse_reads
      feature_category: fulfillment_infradev
