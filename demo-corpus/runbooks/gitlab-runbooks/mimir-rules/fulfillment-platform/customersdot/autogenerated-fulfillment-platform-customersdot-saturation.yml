# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/saturation.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: Saturation Rules (autogenerated)
  interval: 1m
  rules:
  - record: gitlab_component_saturation:ratio
    labels:
      component: cloudsql_cpu
      stage: main
      tier: inf
    expr: |
      max by(env,environment,shard,type) (
        clamp_min(
          clamp_max(
            avg_over_time(stackdriver_cloudsql_database_cloudsql_googleapis_com_database_cpu_utilization{type="customersdot"}[5m])
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: cloudsql_memory
      stage: main
      tier: inf
    expr: |
      max by(env,environment,shard,type) (
        clamp_min(
          clamp_max(
            avg_over_time(stackdriver_cloudsql_database_cloudsql_googleapis_com_database_memory_utilization{type="customersdot"}[5m])
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: cpu
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            1 - avg by (env,environment,shard,stage,tier,type) (
              rate(node_cpu_seconds_total{mode="idle", type="customersdot"}[5m])
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: customersdot_cloudsql_disk
      stage: main
      tier: inf
    expr: |
      max by(env,environment,shard,type) (
        clamp_min(
          clamp_max(
            avg_over_time(stackdriver_cloudsql_database_cloudsql_googleapis_com_database_disk_utilization{type="customersdot"}[5m])
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: disk_inodes
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            1 - (
              node_filesystem_files_free{fstype=~"(ext.|xfs)", type="customersdot"}
              /
              node_filesystem_files{fstype=~"(ext.|xfs)", type="customersdot"}
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: disk_maximum_capacity
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            max by (device,env,environment,fqdn,shard,stage,tier,type) (
              node_filesystem_size_bytes{fstype=~"ext.|xfs", type="customersdot"} - node_filesystem_avail_bytes{fstype=~"ext.|xfs", type="customersdot"}
              unless on (fqdn) node_disk_info{serial=~"lvm.*", type="customersdot"}
            ) / (64*2^40)
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: disk_space
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            (
              1 - node_filesystem_avail_bytes{fstype=~"ext.|xfs", type="customersdot"} / node_filesystem_size_bytes{fstype=~"ext.|xfs", type="customersdot"}
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: kube_container_cpu
    expr: |
      quantile by(env,environment,shard,stage,tier,type) (
        0.99,
        clamp_min(
          clamp_max(
            (
              sum by (container,env,environment,pod,shard,stage,tier,type) (
                rate(container_cpu_usage_seconds_total:labeled{container!="", container!="POD", type="customersdot"}[1h])
                unless on(pod) (
                  kube_pod_labels:labeled{label_gitlab_com_exclude_saturation_point=~"(^|.*[.])kube_container_cpu_request([.].*|$)", type="customersdot"}
                )
              )
              unless on(container,env,environment,pod,shard,stage,tier,type) (
                last_over_time(container_spec_cpu_quota:labeled{container!="", container!="POD", type="customersdot"}[1h])
              )
            )
            /
            sum by(container,env,environment,pod,shard,stage,tier,type) (
              kube_pod_container_resource_requests:labeled{container!="", container!="POD", resource="cpu", type="customersdot"}
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: kube_container_cpu_limit
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            sum by (container,env,environment,pod,shard,stage,tier,type) (
              rate(container_cpu_usage_seconds_total:labeled{container!="", container!="POD", type="customersdot"}[5m])
              unless on(pod) (
                kube_pod_labels:labeled{label_gitlab_com_exclude_saturation_point=~"(^|.*[.])kube_container_cpu_limit([.].*|$)", type="customersdot"}
              )
            )
            /
            sum by(container,env,environment,pod,shard,stage,tier,type) (
              container_spec_cpu_quota:labeled{container!="", container!="POD", type="customersdot"}
              /
              container_spec_cpu_period:labeled{container!="", container!="POD", type="customersdot"}
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: kube_container_memory_limit
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            (
              container_memory_working_set_bytes:labeled{container!="", container!="POD", type="customersdot"}
              unless on(pod) (
                kube_pod_labels:labeled{label_gitlab_com_exclude_saturation_point=~"(^|.*[.])kube_container_memory_limit([.].*|$)", type="customersdot"}
              )
            )
            / on(container,deployment,env,environment,pod,shard,stage,tier,type) group_left()
            max by(container,deployment,env,environment,pod,shard,stage,tier,type) (
              kube_pod_container_resource_limits:labeled{container!="", resource="memory", type="customersdot"} > 0
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: kube_container_memory_request
    expr: |
      quantile by(env,environment,shard,stage,tier,type) (
        0.99,
        clamp_min(
          clamp_max(
            (
              container_memory_working_set_bytes:labeled{container!="", container!="POD", type="customersdot"}
              unless on(pod) (
                kube_pod_labels:labeled{label_gitlab_com_exclude_saturation_point=~"(^|.*[.])kube_container_memory_request([.].*|$)", type="customersdot"}
              )
            )
            / on(container,deployment,env,environment,pod,shard,stage,tier,type) group_left()
            max by(container,deployment,env,environment,pod,shard,stage,tier,type) (
              kube_pod_container_resource_requests:labeled{container!="", resource="memory", type="customersdot"} > 0
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: kube_container_throttling
    expr: |
      quantile by(env,environment,shard,stage,tier,type) (
        0.99,
        clamp_min(
          clamp_max(
            # This doesn't really aggregate anything as `pod` is one of the resource labels and there's only one series
            max by (container,env,environment,pod,shard,stage,tier,type)(
              rate(container_cpu_cfs_throttled_seconds_total:labeled{container!="", type="customersdot"}[5m])
              unless on(pod) (
                kube_pod_labels:labeled{label_gitlab_com_exclude_saturation_point=~"(^|.*[.])kube_container_throttling([.].*|$)", type="customersdot"}
              )
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: kube_horizontalpodautoscaler_desired_replicas
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            kube_horizontalpodautoscaler_status_desired_replicas:labeled{type="customersdot", shard!~"database-throttled|elasticsearch|gitaly-throttled|urgent-authorized-projects", namespace!~"pubsubbeat"}
            /
            kube_horizontalpodautoscaler_spec_max_replicas:labeled{type="customersdot", shard!~"database-throttled|elasticsearch|gitaly-throttled|urgent-authorized-projects", namespace!~"pubsubbeat"}
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: memory
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            instance:node_memory_utilization:ratio{type="customersdot"} or instance:node_memory_utilisation:ratio{type="customersdot"}
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: memorystore_redis_cpu
      stage: main
      tier: inf
    expr: |
      max by(env,environment,shard,type) (
        clamp_min(
          clamp_max(
            sum by (env,environment,shard,type)
            (
              stackdriver_redis_instance_redis_googleapis_com_stats_cpu_utilization_main_thread{type="customersdot", role='primary'}
            ) / 60
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: memorystore_redis_memory
      stage: main
      tier: inf
    expr: |
      max by(env,environment,shard,type) (
        clamp_min(
          clamp_max(
            max by (env,environment,shard,type) (
              stackdriver_redis_instance_redis_googleapis_com_stats_memory_usage_ratio{type="customersdot", role = "primary"}
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: memorystore_system_memory
      stage: main
      tier: inf
    expr: |
      max by(env,environment,shard,type) (
        clamp_min(
          clamp_max(
            max by (env,environment,shard,type) (
              stackdriver_redis_instance_redis_googleapis_com_stats_memory_system_memory_usage_ratio{type="customersdot", role = "primary"}
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: nf_conntrack_entries
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            max_over_time(node_nf_conntrack_entries{type="customersdot"}[1m])
            /
            node_nf_conntrack_entries_limit{type="customersdot"}
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: node_schedstat_waiting
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            avg without (cpu) (rate(node_schedstat_waiting_seconds_total{type="customersdot"}[1h]))
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: open_fds
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            (
              process_open_fds{type="customersdot"}
              /
              process_max_fds{type="customersdot"}
            )
            or
            (
              ruby_file_descriptors{type="customersdot"}
              /
              ruby_process_max_fds{type="customersdot"}
            )
            or
            (
              node_filefd_allocated{type="customersdot"}
              /
              node_filefd_maximum{type="customersdot"}
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: single_node_cpu
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            avg without(cpu, mode) (1 - rate(node_cpu_seconds_total{mode="idle", type="customersdot"}[5m]))
            ,
            1)
        ,
        0)
      )
