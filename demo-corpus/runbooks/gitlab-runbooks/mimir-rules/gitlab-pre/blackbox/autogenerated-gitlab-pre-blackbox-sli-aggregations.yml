groups:
- name: 'SLI Aggregations: blackbox - probe - 5m burn-rate'
  interval: 1m
  rules:
  - record: sli_aggregations:probe_success:rate_5m
    expr: |
      sum by (component,env,environment,feature_category,fqdn,instance,job,module,product_stage,region,shard,stage,stage_group,tier,type) (
        rate(probe_success{env="pre",job=~"scrapeConfig/monitoring/prometheus-agent-blackbox",module=~"http_2xx",type=~"blackbox"}[5m])
      )
- name: 'SLI Aggregations: blackbox - probe - 30m burn-rate'
  interval: 2m
  rules:
  - record: sli_aggregations:probe_success:rate_30m
    expr: |
      sum by (component,env,environment,feature_category,fqdn,instance,job,module,product_stage,region,shard,stage,stage_group,tier,type) (
        rate(probe_success{env="pre",job=~"scrapeConfig/monitoring/prometheus-agent-blackbox",module=~"http_2xx",type=~"blackbox"}[30m])
      )
- name: 'SLI Aggregations: blackbox - probe - 1h burn-rate'
  interval: 1m
  rules:
  - record: sli_aggregations:probe_success:rate_1h
    expr: |
      sum by (component,env,environment,feature_category,fqdn,instance,job,module,product_stage,region,shard,stage,stage_group,tier,type) (
        rate(probe_success{env="pre",job=~"scrapeConfig/monitoring/prometheus-agent-blackbox",module=~"http_2xx",type=~"blackbox"}[1h])
      )
