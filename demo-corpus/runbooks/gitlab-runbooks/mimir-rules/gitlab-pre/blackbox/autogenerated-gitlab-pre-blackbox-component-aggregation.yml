# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/mimir-aggregations.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'Global SLI Metrics: blackbox - Burn-Rate 5m'
  interval: 1m
  rules:
  - record: gitlab_component_ops:rate_5m
    labels:
      component: probe
      monitor: global
      tier: inf
      type: blackbox
    expr: |
      sum by (env,environment,stage) (
        avg_over_time(probe_success{env="pre",job="scrapeConfig/monitoring/prometheus-agent-blackbox",module="http_2xx",type="blackbox"}[5m])
      )
  - record: gitlab_component_errors:ratio_5m
    labels:
      component: probe
      monitor: global
      tier: inf
      type: blackbox
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_errors:rate_5m{component="probe",env="pre",monitor="global",tier="inf",type="blackbox"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_ops:rate_5m{component="probe",env="pre",monitor="global",tier="inf",type="blackbox"}
      )
  - record: gitlab_component_apdex:ratio_5m
    labels:
      component: probe
      monitor: global
      tier: inf
      type: blackbox
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_apdex:success:rate_5m{component="probe",env="pre",monitor="global",tier="inf",type="blackbox"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_apdex:weight:score_5m{component="probe",env="pre",monitor="global",tier="inf",type="blackbox"}
      )
