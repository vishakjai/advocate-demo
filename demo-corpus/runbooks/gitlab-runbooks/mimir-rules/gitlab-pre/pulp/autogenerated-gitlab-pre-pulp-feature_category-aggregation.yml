# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/mimir-aggregations.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'Feature Category Metrics: pulp - Burn-Rate 5m'
  interval: 1m
  rules:
  - record: gitlab:component:feature_category:execution:apdex:success:rate_5m
    labels:
      component: pulp_app_api
      feature_category: omnibus_package
      monitor: global
      stage: main
      tier: inf
      type: pulp
    expr: |
      (
        sum by (env,environment) (
          sli_aggregations:api_request_duration_milliseconds_bucket:rate_5m{env="pre",le=~"2000|2000\\.0",namespace="pulp",type="pulp"}
        )
        +
        sum by (env,environment) (
          sli_aggregations:api_request_duration_milliseconds_bucket:rate_5m{env="pre",le=~"10000|10000\\.0",namespace="pulp",type="pulp"}
        )
      )
      /
      2
  - record: gitlab:component:feature_category:execution:apdex:weight:score_5m
    labels:
      component: pulp_app_api
      feature_category: omnibus_package
      monitor: global
      stage: main
      tier: inf
      type: pulp
    expr: |
      sum by (env,environment) (
        sli_aggregations:api_request_duration_milliseconds_bucket:rate_5m{env="pre",le="+Inf",namespace="pulp",type="pulp"}
      )
  - record: gitlab:component:feature_category:execution:ops:rate_5m
    labels:
      component: pulp_app_api
      feature_category: omnibus_package
      monitor: global
      stage: main
      tier: inf
      type: pulp
    expr: |
      sum by (env,environment) (
        sli_aggregations:api_request_duration_milliseconds_count:rate_5m{env="pre",namespace="pulp",type="pulp"} offset 30s
      )
  - record: gitlab:component:feature_category:execution:error:rate_5m
    labels:
      component: pulp_app_api
      feature_category: omnibus_package
      monitor: global
      stage: main
      tier: inf
      type: pulp
    expr: |
      (
        sum by (env,environment) (
          sli_aggregations:api_request_duration_milliseconds_count:rate_5m{env="pre",http_status_code=~"^5.*",namespace="pulp",type="pulp"} offset 30s
        )
      )
      or
      (
        0 * group by(env,environment) (
          gitlab:component:feature_category:execution:ops:rate_5m{component="pulp_app_api",env="pre",feature_category="omnibus_package",monitor="global",stage="main",tier="inf",type="pulp"}
        )
      )
  - record: gitlab:component:feature_category:execution:apdex:success:rate_5m
    labels:
      component: pulp_app_content
      feature_category: omnibus_package
      monitor: global
      stage: main
      tier: inf
      type: pulp
    expr: |
      sum by (env,environment) (
        sli_aggregations:content_request_duration_milliseconds_bucket:rate_5m{env="pre",le=~"10000|10000\\.0",namespace="pulp",type="pulp"}
