# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/service-component-alerts.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'Service Component Alerts: pulp'
  interval: 1m
  rules:
  - alert: PulpServicePulpAppApiApdexSLOViolation
    for: 2m
    annotations:
      title: The pulp_app_api SLI of the pulp service (`{{ $labels.stage }}` stage)
        has an apdex violating SLO
      description: |
        Pulp application API service request latency and error rates.

        Currently the apdex value is {{ $value | humanizePercentage }}.
      grafana_dashboard_id: pulp-main/pulp-overview
      grafana_dashboard_link: https://dashboards.gitlab.net/d/pulp-main/pulp-overview?from=now-6h/m&to=now-1m/m&var-environment={{
        $labels.environment }}&var-stage={{ $labels.stage }}
      grafana_datasource_id: mimir-gitlab-pre
      grafana_min_zoom_hours: "6"
      grafana_panel_id: "459333037"
      grafana_variables: environment,stage
      promql_template_1: |
        histogram_quantile(
          0.950000,
          sum by (env,environment,tier,stage,le) (
            rate(api_request_duration_milliseconds_bucket{environment="{{ $labels.environment }}",namespace="pulp",stage="{{ $labels.stage }}"}[5m])
          )
        )
      runbook: pulp/#alerts
    labels:
      aggregation: component
      alert_class: slo_violation
      alert_type: symptom
      feature_category: omnibus_package
      pager: pagerduty
      rules_domain: general
      severity: s2
      sli_type: apdex
      slo_alert: "yes"
      user_impacting: "yes"
      window: 1h
    expr: |
      (
        (
          gitlab_component_apdex:ratio_1h{component="pulp_app_api",env="pre",monitor="global",type="pulp"}
          < (1 - 14.4 * 0.001000)
        )
        and on (env,environment,tier,type,stage,component)
        (
          gitlab_component_apdex:ratio_5m{component="pulp_app_api",env="pre",monitor="global",type="pulp"}
          < (1 - 14.4 * 0.001000)
        )
      )
      and on(env,environment,tier,type,stage,component)
      (
        sum by(env,environment,tier,type,stage,component) (gitlab_component_ops:rate_1h{component="pulp_app_api",env="pre",monitor="global",type="pulp"}) >= 1
      )
