      grafana_panel_id: "198434155"
      grafana_variables: environment,stage
      promql_template_1: |
        histogram_quantile(
          0.950000,
          sum by (env,environment,tier,stage,le) (
            rate(nginx_ingress_controller_request_duration_seconds_bucket{environment="{{ $labels.environment }}",namespace="pulp",stage="{{ $labels.stage }}"}[5m])
          )
        )
      runbook: pulp/#alerts
    labels:
      aggregation: component
      alert_class: slo_violation
      alert_type: symptom
      feature_category: omnibus_package
      pager: pagerduty
      rules_domain: general
      severity: s2
      sli_type: apdex
      slo_alert: "yes"
      user_impacting: "yes"
      window: 1h
    expr: |
      (
        (
          gitlab_component_apdex:ratio_1h{component="pulp_nginx",env="pre",monitor="global",type="pulp"}
          < (1 - 14.4 * 0.001000)
        )
        and on (env,environment,tier,type,stage,component)
        (
          gitlab_component_apdex:ratio_5m{component="pulp_nginx",env="pre",monitor="global",type="pulp"}
          < (1 - 14.4 * 0.001000)
