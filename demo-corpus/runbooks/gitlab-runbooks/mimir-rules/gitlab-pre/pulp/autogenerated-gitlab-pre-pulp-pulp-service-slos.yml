# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/service-slos.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: Autogenerated Service SLOs
  interval: 5m
  rules:
  - record: slo:min:events:gitlab_service_apdex:ratio
    labels:
      monitor: global
      tier: inf
      type: pulp
    expr: "0.999000"
  - record: slo:max:events:gitlab_service_errors:ratio
    labels:
      monitor: global
      tier: inf
      type: pulp
    expr: "0.001000"
  - record: slo:min:events:gitlab_service_apdex:ratio
    labels:
      component: pulp_app_api
      monitor: global
      tier: inf
      type: pulp
    expr: "0.999000"
  - record: slo:max:events:gitlab_service_errors:ratio
    labels:
      component: pulp_app_api
      monitor: global
      tier: inf
      type: pulp
    expr: "0.001000"
  - record: slo:min:events:gitlab_service_apdex:ratio
    labels:
      component: pulp_app_content
      monitor: global
      tier: inf
      type: pulp
    expr: "0.999000"
  - record: slo:max:events:gitlab_service_errors:ratio
    labels:
      component: pulp_app_content
      monitor: global
      tier: inf
      type: pulp
    expr: "0.001000"
  - record: slo:min:events:gitlab_service_apdex:ratio
    labels:
      component: pulp_cloudsql
      monitor: global
      tier: inf
      type: pulp
    expr: "0.999000"
  - record: slo:max:events:gitlab_service_errors:ratio
    labels:
      component: pulp_cloudsql
      monitor: global
      tier: inf
      type: pulp
    expr: "0.001000"
  - record: slo:min:events:gitlab_service_apdex:ratio
    labels:
      component: pulp_gcs
      monitor: global
      tier: inf
      type: pulp
    expr: "0.999000"
  - record: slo:max:events:gitlab_service_errors:ratio
    labels:
      component: pulp_gcs
      monitor: global
      tier: inf
      type: pulp
    expr: "0.001000"
  - record: slo:min:events:gitlab_service_apdex:ratio
    labels:
      component: pulp_nginx
      monitor: global
      tier: inf
      type: pulp
    expr: "0.999000"
  - record: slo:max:events:gitlab_service_errors:ratio
    labels:
      component: pulp_nginx
      monitor: global
      tier: inf
      type: pulp
    expr: "0.001000"
  - record: slo:min:events:gitlab_service_apdex:ratio
    labels:
      component: pulp_redis
      monitor: global
      tier: inf
      type: pulp
    expr: "0.999000"
  - record: slo:max:events:gitlab_service_errors:ratio
    labels:
      component: pulp_redis
      monitor: global
      tier: inf
      type: pulp
    expr: "0.001000"
  - record: gitlab_component_service:mapping
    labels:
      component: pulp_app_api
      global_aggregation: "no"
      monitor: global
      regional_aggregation: "no"
      service_aggregation: "yes"
      tier: inf
      type: pulp
    expr: "1"
  - record: gitlab_component_service:mapping
    labels:
      component: pulp_app_content
      global_aggregation: "no"
      monitor: global
      regional_aggregation: "no"
      service_aggregation: "yes"
      tier: inf
      type: pulp
    expr: "1"
  - record: gitlab_component_service:mapping
    labels:
      component: pulp_cloudsql
      global_aggregation: "no"
      monitor: global
      regional_aggregation: "no"
      service_aggregation: "no"
      tier: inf
      type: pulp
    expr: "1"
  - record: gitlab_component_service:mapping
    labels:
      component: pulp_gcs
      global_aggregation: "no"
      monitor: global
      regional_aggregation: "no"
      service_aggregation: "no"
      tier: inf
      type: pulp
    expr: "1"
  - record: gitlab_component_service:mapping
    labels:
      component: pulp_nginx
      global_aggregation: "no"
      monitor: global
      regional_aggregation: "no"
      service_aggregation: "yes"
      tier: inf
      type: pulp
    expr: "1"
  - record: gitlab_component_service:mapping
    labels:
      component: pulp_redis
      global_aggregation: "no"
      monitor: global
      regional_aggregation: "no"
      service_aggregation: "no"
      tier: inf
      type: pulp
    expr: "1"
