      component: http
      monitor: global
      tier: sv
      type: woodhouse
    expr: |
      sum by (env,environment,stage) (
        avg_over_time(gitlab_component_apdex:weight:score_1h{component="http",env="pre",monitor="global",tier="sv",type="woodhouse"}[3d])
      )
  - record: gitlab_component_ops:rate_3d
    labels:
      component: http
      monitor: global
      tier: sv
      type: woodhouse
    expr: |
      sum by (env,environment,stage) (
        avg_over_time(gitlab_component_ops:rate_1h{component="http",env="pre",monitor="global",tier="sv",type="woodhouse"}[3d])
      )
  - record: gitlab_component_errors:rate_3d
    labels:
      component: http
      monitor: global
      tier: sv
      type: woodhouse
    expr: |
      sum by (env,environment,stage) (
        avg_over_time(gitlab_component_errors:rate_1h{component="http",env="pre",monitor="global",tier="sv",type="woodhouse"}[3d])
      )
  - record: gitlab_component_errors:ratio_3d
    labels:
      component: http
      monitor: global
      tier: sv
      type: woodhouse
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_errors:rate_3d{component="http",env="pre",monitor="global",tier="sv",type="woodhouse"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_ops:rate_3d{component="http",env="pre",monitor="global",tier="sv",type="woodhouse"}
      )
  - record: gitlab_component_apdex:ratio_3d
    labels:
      component: http
      monitor: global
      tier: sv
      type: woodhouse
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_apdex:success:rate_3d{component="http",env="pre",monitor="global",tier="sv",type="woodhouse"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_apdex:weight:score_3d{component="http",env="pre",monitor="global",tier="sv",type="woodhouse"}
      )
