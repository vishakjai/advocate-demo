  - alert: CiOrchestrationServiceNonSharedRunnerJobQueueDurationApdexSLOViolation
    for: 2m
    annotations:
      title: The non_shared_runner_job_queue_duration SLI of the ci-orchestration
        service (`{{ $labels.stage }}` stage) has an apdex violating SLO
      description: |
        This SLI monitors the job queue duration for non-shared (project/group) runners.

        The `job_queue_duration_seconds` histogram is emitted by the Rails API when a runner picks up a job via `POST /api/v4/jobs/request`. It measures the time between job creation and runner assignment.

        It is used to generate pre-aggregated recording rules for efficient p50/p99 trend queries over long time ranges (1d/7d/30d).

        Currently the apdex value is {{ $value | humanizePercentage }}.
      grafana_dashboard_id: ci-orchestration-main/ci-orchestration-overview
      grafana_dashboard_link: https://dashboards.gitlab.net/d/ci-orchestration-main/ci-orchestration-overview?from=now-6h/m&to=now-1m/m&var-environment={{
        $labels.environment }}&var-stage={{ $labels.stage }}
      grafana_datasource_id: mimir-gitlab-pre
      grafana_min_zoom_hours: "6"
      grafana_panel_id: "2447134453"
      grafana_variables: environment,stage
      promql_template_1: |
        histogram_quantile(
          0.950000,
          sum by (env,environment,tier,stage,le) (
            rate(job_queue_duration_seconds_bucket{environment="{{ $labels.environment }}",shared_runner="false",stage="{{ $labels.stage }}"}[5m])
          )
        )
      runbook: ci-orchestration/#alerts
    labels:
      aggregation: component
      alert_class: slo_violation
      alert_type: symptom
      feature_category: continuous_integration
      rules_domain: general
      severity: s3
      sli_type: apdex
      slo_alert: "yes"
      team: verify
      user_impacting: "yes"
      window: 1h
    expr: |
      (
        (
          gitlab_component_apdex:ratio_1h{component="non_shared_runner_job_queue_duration",env="pre",monitor="global",type="ci-orchestration"}
          < (1 - 14.4 * 0.050000)
        )
        and on (env,environment,tier,type,stage,component)
        (
          gitlab_component_apdex:ratio_5m{component="non_shared_runner_job_queue_duration",env="pre",monitor="global",type="ci-orchestration"}
          < (1 - 14.4 * 0.050000)
        )
