# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/service-component-alerts.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'Service Component Alerts: ci-orchestration'
  interval: 1m
  rules:
  - alert: CiOrchestrationServiceJobInfraFailureRatioErrorSLOViolation
    for: 2m
    annotations:
      title: The job_infra_failure_ratio SLI of the ci-orchestration service (`{{
        $labels.stage }}` stage) has an error rate violating SLO
      description: |
        This SLI tracks the infra-attributable share of all CI job failures.

        The `gitlab_ci_job_failure_reasons` counter is incremented when a CI job fails. User- and external-attributable reasons are excluded from the error count (e.g. `script_failure`, `ci_quota_exceeded`, `no_matching_runner`, etc.). The result is the infra-attributable share of all job failures (0–100%).

        Currently the error-rate is {{ $value | humanizePercentage }}.
      grafana_dashboard_id: ci-orchestration-main/ci-orchestration-overview
      grafana_dashboard_link: https://dashboards.gitlab.net/d/ci-orchestration-main/ci-orchestration-overview?from=now-6h/m&to=now-1m/m&var-environment={{
        $labels.environment }}&var-stage={{ $labels.stage }}
      grafana_datasource_id: mimir-gitlab-pre
      grafana_min_zoom_hours: "6"
      grafana_panel_id: "3494975392"
      grafana_variables: environment,stage
      promql_template_1: |
        sum by (env,environment,tier,stage) (
          rate(gitlab_ci_job_failure_reasons{environment="{{ $labels.environment }}",reason!~"script_failure|ci_quota_exceeded|builds_disabled|user_blocked|stale_schedule|forward_deployment_failure|failed_outdated_deployment_job|api_failure|downstream_pipeline_creation_failed|downstream_bridge_project_not_found|insufficient_bridge_permissions|protected_environment_failure|no_matching_runner|runner_unsupported|secrets_provider_not_found|ip_restriction_failure|deployment_rejected|duo_workflow_not_allowed|invalid_bridge_trigger|job_token_expired|pipeline_loop_detected|reached_max_descendant_pipelines_depth|trace_size_exceeded|unmet_prerequisites|upstream_bridge_project_not_found|job_execution_timeout|missing_dependency_failure",stage="{{ $labels.stage }}"}[5m])
        )
      runbook: ci-orchestration/#alerts
    labels:
      aggregation: component
      alert_class: slo_violation
      alert_type: symptom
      feature_category: continuous_integration
      rules_domain: general
      severity: s3
      sli_type: error
      slo_alert: "yes"
      team: verify
      user_impacting: "yes"
      window: 1h
    expr: |
      (
        (
          gitlab_component_errors:ratio_1h{component="job_infra_failure_ratio",env="pre",monitor="global",type="ci-orchestration"}
          > (14.4 * 0.050000)
        )
        and on (env,environment,tier,type,stage,component)
        (
          gitlab_component_errors:ratio_5m{component="job_infra_failure_ratio",env="pre",monitor="global",type="ci-orchestration"}
          > (14.4 * 0.050000)
        )
      )
      and on(env,environment,tier,type,stage,component)
      (
        sum by(env,environment,tier,type,stage,component) (gitlab_component_ops:rate_1h{component="job_infra_failure_ratio",env="pre",monitor="global",type="ci-orchestration"}) >= 1
      )
