# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/mimir-aggregations.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'Global SLI Metrics: ci-orchestration - Burn-Rate 5m'
  interval: 1m
  rules:
  - record: gitlab_component_ops:rate_5m
    labels:
      component: job_infra_failure_ratio
      monitor: global
      stage: main
      tier: sv
      type: ci-orchestration
    expr: |
      sum by (env,environment) (
        sli_aggregations:gitlab_ci_job_failure_reasons:rate_5m{env="pre"}
      )
  - record: gitlab_component_errors:rate_5m
    labels:
      component: job_infra_failure_ratio
      monitor: global
      stage: main
      tier: sv
      type: ci-orchestration
    expr: |
      (
        sum by (env,environment) (
          sli_aggregations:gitlab_ci_job_failure_reasons:rate_5m{env="pre",reason!~"script_failure|ci_quota_exceeded|builds_disabled|user_blocked|stale_schedule|forward_deployment_failure|failed_outdated_deployment_job|api_failure|downstream_pipeline_creation_failed|downstream_bridge_project_not_found|insufficient_bridge_permissions|protected_environment_failure|no_matching_runner|runner_unsupported|secrets_provider_not_found|ip_restriction_failure|deployment_rejected|duo_workflow_not_allowed|invalid_bridge_trigger|job_token_expired|pipeline_loop_detected|reached_max_descendant_pipelines_depth|trace_size_exceeded|unmet_prerequisites|upstream_bridge_project_not_found|job_execution_timeout|missing_dependency_failure"}
        )
      )
      or
      (
        0 * group by(env,environment) (
          gitlab_component_ops:rate_5m{component="job_infra_failure_ratio",env="pre",monitor="global",stage="main",tier="sv",type="ci-orchestration"}
        )
      )
  - record: gitlab_component_errors:ratio_5m
    labels:
      component: job_infra_failure_ratio
      monitor: global
      tier: sv
      type: ci-orchestration
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_errors:rate_5m{component="job_infra_failure_ratio",env="pre",monitor="global",tier="sv",type="ci-orchestration"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_ops:rate_5m{component="job_infra_failure_ratio",env="pre",monitor="global",tier="sv",type="ci-orchestration"}
      )
  - record: gitlab_component_apdex:ratio_5m
    labels:
      component: job_infra_failure_ratio
      monitor: global
      tier: sv
      type: ci-orchestration
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_apdex:success:rate_5m{component="job_infra_failure_ratio",env="pre",monitor="global",tier="sv",type="ci-orchestration"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_apdex:weight:score_5m{component="job_infra_failure_ratio",env="pre",monitor="global",tier="sv",type="ci-orchestration"}
      )
  - record: gitlab_component_apdex:success:rate_5m
    labels:
      component: non_shared_runner_job_queue_duration
      monitor: global
      stage: main
      tier: sv
      type: ci-orchestration
    expr: |
      sum by (env,environment) (
        sli_aggregations:job_queue_duration_seconds_bucket:rate_5m{env="pre",le=~"30|30\\.0",shared_runner="false"}
      )
  - record: gitlab_component_apdex:weight:score_5m
    labels:
      component: non_shared_runner_job_queue_duration
      monitor: global
      stage: main
      tier: sv
      type: ci-orchestration
    expr: |
