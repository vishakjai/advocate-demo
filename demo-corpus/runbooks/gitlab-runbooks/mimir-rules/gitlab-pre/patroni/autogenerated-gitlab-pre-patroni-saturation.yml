# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/saturation.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: Saturation Rules (autogenerated)
  interval: 1m
  rules:
  - record: gitlab_component_saturation:ratio
    labels:
      component: cpu
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            1 - avg by (env,environment,shard,stage,tier,type) (
              rate(node_cpu_seconds_total{mode="idle", env="pre",type="patroni"}[5m])
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: disk_inodes
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            1 - (
              node_filesystem_files_free{fstype=~"(ext.|xfs)", env="pre",type="patroni"}
              /
              node_filesystem_files{fstype=~"(ext.|xfs)", env="pre",type="patroni"}
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: disk_maximum_capacity
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            max by (device,env,environment,fqdn,shard,stage,tier,type) (
              node_filesystem_size_bytes{fstype=~"ext.|xfs", env="pre",type="patroni"} - node_filesystem_avail_bytes{fstype=~"ext.|xfs", env="pre",type="patroni"}
              unless on (fqdn) node_disk_info{serial=~"lvm.*", env="pre",type="patroni"}
            ) / (64*2^40)
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: disk_space
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            (
              1 - node_filesystem_avail_bytes{fstype=~"ext.|xfs", env="pre",type="patroni"} / node_filesystem_size_bytes{fstype=~"ext.|xfs", env="pre",type="patroni"}
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: disk_sustained_read_iops
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            rate(node_disk_reads_completed_total{device!="sda", env="pre",type="patroni"}[20m])
            /
            node_disk_max_read_iops{device!="sda", env="pre",type="patroni"}
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: disk_sustained_read_throughput
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            rate(node_disk_read_bytes_total{device!="sda", env="pre",type="patroni"}[20m])
            /
            node_disk_max_read_bytes_seconds{device!="sda", env="pre",type="patroni"}
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: disk_sustained_write_iops
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            rate(node_disk_writes_completed_total{device!="sda", env="pre",type="patroni"}[20m])
            /
            node_disk_max_write_iops{device!="sda", env="pre",type="patroni"}
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: disk_sustained_write_throughput
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            rate(node_disk_written_bytes_total{device!="sda", env="pre",type="patroni"}[20m])
            /
            node_disk_max_write_bytes_seconds{device!="sda", env="pre",type="patroni"}
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: nf_conntrack_entries
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            max_over_time(node_nf_conntrack_entries{env="pre",type="patroni"}[1m])
            /
            node_nf_conntrack_entries_limit{env="pre",type="patroni"}
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: node_schedstat_waiting
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            avg without (cpu) (rate(node_schedstat_waiting_seconds_total{env="pre",type="patroni"}[1h]))
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: open_fds
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            (
              process_open_fds{env="pre",type="patroni"}
              /
              process_max_fds{env="pre",type="patroni"}
            )
            or
            (
              ruby_file_descriptors{env="pre",type="patroni"}
              /
              ruby_process_max_fds{env="pre",type="patroni"}
            )
            or
            (
              node_filefd_allocated{env="pre",type="patroni"}
              /
              node_filefd_maximum{env="pre",type="patroni"}
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: pg_active_db_connections_primary
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            sum without (state) (
              pg_stat_activity_count{datname=~"gitlabhq_production|gitlabhq_registry", state!="idle", env="pre",type="patroni"} unless on(instance) (pg_replication_is_replica == 1)
            )
            / on (env,environment,fqdn,shard,stage,tier,type)
            pg_settings_max_connections{env="pre",type="patroni"}
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: pg_active_db_connections_replica
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            sum without (state) (
              pg_stat_activity_count{datname=~"gitlabhq_production|gitlabhq_registry", state!="idle", env="pre",type="patroni"} and on(instance) (pg_replication_is_replica == 1)
            )
            / on (env,environment,fqdn,shard,stage,tier,type)
            pg_settings_max_connections{env="pre",type="patroni"}
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: pg_anon_memory
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            (
              node_memory_Active_anon_bytes{env="pre",type="patroni"}
              +
              node_memory_Inactive_anon_bytes{env="pre",type="patroni"}
            )
            /
            node_memory_MemTotal_bytes{env="pre",type="patroni"}
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: pg_btree_bloat
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            sum by (env,environment,fqdn,shard,stage,tier,type) (last_over_time(gitlab_database_bloat_btree_bloat_size{env="pre",type="patroni"}[1h]))
            /
            sum by (env,environment,fqdn,shard,stage,tier,type) (last_over_time(gitlab_database_bloat_btree_real_size{env="pre",type="patroni"}[1h]))
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: pg_id_sequences
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            max by (env,environment,fully_qualified_sequencename,shard,stage,tier,type) (
              gitlab_pg_sequences_current_value{env="pre",type="patroni"} / gitlab_pg_sequences_max_value{env="pre",type="patroni"}
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: pg_int4_id
    expr: |
      max by(column_name,env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            max by (column_name,env,environment,shard,stage,tier,type) (
              pg_int4_saturation_current_largest_value{env="pre",type="patroni",column_name!~".+(.|-|_)iid"} / pg_int4_saturation_column_max_value{env="pre",type="patroni",column_name!~".+(.|-|_)iid"}
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: pg_memory
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            1 - (
              node_memory_MemAvailable_bytes{env="pre",type="patroni"}
              /
              node_memory_MemTotal_bytes{env="pre",type="patroni"}
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: pg_primary_cpu
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            avg without(cpu, mode) (
              1
              -
              (
                rate(node_cpu_seconds_total{mode="idle", env="pre",type="patroni"}[5m])
                and on(fqdn)
                pg_replication_is_replica{env="pre",type="patroni"} == 0
              )
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: pg_table_bloat
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            sum by (env,environment,fqdn,shard,stage,tier,type) (avg_over_time(gitlab_database_bloat_table_bloat_size{env="pre",type="patroni"}[58m]))
            /
            sum by (env,environment,fqdn,shard,stage,tier,type) (avg_over_time(gitlab_database_bloat_table_real_size{env="pre",type="patroni"}[58m]))
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: pg_txid_vacuum_to_wraparound
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            (
              sum by (env,environment,shard,stage,tier,type) (
                increase(fluentd_pg_auto_vacuum_elapsed_seconds_total{env="pre",type="patroni"}[1d])
              )
              / on(environment, type) group_left() (
                pg_settings_autovacuum_max_workers and
                on (instance) pg_replication_is_replica == 0
              )
            )
            /
            (
              (2^31 - 10^6)
              /
              (
                avg by (env,environment,shard,stage,tier,type) (
                  deriv(pg_txid_current{env="pre",type="patroni"}[1d]) and
                  on (instance) pg_replication_is_replica == 0
                )
              )
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: pg_vacuum_activity_v2
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            sum by (env,environment,shard,stage,tier,type) (
              rate(fluentd_pg_auto_vacuum_elapsed_seconds_total{env="pre",type="patroni"}[1d])
              and on (fqdn) (pg_replication_is_replica{env="pre",type="patroni"} == 0)
            )
            /
            avg by (env,environment,shard,stage,tier,type) (
              pg_settings_autovacuum_max_workers{env="pre",type="patroni"}
              and on (instance, job) (pg_replication_is_replica{env="pre",type="patroni"} == 0)
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: pg_wait_sampling_buffer_mapping
    expr: |
      max by(env,environment,shard,stage,tier,type,wait_event) (
        clamp_min(
          clamp_max(
            (
              max by (env,environment,shard,stage,tier,type,wait_event) (
                rate(pg_wait_sampling_agg_count{env="pre",type="patroni", shard="default", wait_type="LWLock", wait_event="BufferMapping"}[5m])
                /
                on (fqdn) group_left() (sum(pg_stat_activity_count{env="pre",type="patroni", datname="gitlabhq_production", shard="default", state!~'idle.*'}) by (fqdn) * 100)
              )
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: pg_wait_sampling_lock_manager
    expr: |
      max by(env,environment,shard,stage,tier,type,wait_event) (
        clamp_min(
          clamp_max(
            (
              max by (env,environment,shard,stage,tier,type,wait_event) (
                rate(pg_wait_sampling_agg_count{env="pre",type="patroni", shard="default", wait_type="LWLock", wait_event="LockManager"}[5m])
                /
                on (fqdn) group_left() (sum(pg_stat_activity_count{env="pre",type="patroni", datname="gitlabhq_production", shard="default", state!~'idle.*'}) by (fqdn) * 100)
              )
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: pg_walsender_cpu
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            sum by (env,environment,shard,stage,tier,type) (
              sum by(env,environment,shard,stage,tier,type, fqdn) (
                rate(namedprocess_namegroup_cpu_seconds_total{env="pre",type="patroni", groupname=~"pg.worker.walsender|pg.worker.walwriter|wal-g"}[5m])
                and on (fqdn) (pg_replication_is_replica{env="pre",type="patroni"} == 0)
              )
              /
              count by (env,environment,shard,stage,tier,type, fqdn) (
                node_cpu_seconds_total{env="pre",type="patroni", mode="idle"} and on(fqdn) (pg_replication_is_replica{env="pre",type="patroni"} == 0)
              )
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: pg_xid_wraparound
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            (
              max without (series) (
                label_replace(pg_database_wraparound_age_datfrozenxid{env="pre",type="patroni"}, "series", "datfrozenxid", "", "")
                or
                label_replace(pg_database_wraparound_age_datminmxid{env="pre",type="patroni"}, "series", "datminmxid", "", "")
              )
              and on (instance, job) (pg_replication_is_replica{env="pre",type="patroni"} == 0)
            )
            /
            (2^31 - 3000000)
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: pg_xlog_position_bytes
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            max by (env,environment,shard,stage,tier,type) (
              rate(pg_xlog_position_bytes{env="pre",type="patroni", shard="default"}[5m])
              and on (fqdn) pg_replication_is_replica == 0
            )
            / (180 * 1000000)
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: pgbouncer_async_replica_pool
    expr: |
      max by(database,env,environment,fqdn,instance,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            (
              avg_over_time(pgbouncer_pools_server_active_connections{user="gitlab", database=~"gitlabhq_production_sidekiq_urgent.*", env="pre",type="patroni"}[5m]) +
              avg_over_time(pgbouncer_pools_server_testing_connections{user="gitlab", database=~"gitlabhq_production_sidekiq_urgent.*", env="pre",type="patroni"}[5m]) +
              avg_over_time(pgbouncer_pools_server_used_connections{user="gitlab", database=~"gitlabhq_production_sidekiq_urgent.*", env="pre",type="patroni"}[5m]) +
              avg_over_time(pgbouncer_pools_server_login_connections{user="gitlab", database=~"gitlabhq_production_sidekiq_urgent.*", env="pre",type="patroni"}[5m])
            )
            / on(database,env,environment,fqdn,instance,shard,stage,tier,type) group_left()
            sum by (database,env,environment,fqdn,instance,shard,stage,tier,type) (
              label_replace(
                avg_over_time(pgbouncer_databases_pool_size{name=~"gitlabhq_production_sidekiq_urgent.*", env="pre",type="patroni"}[5m]),
                "database", "$1", "name", "(.*)"
              )
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: pgbouncer_client_conn_replicas
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            max_over_time(pgbouncer_used_clients{env="pre",type="patroni"}[5m])
            /
            30000
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: pgbouncer_single_core
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            sum without(cpu, mode) (
              rate(
                namedprocess_namegroup_cpu_seconds_total{groupname=~"pgbouncer.*", env="pre",type="patroni"}[5m]
              )
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: pgbouncer_sync_replica_pool
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            (
              avg_over_time(pgbouncer_pools_server_active_connections{user=~"gitlab|gitlab-registry", database=~"gitlabhq_registry|gitlabhq_production", env="pre",type="patroni"}[5m]) +
              avg_over_time(pgbouncer_pools_server_testing_connections{user=~"gitlab|gitlab-registry", database=~"gitlabhq_registry|gitlabhq_production", env="pre",type="patroni"}[5m]) +
              avg_over_time(pgbouncer_pools_server_used_connections{user=~"gitlab|gitlab-registry", database=~"gitlabhq_registry|gitlabhq_production", env="pre",type="patroni"}[5m]) +
              avg_over_time(pgbouncer_pools_server_login_connections{user=~"gitlab|gitlab-registry", database=~"gitlabhq_registry|gitlabhq_production", env="pre",type="patroni"}[5m])
            )
            / on(env,environment,fqdn,instance,shard,stage,tier,type) group_left()
            sum by (env,environment,fqdn,instance,shard,stage,tier,type) (
              avg_over_time(pgbouncer_databases_pool_size{name=~"gitlabhq_registry|gitlabhq_production", env="pre",type="patroni"}[5m])
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: single_node_cpu
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            avg without(cpu, mode) (1 - rate(node_cpu_seconds_total{mode="idle", env="pre",type="patroni"}[5m]))
            ,
            1)
        ,
        0)
      )
