# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/mimir-aggregations.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'Global SLI Metrics: ci-jobs-api - Burn-Rate 5m'
  interval: 1m
  rules:
  - record: gitlab_component_apdex:success:rate_5m
    labels:
      component: rails_queueing
      monitor: global
      tier: sv
      type: ci-jobs-api
    expr: |
      (
        sum by (env,environment,stage) (
          sli_aggregations:gitlab_rails_queue_duration_seconds_bucket:rate_5m{env="pre",le=~"0\\.25",type="ci-jobs-api"}
        )
        +
        sum by (env,environment,stage) (
          sli_aggregations:gitlab_rails_queue_duration_seconds_bucket:rate_5m{env="pre",le=~"1|1\\.0",type="ci-jobs-api"}
        )
      )
      /
      2
  - record: gitlab_component_apdex:weight:score_5m
    labels:
      component: rails_queueing
      monitor: global
      tier: sv
      type: ci-jobs-api
    expr: |
      sum by (env,environment,stage) (
        sli_aggregations:gitlab_rails_queue_duration_seconds_bucket:rate_5m{env="pre",le="+Inf",type="ci-jobs-api"}
      )
  - record: gitlab_component_ops:rate_5m
    labels:
      component: rails_queueing
      monitor: global
      tier: sv
      type: ci-jobs-api
    expr: |
      sum by (env,environment,stage) (
        sli_aggregations:gitlab_rails_queue_duration_seconds_count:rate_5m{env="pre",type="ci-jobs-api"}
      )
  - record: gitlab_component_errors:ratio_5m
    labels:
      component: rails_queueing
      monitor: global
      tier: sv
      type: ci-jobs-api
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_errors:rate_5m{component="rails_queueing",env="pre",monitor="global",tier="sv",type="ci-jobs-api"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_ops:rate_5m{component="rails_queueing",env="pre",monitor="global",tier="sv",type="ci-jobs-api"}
      )
  - record: gitlab_component_apdex:ratio_5m
    labels:
      component: rails_queueing
      monitor: global
      tier: sv
      type: ci-jobs-api
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_apdex:success:rate_5m{component="rails_queueing",env="pre",monitor="global",tier="sv",type="ci-jobs-api"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_apdex:weight:score_5m{component="rails_queueing",env="pre",monitor="global",tier="sv",type="ci-jobs-api"}
      )
  - record: gitlab_component_errors:confidence:ratio_5m
    labels:
      component: rails_queueing
      confidence: 98%
      monitor: global
      tier: sv
      type: ci-jobs-api
    expr: |
      (gitlab_component_ops:rate_5m{component="rails_queueing",env="pre",monitor="global",tier="sv",type="ci-jobs-api"} == 0)
      or
      clamp(
        (
          (
            (gitlab_component_errors:rate_5m{component="rails_queueing",env="pre",monitor="global",tier="sv",type="ci-jobs-api"} / gitlab_component_ops:rate_5m{component="rails_queueing",env="pre",monitor="global",tier="sv",type="ci-jobs-api"})
            +
            5.411894 / (2 * (gitlab_component_ops:rate_5m{component="rails_queueing",env="pre",monitor="global",tier="sv",type="ci-jobs-api"} * 300))
          )
          -
          2.326348
          *
          sqrt(
            (
              (gitlab_component_errors:rate_5m{component="rails_queueing",env="pre",monitor="global",tier="sv",type="ci-jobs-api"} / gitlab_component_ops:rate_5m{component="rails_queueing",env="pre",monitor="global",tier="sv",type="ci-jobs-api"}) * (1 - (gitlab_component_errors:rate_5m{component="rails_queueing",env="pre",monitor="global",tier="sv",type="ci-jobs-api"} / gitlab_component_ops:rate_5m{component="rails_queueing",env="pre",monitor="global",tier="sv",type="ci-jobs-api"}))
              +
              5.411894 / (4 * (gitlab_component_ops:rate_5m{component="rails_queueing",env="pre",monitor="global",tier="sv",type="ci-jobs-api"} * 300))
            )
            /
            (gitlab_component_ops:rate_5m{component="rails_queueing",env="pre",monitor="global",tier="sv",type="ci-jobs-api"} * 300)
          )
        )
        /
        (1 + 5.411894 / (gitlab_component_ops:rate_5m{component="rails_queueing",env="pre",monitor="global",tier="sv",type="ci-jobs-api"} * 300)),
        0, 1
      )
