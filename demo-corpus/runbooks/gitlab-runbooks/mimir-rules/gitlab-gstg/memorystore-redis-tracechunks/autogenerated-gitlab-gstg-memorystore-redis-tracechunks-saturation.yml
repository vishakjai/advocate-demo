# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/saturation.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: Saturation Rules (autogenerated)
  interval: 1m
  rules:
  - record: gitlab_component_saturation:ratio
    labels:
      component: memorystore_redis_cpu
      stage: main
      tier: inf
    expr: |
      max by(env,environment,shard,type) (
        clamp_min(
          clamp_max(
            sum by (env,environment,shard,type)
            (
              stackdriver_redis_instance_redis_googleapis_com_stats_cpu_utilization_main_thread{env="gstg",type="memorystore-redis-tracechunks", role='primary'}
            ) / 60
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: memorystore_redis_memory_tracechunks
      stage: main
      tier: inf
    expr: |
      max by(env,environment,shard,type) (
        clamp_min(
          clamp_max(
            max by (env,environment,shard,type) (
              stackdriver_redis_instance_redis_googleapis_com_stats_memory_usage_ratio{env="gstg",type="memorystore-redis-tracechunks", role = "primary"}
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: memorystore_system_memory
      stage: main
      tier: inf
    expr: |
      max by(env,environment,shard,type) (
        clamp_min(
          clamp_max(
            max by (env,environment,shard,type) (
              stackdriver_redis_instance_redis_googleapis_com_stats_memory_system_memory_usage_ratio{env="gstg",type="memorystore-redis-tracechunks", role = "primary"}
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: open_fds
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            (
              process_open_fds{env="gstg",type="memorystore-redis-tracechunks"}
              /
              process_max_fds{env="gstg",type="memorystore-redis-tracechunks"}
            )
            or
            (
              ruby_file_descriptors{env="gstg",type="memorystore-redis-tracechunks"}
              /
              ruby_process_max_fds{env="gstg",type="memorystore-redis-tracechunks"}
            )
            or
            (
              node_filefd_allocated{env="gstg",type="memorystore-redis-tracechunks"}
              /
              node_filefd_maximum{env="gstg",type="memorystore-redis-tracechunks"}
            )
            ,
            1)
        ,
        0)
      )
