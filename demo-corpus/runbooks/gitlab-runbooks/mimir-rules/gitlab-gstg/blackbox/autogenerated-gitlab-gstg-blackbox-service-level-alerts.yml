# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/service-component-alerts.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'Service Component Alerts: blackbox'
  interval: 1m
  rules:
  - alert: BlackboxServiceProbeTrafficCessation
    for: 5m
    annotations:
      title: The probe SLI of the blackbox service (`{{ $labels.stage }}` stage) has
        not received any traffic in the past 30m
      description: |
        This alert signifies that the SLI is reporting a cessation of traffic; the signal is present, but is zero.
      grafana_dashboard_id: blackbox-main/blackbox-overview
      grafana_dashboard_link: https://dashboards.gitlab.net/d/blackbox-main/blackbox-overview?from=now-6h/m&to=now-1m/m&var-environment={{
        $labels.environment }}&var-stage={{ $labels.stage }}
      grafana_datasource_id: mimir-gitlab-gstg
      grafana_min_zoom_hours: "6"
      grafana_panel_id: "2313423011"
      grafana_variables: environment,stage
      promql_template_1: |
        sum by (env,environment,tier,stage) (
          avg_over_time(probe_success{environment="{{ $labels.environment }}",job="scrapeConfig/monitoring/prometheus-agent-blackbox",module="http_2xx",stage="{{ $labels.stage }}"}[5m])
        )
      runbook: blackbox/#alerts
    labels:
      aggregation: component
      alert_class: traffic_cessation
      alert_type: cause
      feature_category: not_owned
      pager: pagerduty
      rules_domain: general
      severity: s2
      sli_type: ops
      slo_alert: "no"
      user_impacting: "no"
    expr: |
      gitlab_component_ops:rate_30m{component="probe",env="gstg",monitor="global",stage="main",type="blackbox"} == 0
      and
      gitlab_component_ops:rate_30m{component="probe",env="gstg",monitor="global",stage="main",type="blackbox"} offset 1h >= 0.16666666666666666
  - alert: BlackboxServiceProbeTrafficAbsent
    for: 30m
    annotations:
      title: The probe SLI of the blackbox service (`{{ $labels.stage }}` stage) has
        not reported any traffic in the past 30m
      description: |
        This alert signifies that the SLI was previously reporting traffic, but is no longer - the signal is absent.

        This could be caused by a change to the metrics used in the SLI, or by the service not receiving traffic.
      grafana_dashboard_id: blackbox-main/blackbox-overview
      grafana_dashboard_link: https://dashboards.gitlab.net/d/blackbox-main/blackbox-overview?from=now-6h/m&to=now-1m/m&var-environment={{
        $labels.environment }}&var-stage={{ $labels.stage }}
      grafana_datasource_id: mimir-gitlab-gstg
      grafana_min_zoom_hours: "6"
      grafana_panel_id: "2313423011"
      grafana_variables: environment,stage
      promql_template_1: |
        sum by (env,environment,tier,stage) (
          avg_over_time(probe_success{environment="{{ $labels.environment }}",job="scrapeConfig/monitoring/prometheus-agent-blackbox",module="http_2xx",stage="{{ $labels.stage }}"}[5m])
        )
      runbook: blackbox/#alerts
    labels:
      aggregation: component
      alert_class: traffic_cessation
      alert_type: cause
      feature_category: not_owned
      pager: pagerduty
      rules_domain: general
      severity: s2
      sli_type: ops
      slo_alert: "no"
      user_impacting: "no"
    expr: |
      gitlab_component_ops:rate_5m{component="probe",env="gstg",monitor="global",stage="main",type="blackbox"} offset 1h
      unless
      gitlab_component_ops:rate_5m{component="probe",env="gstg",monitor="global",stage="main",type="blackbox"}
