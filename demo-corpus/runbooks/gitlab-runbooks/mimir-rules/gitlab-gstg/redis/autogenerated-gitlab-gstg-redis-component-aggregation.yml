# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/mimir-aggregations.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'Global SLI Metrics: redis - Burn-Rate 5m'
  interval: 1m
  rules:
  - record: gitlab_component_ops:rate_5m
    labels:
      component: primary_server
      monitor: global
      stage: main
      tier: db
      type: redis
    expr: |
      sum by (env,environment) (
        sli_aggregations:redis_commands_processed_total:rate_5m{env="gstg",type="redis"} and on (instance) redis_instance_info{role="master"}
      )
  - record: gitlab_component_errors:ratio_5m
    labels:
      component: primary_server
      monitor: global
      tier: db
      type: redis
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_errors:rate_5m{component="primary_server",env="gstg",monitor="global",tier="db",type="redis"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_ops:rate_5m{component="primary_server",env="gstg",monitor="global",tier="db",type="redis"}
      )
  - record: gitlab_component_apdex:ratio_5m
    labels:
      component: primary_server
      monitor: global
      tier: db
      type: redis
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_apdex:success:rate_5m{component="primary_server",env="gstg",monitor="global",tier="db",type="redis"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_apdex:weight:score_5m{component="primary_server",env="gstg",monitor="global",tier="db",type="redis"}
      )
  - record: gitlab_component_ops:rate_5m
    labels:
      component: secondary_servers
      monitor: global
      stage: main
      tier: db
      type: redis
    expr: |
      sum by (env,environment) (
        sli_aggregations:redis_commands_processed_total:rate_5m{env="gstg",type="redis"} and on (instance) redis_instance_info{role="slave"}
      )
  - record: gitlab_component_errors:ratio_5m
    labels:
      component: secondary_servers
      monitor: global
      tier: db
      type: redis
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_errors:rate_5m{component="secondary_servers",env="gstg",monitor="global",tier="db",type="redis"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_ops:rate_5m{component="secondary_servers",env="gstg",monitor="global",tier="db",type="redis"}
      )
  - record: gitlab_component_apdex:ratio_5m
    labels:
      component: secondary_servers
      monitor: global
      tier: db
      type: redis
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_apdex:success:rate_5m{component="secondary_servers",env="gstg",monitor="global",tier="db",type="redis"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_apdex:weight:score_5m{component="secondary_servers",env="gstg",monitor="global",tier="db",type="redis"}
      )
