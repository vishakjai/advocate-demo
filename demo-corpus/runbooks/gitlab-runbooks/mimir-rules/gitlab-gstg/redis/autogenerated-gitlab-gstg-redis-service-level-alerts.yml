        $labels.environment }}&var-stage={{ $labels.stage }}
      grafana_datasource_id: mimir-gitlab-gstg
      grafana_min_zoom_hours: "6"
      grafana_panel_id: "3020974736"
      grafana_variables: environment,stage
      promql_template_1: |
        sum by (env,environment,tier,stage) (
          rate(redis_commands_processed_total{environment="{{ $labels.environment }}",stage="{{ $labels.stage }}",type="redis"}[5m]) and on (instance) redis_instance_info{role="slave"}
        )
      runbook: redis/#alerts
    labels:
      aggregation: component
      alert_class: traffic_cessation
      alert_type: cause
      feature_category: not_owned
      pager: pagerduty
      rules_domain: general
      severity: s2
      sli_type: ops
      slo_alert: "no"
      user_impacting: "yes"
    expr: |
      gitlab_component_ops:rate_30m{component="secondary_servers",env="gstg",monitor="global",stage="main",type="redis"} == 0
      and
      gitlab_component_ops:rate_30m{component="secondary_servers",env="gstg",monitor="global",stage="main",type="redis"} offset 1h >= 0.16666666666666666
