# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/x509-certificate-alerts.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: X509 Certificate Alerts
  rules:
  - alert: X509ExporterReadErrors
    for: 5m
    annotations:
      title: Increasing read errors for x509-certificate-exporter
      description: |
        Over the last 15 minutes, this x509-certificate-exporter instance has experienced errors reading certificate files or querying the Kubernetes API.

        This could be caused by a misconfiguration if triggered when the exporter starts.
      grafana_datasource_id: mimir-gitlab-gstg
      runbook: certificates/
    labels:
      alert_type: cause
      severity: s3
      team: sre_reliability
    expr: |
      sum by (environment) (
        delta(x509_read_errors{env="gstg"}[15m])
      ) > 0
  - alert: CertificateExpiration
    for: 15m
    annotations:
      title: Certificate is about to expire
      description: |
        Certificate for "{{ $labels.subject_CN }}" is about to expire {{if $labels.secret_name }}in Kubernetes secret "{{ $labels.secret_namespace }}/{{ $labels.secret_name }}" in cluster {{ $labels.cluster }}{{else}}at location "{{ $labels.filepath }}"{{end}}
      grafana_datasource_id: mimir-gitlab-gstg
      runbook: certificates/
    labels:
      alert_type: cause
      pager: pagerduty
      severity: s2
      team: sre_reliability
    expr: |
      ((x509_cert_not_after{env="gstg"} - time()) / 86400) < 14
  - alert: CertificateRenewal
    for: 15m
    annotations:
      title: Certificate should be renewed
      description: |
        Certificate for "{{ $labels.subject_CN }}" should be renewed {{if $labels.secret_name }}in Kubernetes secret "{{ $labels.secret_namespace }}/{{ $labels.secret_name }}" in cluster {{ $labels.cluster }}{{else}}at location "{{ $labels.filepath }}"{{end}}
      grafana_datasource_id: mimir-gitlab-gstg
      runbook: certificates/
    labels:
      alert_type: cause
      severity: s3
      team: sre_reliability
    expr: |
      ((x509_cert_not_after{env="gstg"} - time()) / 86400) < 28
