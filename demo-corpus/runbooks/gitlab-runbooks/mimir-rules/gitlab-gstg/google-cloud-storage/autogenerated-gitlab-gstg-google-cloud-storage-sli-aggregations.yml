# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/sli_aggregations.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'SLI Aggregations: google-cloud-storage - artifacts_cdn - 5m burn-rate'
  interval: 1m
  rules:
  - record: sli_aggregations:stackdriver_https_lb_rule_loadbalancing_googleapis_com_https_request_count:rate_5m
    expr: |
      sum by (component,env,environment,feature_category,fqdn,product_stage,project_id,proxy_continent,region,response_code,response_code_class,shard,stage,stage_group,tier,type,url_map_name) (
        rate(stackdriver_https_lb_rule_loadbalancing_googleapis_com_https_request_count{env="gstg",project_id=~"gitlab-production",url_map_name=~"gprd-artifacts-cdn"}[5m])
      )
- name: 'SLI Aggregations: google-cloud-storage - pages_range_requests - 5m burn-rate
    - emitted by web-pages'
  interval: 1m
  rules:
  - record: sli_aggregations:gitlab_pages_httprange_trace_duration_bucket:rate_5m
    expr: |
      sum by (component,env,environment,feature_category,fqdn,le,product_stage,region,request_stage,shard,stage,stage_group,tier,type) (
        rate(gitlab_pages_httprange_trace_duration_bucket{env="gstg",request_stage=~"httptrace\\.ClientTrace\\.GotFirstResponseByte",type=~"web-pages"}[5m])
      )
- name: 'SLI Aggregations: google-cloud-storage - pages_request_duration - 5m burn-rate'
  interval: 1m
  rules:
  - record: sli_aggregations:gitlab_pages_httprange_requests_duration_bucket:rate_5m
