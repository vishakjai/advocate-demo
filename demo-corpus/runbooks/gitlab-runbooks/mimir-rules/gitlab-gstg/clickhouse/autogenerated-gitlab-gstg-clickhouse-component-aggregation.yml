# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/mimir-aggregations.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'Global SLI Metrics: clickhouse - Burn-Rate 5m'
  interval: 1m
  rules:
  - record: gitlab_component_ops:rate_5m
    labels:
      component: reads
      monitor: global
      stage: main
      tier: inf
      type: clickhouse
    expr: |
      sum by (env,environment) (
        sli_aggregations:ClickHouseProfileEvents_SelectQuery:rate_5m{env="gstg",type="clickhouse"}
      )
  - record: gitlab_component_errors:rate_5m
    labels:
      component: reads
      monitor: global
      stage: main
      tier: inf
      type: clickhouse
    expr: |
      (
        sum by (env,environment) (
          sli_aggregations:ClickHouseProfileEvents_FailedSelectQuery:rate_5m{env="gstg",type="clickhouse"}
        )
      )
      or
      (
        0 * group by(env,environment) (
          gitlab_component_ops:rate_5m{component="reads",env="gstg",monitor="global",stage="main",tier="inf",type="clickhouse"}
        )
      )
  - record: gitlab_component_errors:ratio_5m
    labels:
      component: reads
      monitor: global
      tier: inf
      type: clickhouse
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_errors:rate_5m{component="reads",env="gstg",monitor="global",tier="inf",type="clickhouse"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_ops:rate_5m{component="reads",env="gstg",monitor="global",tier="inf",type="clickhouse"}
      )
  - record: gitlab_component_apdex:ratio_5m
    labels:
      component: reads
      monitor: global
      tier: inf
      type: clickhouse
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_apdex:success:rate_5m{component="reads",env="gstg",monitor="global",tier="inf",type="clickhouse"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_apdex:weight:score_5m{component="reads",env="gstg",monitor="global",tier="inf",type="clickhouse"}
      )
  - record: gitlab_component_ops:rate_5m
    labels:
      component: writes
      monitor: global
      stage: main
      tier: inf
      type: clickhouse
    expr: |
      sum by (env,environment) (
        sli_aggregations:ClickHouseProfileEvents_InsertQuery:rate_5m{env="gstg",type="clickhouse"}
      )
  - record: gitlab_component_errors:rate_5m
    labels:
      component: writes
      monitor: global
      stage: main
      tier: inf
      type: clickhouse
    expr: |
      (
        sum by (env,environment) (
          sli_aggregations:ClickHouseProfileEvents_FailedInsertQuery:rate_5m{env="gstg",type="clickhouse"}
        )
      )
      or
      (
        0 * group by(env,environment) (
          gitlab_component_ops:rate_5m{component="writes",env="gstg",monitor="global",stage="main",tier="inf",type="clickhouse"}
        )
      )
  - record: gitlab_component_errors:ratio_5m
    labels:
      component: writes
      monitor: global
      tier: inf
      type: clickhouse
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_errors:rate_5m{component="writes",env="gstg",monitor="global",tier="inf",type="clickhouse"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_ops:rate_5m{component="writes",env="gstg",monitor="global",tier="inf",type="clickhouse"}
      )
  - record: gitlab_component_apdex:ratio_5m
    labels:
      component: writes
      monitor: global
      tier: inf
      type: clickhouse
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_apdex:success:rate_5m{component="writes",env="gstg",monitor="global",tier="inf",type="clickhouse"}
      )
      /
      sum by (env,environment,stage) (
