groups:
- name: 'SLI Aggregations: clickhouse - reads - 5m burn-rate'
  interval: 1m
  rules:
  - record: sli_aggregations:ClickHouseProfileEvents_FailedSelectQuery:rate_5m
    expr: |
      sum by (clickhouse_org,clickhouse_service_name,component,env,environment,feature_category,fqdn,hostname,product_stage,region,shard,stage,stage_group,tier,type) (
        rate(ClickHouseProfileEvents_FailedSelectQuery{env="gstg",type=~"clickhouse"}[5m])
      )
  - record: sli_aggregations:ClickHouseProfileEvents_SelectQuery:rate_5m
    expr: |
      sum by (clickhouse_org,clickhouse_service_name,component,env,environment,feature_category,fqdn,hostname,product_stage,region,shard,stage,stage_group,tier,type) (
