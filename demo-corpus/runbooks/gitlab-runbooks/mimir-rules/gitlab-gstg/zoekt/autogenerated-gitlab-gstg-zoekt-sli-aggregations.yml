groups:
- name: 'SLI Aggregations: zoekt - zoekt_searching - 5m burn-rate'
  interval: 1m
  rules:
  - record: sli_aggregations:zoekt_search_duration_seconds_bucket:rate_5m
    expr: |
      sum by (component,container,env,environment,feature_category,fqdn,le,product_stage,region,shard,stage,stage_group,tier,type) (
        rate(zoekt_search_duration_seconds_bucket{container=~"zoekt-webserver",env="gstg"}[5m])
      )
  - record: sli_aggregations:zoekt_search_failed_total:rate_5m
    expr: |
      sum by (component,container,env,environment,feature_category,fqdn,product_stage,region,shard,stage,stage_group,tier,type) (
        rate(zoekt_search_failed_total{container=~"zoekt-webserver",env="gstg"}[5m])
      )
  - record: sli_aggregations:zoekt_search_requests_total:rate_5m
