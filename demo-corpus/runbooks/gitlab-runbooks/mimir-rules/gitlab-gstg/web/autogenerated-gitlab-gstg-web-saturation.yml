# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/saturation.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: Saturation Rules (autogenerated)
  interval: 1m
  rules:
  - record: gitlab_component_saturation:ratio
    labels:
      component: kube_container_cpu
    expr: |
      quantile by(env,environment,shard,stage,tier,type) (
        0.99,
        clamp_min(
          clamp_max(
            (
              sum by (container,env,environment,pod,shard,stage,tier,type) (
                rate(container_cpu_usage_seconds_total:labeled{container!="", container!="POD", env="gstg",type="web"}[1h])
                unless on(pod) (
                  kube_pod_labels:labeled{label_gitlab_com_exclude_saturation_point=~"(^|.*[.])kube_container_cpu_request([.].*|$)", env="gstg",type="web"}
                )
              )
              unless on(container,env,environment,pod,shard,stage,tier,type) (
                last_over_time(container_spec_cpu_quota:labeled{container!="", container!="POD", env="gstg",type="web"}[1h])
              )
            )
            /
            sum by(container,env,environment,pod,shard,stage,tier,type) (
              kube_pod_container_resource_requests:labeled{container!="", container!="POD", resource="cpu", env="gstg",type="web"}
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: kube_container_cpu_limit
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            sum by (container,env,environment,pod,shard,stage,tier,type) (
              rate(container_cpu_usage_seconds_total:labeled{container!="", container!="POD", env="gstg",type="web"}[5m])
              unless on(pod) (
                kube_pod_labels:labeled{label_gitlab_com_exclude_saturation_point=~"(^|.*[.])kube_container_cpu_limit([.].*|$)", env="gstg",type="web"}
              )
            )
            /
            sum by(container,env,environment,pod,shard,stage,tier,type) (
              container_spec_cpu_quota:labeled{container!="", container!="POD", env="gstg",type="web"}
              /
              container_spec_cpu_period:labeled{container!="", container!="POD", env="gstg",type="web"}
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: kube_container_rss_limit
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            (
              container_memory_rss:labeled{container!="", container!="POD", env="gstg",type="web"}
              unless on(pod) (
                kube_pod_labels:labeled{label_gitlab_com_exclude_saturation_point=~"(^|.*[.])kube_container_rss_limit([.].*|$)", env="gstg",type="web"}
              )
            )
            / on(container,deployment,env,environment,pod,shard,stage,tier,type) group_left()
            max by(container,deployment,env,environment,pod,shard,stage,tier,type) (
              kube_pod_container_resource_limits:labeled{container!="", resource="memory", env="gstg",type="web"} > 0
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: kube_container_rss_request
    expr: |
      quantile by(env,environment,shard,stage,tier,type) (
        0.99,
        clamp_min(
          clamp_max(
            (
              container_memory_rss:labeled{container!="", container!="POD", env="gstg",type="web"}
              unless on(pod) (
                kube_pod_labels:labeled{label_gitlab_com_exclude_saturation_point=~"(^|.*[.])kube_container_rss_request([.].*|$)", env="gstg",type="web"}
              )
            )
            / on(container,deployment,env,environment,pod,shard,stage,tier,type) group_left()
            max by(container,deployment,env,environment,pod,shard,stage,tier,type) (
              kube_pod_container_resource_requests:labeled{container!="", resource="memory", env="gstg",type="web"} > 0
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: kube_container_throttling
    expr: |
      quantile by(env,environment,shard,stage,tier,type) (
        0.99,
        clamp_min(
          clamp_max(
            # This doesn't really aggregate anything as `pod` is one of the resource labels and there's only one series
            max by (container,env,environment,pod,shard,stage,tier,type)(
              rate(container_cpu_cfs_throttled_seconds_total:labeled{container!="", env="gstg",type="web"}[5m])
              unless on(pod) (
                kube_pod_labels:labeled{label_gitlab_com_exclude_saturation_point=~"(^|.*[.])kube_container_throttling([.].*|$)", env="gstg",type="web"}
              )
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: kube_go_memory
    expr: |
      quantile by(env,environment,shard,stage,tier,type) (
        0.99,
        clamp_min(
          clamp_max(
            go_memstats_alloc_bytes{env="gstg",type="web"}
            / on(cluster,env,environment,pod,shard,stage,tier,type) group_left()
            max by(cluster,env,environment,pod,shard,stage,tier,type) (
              kube_pod_container_resource_requests:labeled{container=~"gitlab-pages|gitlab-workhorse|kas|registry", resource="memory", env="gstg",type="web"}
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: kube_horizontalpodautoscaler_desired_replicas
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            kube_horizontalpodautoscaler_status_desired_replicas:labeled{env="gstg",type="web", shard!~"database-throttled|elasticsearch|gitaly-throttled|urgent-authorized-projects", namespace!~"pubsubbeat"}
            /
            kube_horizontalpodautoscaler_spec_max_replicas:labeled{env="gstg",type="web", shard!~"database-throttled|elasticsearch|gitaly-throttled|urgent-authorized-projects", namespace!~"pubsubbeat"}
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: open_fds
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            (
              process_open_fds{env="gstg",type="web"}
              /
              process_max_fds{env="gstg",type="web"}
            )
            or
            (
              ruby_file_descriptors{env="gstg",type="web"}
              /
              ruby_process_max_fds{env="gstg",type="web"}
            )
            or
            (
              node_filefd_allocated{env="gstg",type="web"}
              /
              node_filefd_maximum{env="gstg",type="web"}
            )
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: puma_workers
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            sum by(env,environment,shard,stage,tier,type) (avg_over_time(sum without (pid,worker) (puma_active_connections{env="gstg",type="web"})[1m:]))
            /
            sum by(env,environment,shard,stage,tier,type) (sum without (pid,worker) (puma_max_threads{pid="puma_master", env="gstg",type="web"}))
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: rails_db_connection_pool
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            (
              avg_over_time(gitlab_database_connection_pool_busy{class="ActiveRecord::Base", env="gstg",type="web"}[5m])
              +
              avg_over_time(gitlab_database_connection_pool_dead{class="ActiveRecord::Base", env="gstg",type="web"}[5m])
            )
            /
            gitlab_database_connection_pool_size{class="ActiveRecord::Base", env="gstg",type="web"}
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: ruby_thread_contention
    expr: |
      quantile by(env,environment,shard,stage,tier,type) (
        0.99,
        clamp_min(
          clamp_max(
            rate(ruby_process_cpu_seconds_total{env="gstg",type="web"}[1h])
            ,
            1)
        ,
        0)
      )
  - record: gitlab_component_saturation:ratio
    labels:
      component: workhorse_image_scaling
    expr: |
      max by(env,environment,shard,stage,tier,type) (
        clamp_min(
          clamp_max(
            avg_over_time(gitlab_workhorse_image_resize_processes{env="gstg",type="web"}[5m])
              /
            gitlab_workhorse_image_resize_max_processes{env="gstg",type="web"}
            ,
            1)
        ,
        0)
      )
