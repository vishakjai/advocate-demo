groups:
- name: 'SLI Aggregations: web - dependency_proxy - 5m burn-rate'
  interval: 1m
  rules:
  - record: sli_aggregations:gitlab_sli_rails_request_error_total:rate_5m
    expr: |
      sum by (component,endpoint_id,env,environment,feature_category,fqdn,job,product_stage,region,request_urgency,shard,stage,stage_group,tier,type) (
        rate(gitlab_sli_rails_request_error_total{env="gstg",type=~"web"}[5m])
      )
  - record: sli_aggregations:gitlab_sli_rails_request_total:rate_5m
    expr: |
      sum by (component,endpoint_id,env,environment,feature_category,fqdn,job,product_stage,region,request_urgency,shard,stage,stage_group,tier,type) (
        rate(gitlab_sli_rails_request_total{env="gstg",type=~"web"}[5m])
      )
