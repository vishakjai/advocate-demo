# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/mimir-aggregations.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'Feature Category Metrics: ai-assisted - Burn-Rate 5m'
  interval: 1m
  rules:
  - record: gitlab:component:feature_category:execution:apdex:success:rate_5m
    labels:
      component: rails_request
      monitor: global
      tier: sv
      type: ai-assisted
    expr: |
      sum by (env,environment,stage,feature_category) (
        sli_aggregations:gitlab_sli_rails_request_apdex_success_total:rate_5m{env="gstg",job="gitlab-rails",type="ai-assisted"} offset 30s
      )
  - record: gitlab:component:feature_category:execution:apdex:weight:score_5m
    labels:
      component: rails_request
      monitor: global
      tier: sv
      type: ai-assisted
    expr: |
      sum by (env,environment,stage,feature_category) (
        sli_aggregations:gitlab_sli_rails_request_apdex_total:rate_5m{env="gstg",job="gitlab-rails",type="ai-assisted"} offset 30s
      )
  - record: gitlab:component:feature_category:execution:ops:rate_5m
    labels:
      component: rails_request
      monitor: global
      tier: sv
      type: ai-assisted
    expr: |
      sum by (env,environment,stage,feature_category) (
        sli_aggregations:gitlab_sli_rails_request_total:rate_5m{env="gstg",job="gitlab-rails",type="ai-assisted"} offset 30s
      )
  - record: gitlab:component:feature_category:execution:error:rate_5m
    labels:
      component: rails_request
      monitor: global
      tier: sv
      type: ai-assisted
    expr: |
      (
        sum by (env,environment,stage,feature_category) (
          sli_aggregations:gitlab_sli_rails_request_error_total:rate_5m{env="gstg",job="gitlab-rails",type="ai-assisted"} offset 30s
        )
      )
      or
      (
        0 * group by(env,environment,stage,feature_category) (
          gitlab:component:feature_category:execution:ops:rate_5m{component="rails_request",env="gstg",monitor="global",tier="sv",type="ai-assisted"}
        )
      )
  - record: gitlab:component:feature_category:execution:apdex:success:rate_5m
    labels:
      component: workhorse
      feature_category: code_suggestions
      monitor: global
      tier: sv
      type: ai-assisted
    expr: |
      (
        sum by (env,environment,stage) (
          sli_aggregations:gitlab_workhorse_http_request_duration_seconds_bucket:rate_5m{code!~"5..",env="gstg",fetched_external_url!="true",job=~"gitlab-workhorse|gitlab-workhorse-api",le=~"10|10\\.0",route!="^/-/health$",route!="^/-/(readiness|liveness)$",type="ai-assisted"}
        )
        +
        sum by (env,environment,stage) (
          sli_aggregations:gitlab_workhorse_http_request_duration_seconds_bucket:rate_5m{code!~"5..",env="gstg",fetched_external_url!="true",job=~"gitlab-workhorse|gitlab-workhorse-api",le=~"30|30\\.0",route!="^/-/health$",route!="^/-/(readiness|liveness)$",type="ai-assisted"}
        )
      )
      /
      2
  - record: gitlab:component:feature_category:execution:apdex:weight:score_5m
    labels:
      component: workhorse
      feature_category: code_suggestions
      monitor: global
      tier: sv
      type: ai-assisted
    expr: |
      sum by (env,environment,stage) (
        sli_aggregations:gitlab_workhorse_http_request_duration_seconds_bucket:rate_5m{code!~"5..",env="gstg",fetched_external_url!="true",job=~"gitlab-workhorse|gitlab-workhorse-api",le="+Inf",route!="^/-/health$",route!="^/-/(readiness|liveness)$",type="ai-assisted"}
      )
  - record: gitlab:component:feature_category:execution:ops:rate_5m
    labels:
      component: workhorse
      feature_category: code_suggestions
      monitor: global
      tier: sv
      type: ai-assisted
    expr: |
      sum by (env,environment,stage) (
        sli_aggregations:gitlab_workhorse_http_requests_total:rate_5m{env="gstg",job=~"gitlab-workhorse|gitlab-workhorse-api",type="ai-assisted"} offset 30s
      )
  - record: gitlab:component:feature_category:execution:error:rate_5m
    labels:
      component: workhorse
      feature_category: code_suggestions
      monitor: global
      tier: sv
      type: ai-assisted
    expr: |
      (
        sum by (env,environment,stage) (
          sli_aggregations:gitlab_workhorse_http_requests_total:rate_5m{code=~"^5.*",env="gstg",job=~"gitlab-workhorse|gitlab-workhorse-api",route!="^/-/health$",route!="^/-/(readiness|liveness)$",type="ai-assisted"} offset 30s
        )
      )
      or
      (
        0 * group by(env,environment,stage) (
          gitlab:component:feature_category:execution:ops:rate_5m{component="workhorse",env="gstg",feature_category="code_suggestions",monitor="global",tier="sv",type="ai-assisted"}
        )
      )
