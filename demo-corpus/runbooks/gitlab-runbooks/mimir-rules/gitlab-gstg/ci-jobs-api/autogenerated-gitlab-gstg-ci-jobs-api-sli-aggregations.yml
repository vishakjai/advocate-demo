groups:
- name: 'SLI Aggregations: ci-jobs-api - rails_queueing - 5m burn-rate'
  interval: 1m
  rules:
  - record: sli_aggregations:gitlab_rails_queue_duration_seconds_bucket:rate_5m
    expr: |
      sum by (component,env,environment,feature_category,fqdn,le,product_stage,region,shard,stage,stage_group,tier,type) (
        rate(gitlab_rails_queue_duration_seconds_bucket{env="gstg",type=~"ci-jobs-api"}[5m])
      )
  - record: sli_aggregations:gitlab_rails_queue_duration_seconds_count:rate_5m
    expr: |
      sum by (component,env,environment,feature_category,fqdn,product_stage,region,shard,stage,stage_group,tier,type) (
        rate(gitlab_rails_queue_duration_seconds_count{env="gstg",type=~"ci-jobs-api"}[5m])
      )
