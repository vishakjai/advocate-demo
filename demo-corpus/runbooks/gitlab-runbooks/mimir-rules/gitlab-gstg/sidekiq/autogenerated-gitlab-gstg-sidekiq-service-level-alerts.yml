      alert_class: traffic_cessation
      alert_type: cause
      feature_category: not_owned
      rules_domain: general
      severity: s3
      sli_type: ops
      slo_alert: "no"
      user_impacting: "yes"
    expr: |
      gitlab_component_ops:rate_5m{component="sidekiq_execution_with_external_dependency",env="gstg",monitor="global",stage="main",type="sidekiq"} offset 1h
      unless
      gitlab_component_ops:rate_5m{component="sidekiq_execution_with_external_dependency",env="gstg",monitor="global",stage="main",type="sidekiq"}
  - alert: SidekiqServiceSidekiqQueueingApdexSLOViolationSingleShard
    for: 10m
    annotations:
      title: The sidekiq_queueing SLI of the sidekiq service on shard `{{ $labels.shard
        }}` has an apdex violating SLO
      description: |
        The number of Sidekiq jobs meeting their queueing duration target based on the urgency of the worker. By default, queueing of a job should take no more than 5 minutes for low urgency work, or 5 seconds for high urgency work.

        Read more about this in the [runbooks doc](https://runbooks.gitlab.com/sidekiq/sidekiq-queueing-apdex/).

        Since the `{{ $labels.type }}` service is not fully redundant, SLI violations on a single shard may represent a user-impacting service degradation.

        Currently the apdex value is {{ $value | humanizePercentage }}.
      grafana_dashboard_id: sidekiq-main/sidekiq-overview
      grafana_dashboard_link: https://dashboards.gitlab.net/d/sidekiq-main/sidekiq-overview?from=now-6h/m&to=now-1m/m&var-environment={{
        $labels.environment }}&var-stage={{ $labels.stage }}&var-shard={{ $labels.shard
        }}
      grafana_datasource_id: mimir-gitlab-gstg
      grafana_min_zoom_hours: "6"
      grafana_panel_id: "3643825112"
      grafana_variables: environment,stage,shard
      runbook: sidekiq/#alerts
    labels:
      aggregation: component_shard
      alert_class: slo_violation
      alert_type: symptom
      feature_category: not_owned
      pager: pagerduty
      rules_domain: general
      severity: s2
      sli_type: apdex
      slo_alert: "yes"
      user_impacting: "yes"
      window: 1h
    expr: |
      (
        (
          gitlab_component_shard_apdex:ratio_1h{component="sidekiq_queueing",env="gstg",monitor="global",shard!~"catchall|catchall-b|elasticsearch|import-shared-storage|urgent-authorized-projects|urgent-cpu-bound",type="sidekiq"}
          < (1 - 14.4 * 0.001000)
        )
        and on (env,environment,tier,type,stage,shard,component)
        (
          gitlab_component_shard_apdex:ratio_5m{component="sidekiq_queueing",env="gstg",monitor="global",shard!~"catchall|catchall-b|elasticsearch|import-shared-storage|urgent-authorized-projects|urgent-cpu-bound",type="sidekiq"}
          < (1 - 14.4 * 0.001000)
        )
      )
      and on(env,environment,tier,type,stage,shard,component)
      (
        sum by(env,environment,tier,type,stage,shard,component) (gitlab_component_shard_ops:rate_1h{component="sidekiq_queueing",env="gstg",monitor="global",shard!~"catchall|catchall-b|elasticsearch|import-shared-storage|urgent-authorized-projects|urgent-cpu-bound",type="sidekiq"}) >= 1
