      alert_class: slo_violation
      alert_type: symptom
      feature_category: duo_chat
      rules_domain: general
      severity: s3
      sli_type: apdex
      slo_alert: "yes"
      user_impacting: "yes"
      window: 1h
    expr: |
      (
        (
          gitlab_component_shard_apdex:ratio_1h{component="llm_chat_first_token",env="gstg",monitor="global",type="sidekiq"}
          < (1 - 14.4 * 0.005000)
        )
        and on (env,environment,tier,type,stage,shard,component)
        (
