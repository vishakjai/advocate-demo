# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/service-component-alerts.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'Service Component Alerts: sidekiq'
  interval: 1m
  rules:
  - alert: SidekiqServiceCiDeletedObjectsProcessingApdexSLOViolationSingleShard
    for: 10m
    annotations:
      title: The ci_deleted_objects_processing SLI of the sidekiq service on shard
        `{{ $labels.shard }}` has an apdex violating SLO
      description: |
        This SLI signifies operations that destroy job artifacts that have been marked ready for deletion.

        A success means that the artifact was destroyed within an acceptable delay (within 12 hours of being marked ready for deletion).

        An error means the artifact was not destroyed.

        There can be cases when an artifact is destroyed but exceeds the threshold for an acceptable delay. In this case, the error is recorded as false and the apdex success is recorded as false.

        More Information: https://runbooks.gitlab.com/ci_deleted_objects_processing/deleted_objects_processing_triage/

        Since the `{{ $labels.type }}` service is not fully redundant, SLI violations on a single shard may represent a user-impacting service degradation.

        Currently the apdex value is {{ $value | humanizePercentage }}.
      grafana_dashboard_id: sidekiq-main/sidekiq-overview
      grafana_dashboard_link: https://dashboards.gitlab.net/d/sidekiq-main/sidekiq-overview?from=now-6h/m&to=now-1m/m&var-environment={{
        $labels.environment }}&var-stage={{ $labels.stage }}&var-shard={{ $labels.shard
        }}
      grafana_datasource_id: mimir-gitlab-gstg
      grafana_min_zoom_hours: "6"
      grafana_panel_id: "750882851"
      grafana_variables: environment,stage,shard
      runbook: sidekiq/#alerts
    labels:
      aggregation: component_shard
      alert_class: slo_violation
      alert_type: symptom
      feature_category: continuous_integration
      rules_domain: general
      severity: s3
      sli_type: apdex
      slo_alert: "yes"
      user_impacting: "yes"
      window: 1h
    expr: |
      (
        (
          gitlab_component_shard_apdex:ratio_1h{component="ci_deleted_objects_processing",env="gstg",monitor="global",type="sidekiq"}
          < (1 - 14.4 * 0.005000)
        )
        and on (env,environment,tier,type,stage,shard,component)
        (
          gitlab_component_shard_apdex:ratio_5m{component="ci_deleted_objects_processing",env="gstg",monitor="global",type="sidekiq"}
          < (1 - 14.4 * 0.005000)
        )
      )
      and on(env,environment,tier,type,stage,shard,component)
      (
        sum by(env,environment,tier,type,stage,shard,component) (gitlab_component_shard_ops:rate_1h{component="ci_deleted_objects_processing",env="gstg",monitor="global",type="sidekiq"}) >= 1
      )
