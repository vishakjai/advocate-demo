  - alert: SidekiqServiceLlmChatFirstTokenApdexSLOViolationSingleShard
    for: 10m
    annotations:
      title: The llm_chat_first_token SLI of the sidekiq service on shard `{{ $labels.shard
        }}` has an apdex violating SLO
      description: |
        These signifies Time to First Token (TTFT) for Duo Chat, from when chat is first received, till we send out the first token.

        A success means that we send out the first token.

        An error could be that the AI-provider is not responding, or is erroring.

        For the apdex, we consider it fast enough if first token is sent to user within 5 seconds. This includes the time it took for the Sidekiq job to get picked up. This does not include the time it took to deliver the response to the client.

        Since the `{{ $labels.type }}` service is not fully redundant, SLI violations on a single shard may represent a user-impacting service degradation.

        Currently the apdex value is {{ $value | humanizePercentage }}.
