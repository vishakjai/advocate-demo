# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/service-component-alerts.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'Service Component Alerts: topology-spanner'
  interval: 1m
  rules:
  - alert: TopologySpannerServiceSpannerApiErrorsErrorSLOViolation
    for: 2m
    annotations:
      title: The spanner_api_errors SLI of the topology-spanner service (`{{ $labels.stage
        }}` stage) has an error rate violating SLO
      description: |
        Monitors Cloud Spanner API request errors for the Topology Service. Tracks requests that return non-OK status codes.

        High error rates indicate problems with Spanner connectivity or query issues.

        Currently the error-rate is {{ $value | humanizePercentage }}.
      grafana_dashboard_id: topology-spanner-main/topology-spanner-overview
      grafana_dashboard_link: https://dashboards.gitlab.net/d/topology-spanner-main/topology-spanner-overview?from=now-6h/m&to=now-1m/m&var-environment={{
        $labels.environment }}&var-stage={{ $labels.stage }}
      grafana_datasource_id: mimir-gitlab-gstg
      grafana_min_zoom_hours: "6"
      grafana_panel_id: "4181619579"
      grafana_variables: environment,stage
      promql_template_1: |
        sum by (env,environment,tier,stage) (
          sum by (env,environment,tier,stage) (
            rate(
              stackdriver_spanner_instance_spanner_googleapis_com_api_request_count{
                job="runway-exporter",
                project_id="gitlab-runway-topo-svc-prod",
                status!="OK"
              }[5m]
            )
          )
        )
      runbook: topology-spanner/#alerts
    labels:
      aggregation: component
      alert_class: slo_violation
      alert_type: symptom
      feature_category: not_owned
      rules_domain: general
      severity: s4
      sli_type: error
      slo_alert: "yes"
      team: cells_infrastructure
      user_impacting: "yes"
      window: 1h
    expr: |
      (
        (
          gitlab_component_errors:ratio_1h{component="spanner_api_errors",env="gstg",monitor="global",type="topology-spanner"}
          > (14.4 * 0.100000)
        )
        and on (env,environment,tier,type,stage,component)
        (
          gitlab_component_errors:ratio_5m{component="spanner_api_errors",env="gstg",monitor="global",type="topology-spanner"}
          > (14.4 * 0.100000)
        )
      )
      and on(env,environment,tier,type,stage,component)
      (
        sum by(env,environment,tier,type,stage,component) (gitlab_component_ops:rate_1h{component="spanner_api_errors",env="gstg",monitor="global",type="topology-spanner"}) >= 1
      )
  - alert: TopologySpannerServiceSpannerApiErrorsErrorSLOViolation
    for: 2m
    annotations:
      title: The spanner_api_errors SLI of the topology-spanner service (`{{ $labels.stage
        }}` stage) has an error rate violating SLO
      description: |
        Monitors Cloud Spanner API request errors for the Topology Service. Tracks requests that return non-OK status codes.

        High error rates indicate problems with Spanner connectivity or query issues.

        Currently the error-rate is {{ $value | humanizePercentage }}.
      grafana_dashboard_id: topology-spanner-main/topology-spanner-overview
      grafana_dashboard_link: https://dashboards.gitlab.net/d/topology-spanner-main/topology-spanner-overview?from=now-6h/m&to=now-1m/m&var-environment={{
        $labels.environment }}&var-stage={{ $labels.stage }}
      grafana_datasource_id: mimir-gitlab-gstg
      grafana_min_zoom_hours: "6"
      grafana_panel_id: "4181619579"
      grafana_variables: environment,stage
      promql_template_1: |
        sum by (env,environment,tier,stage) (
          sum by (env,environment,tier,stage) (
            rate(
              stackdriver_spanner_instance_spanner_googleapis_com_api_request_count{
                job="runway-exporter",
                project_id="gitlab-runway-topo-svc-prod",
                status!="OK"
              }[5m]
            )
          )
        )
      runbook: topology-spanner/#alerts
    labels:
      aggregation: component
      alert_class: slo_violation
      alert_type: symptom
      feature_category: not_owned
      rules_domain: general
      severity: s4
      sli_type: error
      slo_alert: "yes"
      team: cells_infrastructure
      user_impacting: "yes"
      window: 6h
    expr: |
      (
        (
          gitlab_component_errors:ratio_6h{component="spanner_api_errors",env="gstg",monitor="global",type="topology-spanner"}
          > (6 * 0.100000)
        )
        and on (env,environment,tier,type,stage,component)
        (
          gitlab_component_errors:ratio_30m{component="spanner_api_errors",env="gstg",monitor="global",type="topology-spanner"}
          > (6 * 0.100000)
        )
      )
      and on(env,environment,tier,type,stage,component)
      (
        sum by(env,environment,tier,type,stage,component) (gitlab_component_ops:rate_6h{component="spanner_api_errors",env="gstg",monitor="global",type="topology-spanner"}) >= 0.16667
      )
