# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/service-slos.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: Autogenerated Service SLOs
  interval: 5m
  rules:
  - record: slo:min:events:gitlab_service_apdex:ratio
    labels:
      monitor: global
      tier: db
      type: topology-spanner
    expr: "0.900000"
  - record: slo:max:events:gitlab_service_errors:ratio
    labels:
      monitor: global
      tier: db
      type: topology-spanner
    expr: "0.100000"
  - record: slo:min:events:gitlab_service_apdex:ratio
    labels:
      component: spanner_api_errors
      monitor: global
      tier: db
      type: topology-spanner
    expr: "0.900000"
  - record: slo:max:events:gitlab_service_errors:ratio
    labels:
      component: spanner_api_errors
      monitor: global
      tier: db
      type: topology-spanner
    expr: "0.100000"
  - record: slo:min:events:gitlab_service_apdex:ratio
    labels:
      component: spanner_api_latency
      monitor: global
      tier: db
      type: topology-spanner
    expr: "0.900000"
  - record: slo:max:events:gitlab_service_errors:ratio
    labels:
      component: spanner_api_latency
      monitor: global
      tier: db
      type: topology-spanner
    expr: "0.100000"
  - record: slo:min:events:gitlab_service_apdex:ratio
    labels:
      component: spanner_api_requests
      monitor: global
      tier: db
      type: topology-spanner
    expr: "0.900000"
  - record: slo:max:events:gitlab_service_errors:ratio
    labels:
      component: spanner_api_requests
      monitor: global
      tier: db
      type: topology-spanner
    expr: "0.100000"
  - record: gitlab_component_service:mapping
    labels:
      component: spanner_api_errors
      global_aggregation: "no"
      monitor: global
      regional_aggregation: "no"
      service_aggregation: "yes"
      tier: db
      type: topology-spanner
    expr: "1"
  - record: gitlab_component_service:mapping
    labels:
      component: spanner_api_latency
      global_aggregation: "no"
      monitor: global
      regional_aggregation: "no"
      service_aggregation: "yes"
      tier: db
      type: topology-spanner
    expr: "1"
  - record: gitlab_component_service:mapping
    labels:
      component: spanner_api_requests
      global_aggregation: "no"
      monitor: global
      regional_aggregation: "no"
      service_aggregation: "yes"
      tier: db
      type: topology-spanner
    expr: "1"
