# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/service-component-alerts.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'Service Component Alerts: orbit'
  interval: 1m
  rules:
  - alert: OrbitServiceGkgIndexerTrafficCessation
    for: 5m
    annotations:
      title: The gkg_indexer SLI of the orbit service (`{{ $labels.stage }}` stage)
        has not received any traffic in the past 30m
      description: |
        GKG indexer takes data from NATS and writes to Clickhouse

        This alert signifies that the SLI is reporting a cessation of traffic; the signal is present, but is zero.
      grafana_dashboard_id: orbit-main/orbit-overview
      grafana_dashboard_link: https://dashboards.gitlab.net/d/orbit-main/orbit-overview?from=now-6h/m&to=now-1m/m&var-environment={{
        $labels.environment }}&var-stage={{ $labels.stage }}
      grafana_datasource_id: mimir-analytics-eventsdot
      grafana_min_zoom_hours: "6"
      grafana_panel_id: "4211802998"
      grafana_variables: environment,stage
      promql_template_1: |
        sum by (env,environment,tier,stage) (
          rate(gkg_etl_destination_rows_written_total{environment="{{ $labels.environment }}",stage="{{ $labels.stage }}"}[5m])
        )
      runbook: orbit/#alerts
    labels:
      aggregation: component
      alert_class: traffic_cessation
      alert_type: cause
      feature_category: not_owned
      rules_domain: general
      severity: s3
      sli_type: ops
      slo_alert: "no"
      user_impacting: "no"
    expr: |
      gitlab_component_ops:rate_30m{component="gkg_indexer",monitor="global",stage="main",type="orbit"} == 0
      and
      gitlab_component_ops:rate_30m{component="gkg_indexer",monitor="global",stage="main",type="orbit"} offset 1h >= 0.16666666666666666
  - alert: OrbitServiceGkgIndexerTrafficAbsent
    for: 30m
    annotations:
      title: The gkg_indexer SLI of the orbit service (`{{ $labels.stage }}` stage)
        has not reported any traffic in the past 30m
      description: |
        GKG indexer takes data from NATS and writes to Clickhouse

        This alert signifies that the SLI was previously reporting traffic, but is no longer - the signal is absent.

        This could be caused by a change to the metrics used in the SLI, or by the service not receiving traffic.
      grafana_dashboard_id: orbit-main/orbit-overview
      grafana_dashboard_link: https://dashboards.gitlab.net/d/orbit-main/orbit-overview?from=now-6h/m&to=now-1m/m&var-environment={{
        $labels.environment }}&var-stage={{ $labels.stage }}
      grafana_datasource_id: mimir-analytics-eventsdot
      grafana_min_zoom_hours: "6"
      grafana_panel_id: "4211802998"
      grafana_variables: environment,stage
      promql_template_1: |
        sum by (env,environment,tier,stage) (
          rate(gkg_etl_destination_rows_written_total{environment="{{ $labels.environment }}",stage="{{ $labels.stage }}"}[5m])
        )
      runbook: orbit/#alerts
    labels:
      aggregation: component
      alert_class: traffic_cessation
      alert_type: cause
      feature_category: not_owned
      rules_domain: general
      severity: s3
      sli_type: ops
      slo_alert: "no"
      user_impacting: "no"
    expr: |
      gitlab_component_ops:rate_5m{component="gkg_indexer",monitor="global",stage="main",type="orbit"} offset 1h
      unless
      gitlab_component_ops:rate_5m{component="gkg_indexer",monitor="global",stage="main",type="orbit"}
