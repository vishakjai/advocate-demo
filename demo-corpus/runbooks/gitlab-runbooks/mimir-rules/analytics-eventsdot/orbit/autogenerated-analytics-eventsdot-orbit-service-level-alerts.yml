  - alert: OrbitServiceNatsJetstreamErrorSLOViolation
    for: 2m
    annotations:
      title: The nats_jetstream SLI of the orbit service (`{{ $labels.stage }}` stage)
        has an error rate violating SLO
      description: |
        JetStream provides persistent message streaming for event processing across GitLab.

        Currently the error-rate is {{ $value | humanizePercentage }}.
      grafana_dashboard_id: orbit-main/orbit-overview
      grafana_dashboard_link: https://dashboards.gitlab.net/d/orbit-main/orbit-overview?from=now-6h/m&to=now-1m/m&var-environment={{
        $labels.environment }}&var-stage={{ $labels.stage }}
      grafana_datasource_id: mimir-analytics-eventsdot
      grafana_min_zoom_hours: "6"
      grafana_panel_id: "2989392954"
      grafana_variables: environment,stage
      promql_template_1: |
        sum by (env,environment,tier,stage) (
          rate(nats_consumer_num_redelivered{cluster=~"orbit-.*",container="prom-exporter",environment="{{ $labels.environment }}",stage="{{ $labels.stage }}"}[5m])
        )
      runbook: orbit/#alerts
    labels:
      aggregation: component
      alert_class: slo_violation
      alert_type: symptom
      feature_category: not_owned
      rules_domain: general
      severity: s3
      sli_type: error
      slo_alert: "yes"
      user_impacting: "no"
      window: 1h
    expr: |
      (
        (
          gitlab_component_errors:ratio_1h{component="nats_jetstream",monitor="global",type="orbit"}
          > (14.4 * 0.050000)
        )
        and on (env,environment,tier,type,stage,component)
        (
          gitlab_component_errors:ratio_5m{component="nats_jetstream",monitor="global",type="orbit"}
          > (14.4 * 0.050000)
        )
      )
      and on(env,environment,tier,type,stage,component)
      (
        sum by(env,environment,tier,type,stage,component) (gitlab_component_ops:rate_1h{component="nats_jetstream",monitor="global",type="orbit"}) >= 1
      )
