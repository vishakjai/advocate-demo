# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/mimir-aggregations.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'Global SLI Metrics: orbit - Burn-Rate 5m'
  interval: 1m
  rules:
  - record: gitlab_component_ops:rate_5m
    labels:
      component: gkg_indexer
      monitor: global
      tier: sv
      type: orbit
    expr: |
      sum by (env,environment,stage) (
        sli_aggregations:gkg_etl_destination_rows_written_total:rate_5m{type="orbit"}
      )
  - record: gitlab_component_errors:ratio_5m
    labels:
      component: gkg_indexer
      monitor: global
      tier: sv
      type: orbit
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_errors:rate_5m{component="gkg_indexer",monitor="global",tier="sv",type="orbit"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_ops:rate_5m{component="gkg_indexer",monitor="global",tier="sv",type="orbit"}
      )
  - record: gitlab_component_apdex:ratio_5m
    labels:
      component: gkg_indexer
      monitor: global
      tier: sv
      type: orbit
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_apdex:success:rate_5m{component="gkg_indexer",monitor="global",tier="sv",type="orbit"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_apdex:weight:score_5m{component="gkg_indexer",monitor="global",tier="sv",type="orbit"}
      )
  - record: gitlab_component_ops:rate_5m
    labels:
      component: gkg_webserver
      monitor: global
      tier: sv
      type: orbit
    expr: |
      sum by (env,environment,stage) (
        sli_aggregations:gkg_query_pipeline_queries_total:rate_5m{type="orbit"}
      )
  - record: gitlab_component_errors:ratio_5m
    labels:
      component: gkg_webserver
      monitor: global
      tier: sv
      type: orbit
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_errors:rate_5m{component="gkg_webserver",monitor="global",tier="sv",type="orbit"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_ops:rate_5m{component="gkg_webserver",monitor="global",tier="sv",type="orbit"}
      )
  - record: gitlab_component_apdex:ratio_5m
    labels:
      component: gkg_webserver
      monitor: global
      tier: sv
      type: orbit
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_apdex:success:rate_5m{component="gkg_webserver",monitor="global",tier="sv",type="orbit"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_apdex:weight:score_5m{component="gkg_webserver",monitor="global",tier="sv",type="orbit"}
      )
  - record: gitlab_component_ops:rate_5m
    labels:
      component: nats_jetstream
      monitor: global
      tier: sv
      type: orbit
    expr: |
      sum by (env,environment,stage) (
        sli_aggregations:nats_stream_total_messages:rate_5m{cluster=~"orbit-.*",container="prom-exporter",type="orbit"}
      )
  - record: gitlab_component_errors:rate_5m
    labels:
      component: nats_jetstream
      monitor: global
      tier: sv
      type: orbit
    expr: |
      (
        sum by (env,environment,stage) (
          sli_aggregations:nats_consumer_num_redelivered:rate_5m{cluster=~"orbit-.*",container="prom-exporter",type="orbit"}
        )
      )
      or
      (
        0 * group by(env,environment,stage) (
          gitlab_component_ops:rate_5m{component="nats_jetstream",monitor="global",tier="sv",type="orbit"}
        )
      )
  - record: gitlab_component_errors:ratio_5m
    labels:
      component: nats_jetstream
      monitor: global
      tier: sv
      type: orbit
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_errors:rate_5m{component="nats_jetstream",monitor="global",tier="sv",type="orbit"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_ops:rate_5m{component="nats_jetstream",monitor="global",tier="sv",type="orbit"}
      )
  - record: gitlab_component_apdex:ratio_5m
    labels:
      component: nats_jetstream
      monitor: global
      tier: sv
      type: orbit
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_apdex:success:rate_5m{component="nats_jetstream",monitor="global",tier="sv",type="orbit"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_apdex:weight:score_5m{component="nats_jetstream",monitor="global",tier="sv",type="orbit"}
      )
  - record: gitlab_component_ops:rate_5m
    labels:
      component: nats_server
      monitor: global
      tier: sv
      type: orbit
    expr: |
      sum by (env,environment,stage) (
        sli_aggregations:nats_varz_in_msgs:rate_5m{cluster=~"orbit-.*",container="prom-exporter",type="orbit"}
