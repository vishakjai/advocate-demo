# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/sli_aggregations.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'SLI Aggregations: orbit - gkg_indexer - 5m burn-rate'
  interval: 1m
  rules:
  - record: sli_aggregations:gkg_etl_destination_rows_written_total:rate_5m
    expr: |
      sum by (component,env,environment,feature_category,fqdn,product_stage,region,shard,stage,stage_group,tier,type) (
        rate(gkg_etl_destination_rows_written_total{type=~"orbit"}[5m])
      )
- name: 'SLI Aggregations: orbit - gkg_webserver - 5m burn-rate'
  interval: 1m
  rules:
  - record: sli_aggregations:gkg_query_pipeline_queries_total:rate_5m
    expr: |
      sum by (component,env,environment,feature_category,fqdn,product_stage,region,shard,stage,stage_group,tier,type) (
        rate(gkg_query_pipeline_queries_total{type=~"orbit"}[5m])
      )
- name: 'SLI Aggregations: orbit - nats_jetstream - 5m burn-rate'
  interval: 1m
  rules:
  - record: sli_aggregations:nats_consumer_num_redelivered:rate_5m
    expr: |
      sum by (cluster,component,container,env,environment,feature_category,fqdn,product_stage,region,shard,stage,stage_group,tier,type) (
        rate(nats_consumer_num_redelivered{cluster=~"orbit-.*",container=~"prom-exporter",type=~"orbit"}[5m])
      )
  - record: sli_aggregations:nats_stream_total_messages:rate_5m
    expr: |
      sum by (cluster,component,container,env,environment,feature_category,fqdn,product_stage,region,shard,stage,stage_group,tier,type) (
        rate(nats_stream_total_messages{cluster=~"orbit-.*",container=~"prom-exporter",type=~"orbit"}[5m])
      )
- name: 'SLI Aggregations: orbit - nats_server - 5m burn-rate'
  interval: 1m
  rules:
  - record: sli_aggregations:nats_varz_in_msgs:rate_5m
    expr: |
      sum by (cluster,component,container,env,environment,feature_category,fqdn,product_stage,region,shard,stage,stage_group,tier,type) (
        rate(nats_varz_in_msgs{cluster=~"orbit-.*",container=~"prom-exporter",type=~"orbit"}[5m])
      )
  - record: sli_aggregations:nats_varz_slow_consumers:rate_5m
    expr: |
      sum by (cluster,component,container,env,environment,feature_category,fqdn,product_stage,region,shard,stage,stage_group,tier,type) (
        rate(nats_varz_slow_consumers{cluster=~"orbit-.*",container=~"prom-exporter",type=~"orbit"}[5m])
      )
