# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/mimir-aggregations.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'Global SLI Metrics: siphon - Burn-Rate 5m'
  interval: 1m
  rules:
  - record: gitlab_component_ops:rate_5m
    labels:
      component: siphon_consumers
      monitor: global
      tier: sv
      type: siphon
    expr: |
      sum by (env,environment,stage) (
        sli_aggregations:siphon_clickhouse_consumer_number_of_events:rate_5m{cluster=~"orbit-.*",namespace="siphon",type="siphon"}
      )
  - record: gitlab_component_errors:ratio_5m
    labels:
      component: siphon_consumers
      monitor: global
      tier: sv
      type: siphon
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_errors:rate_5m{component="siphon_consumers",monitor="global",tier="sv",type="siphon"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_ops:rate_5m{component="siphon_consumers",monitor="global",tier="sv",type="siphon"}
      )
  - record: gitlab_component_apdex:ratio_5m
    labels:
      component: siphon_consumers
      monitor: global
      tier: sv
      type: siphon
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_apdex:success:rate_5m{component="siphon_consumers",monitor="global",tier="sv",type="siphon"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_apdex:weight:score_5m{component="siphon_consumers",monitor="global",tier="sv",type="siphon"}
      )
  - record: gitlab_component_ops:rate_5m
    labels:
      component: siphon_producers
      monitor: global
      tier: sv
      type: siphon
    expr: |
      sum by (env,environment,stage) (
        sli_aggregations:siphon_operations_total:rate_5m{cluster=~"orbit-.*",namespace="siphon",type="siphon"}
      )
  - record: gitlab_component_errors:ratio_5m
    labels:
      component: siphon_producers
      monitor: global
      tier: sv
      type: siphon
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_errors:rate_5m{component="siphon_producers",monitor="global",tier="sv",type="siphon"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_ops:rate_5m{component="siphon_producers",monitor="global",tier="sv",type="siphon"}
      )
  - record: gitlab_component_apdex:ratio_5m
    labels:
      component: siphon_producers
      monitor: global
      tier: sv
      type: siphon
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_apdex:success:rate_5m{component="siphon_producers",monitor="global",tier="sv",type="siphon"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_apdex:weight:score_5m{component="siphon_producers",monitor="global",tier="sv",type="siphon"}
      )
