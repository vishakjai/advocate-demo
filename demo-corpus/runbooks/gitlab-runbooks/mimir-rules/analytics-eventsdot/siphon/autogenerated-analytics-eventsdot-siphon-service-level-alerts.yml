# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/service-component-alerts.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'Service Component Alerts: siphon'
  interval: 1m
  rules:
  - alert: SiphonServiceSiphonConsumersTrafficCessation
    for: 5m
    annotations:
      title: The siphon_consumers SLI of the siphon service (`{{ $labels.stage }}`
        stage) has not received any traffic in the past 30m
      description: |
        Siphon moves data from postgres to clickhouse

        This alert signifies that the SLI is reporting a cessation of traffic; the signal is present, but is zero.
      grafana_dashboard_id: siphon-main/siphon-overview
      grafana_dashboard_link: https://dashboards.gitlab.net/d/siphon-main/siphon-overview?from=now-6h/m&to=now-1m/m&var-environment={{
        $labels.environment }}&var-stage={{ $labels.stage }}
      grafana_datasource_id: mimir-analytics-eventsdot
      grafana_min_zoom_hours: "6"
      grafana_panel_id: "3167787661"
      grafana_variables: environment,stage
      promql_template_1: |
        sum by (env,environment,tier,stage) (
          rate(siphon_clickhouse_consumer_number_of_events{cluster=~"orbit-.*",environment="{{ $labels.environment }}",namespace="siphon",stage="{{ $labels.stage }}"}[5m])
        )
      runbook: siphon/#alerts
    labels:
      aggregation: component
      alert_class: traffic_cessation
      alert_type: cause
      feature_category: not_owned
      rules_domain: general
      severity: s3
      sli_type: ops
      slo_alert: "no"
      user_impacting: "no"
    expr: |
      gitlab_component_ops:rate_30m{component="siphon_consumers",monitor="global",stage="main",type="siphon"} == 0
      and
      gitlab_component_ops:rate_30m{component="siphon_consumers",monitor="global",stage="main",type="siphon"} offset 1h >= 0.16666666666666666
  - alert: SiphonServiceSiphonConsumersTrafficAbsent
    for: 30m
    annotations:
      title: The siphon_consumers SLI of the siphon service (`{{ $labels.stage }}`
        stage) has not reported any traffic in the past 30m
      description: |
        Siphon moves data from postgres to clickhouse

        This alert signifies that the SLI was previously reporting traffic, but is no longer - the signal is absent.

        This could be caused by a change to the metrics used in the SLI, or by the service not receiving traffic.
      grafana_dashboard_id: siphon-main/siphon-overview
      grafana_dashboard_link: https://dashboards.gitlab.net/d/siphon-main/siphon-overview?from=now-6h/m&to=now-1m/m&var-environment={{
        $labels.environment }}&var-stage={{ $labels.stage }}
      grafana_datasource_id: mimir-analytics-eventsdot
      grafana_min_zoom_hours: "6"
      grafana_panel_id: "3167787661"
      grafana_variables: environment,stage
      promql_template_1: |
        sum by (env,environment,tier,stage) (
          rate(siphon_clickhouse_consumer_number_of_events{cluster=~"orbit-.*",environment="{{ $labels.environment }}",namespace="siphon",stage="{{ $labels.stage }}"}[5m])
        )
      runbook: siphon/#alerts
    labels:
      aggregation: component
      alert_class: traffic_cessation
      alert_type: cause
      feature_category: not_owned
      rules_domain: general
      severity: s3
      sli_type: ops
      slo_alert: "no"
      user_impacting: "no"
    expr: |
      gitlab_component_ops:rate_5m{component="siphon_consumers",monitor="global",stage="main",type="siphon"} offset 1h
      unless
      gitlab_component_ops:rate_5m{component="siphon_consumers",monitor="global",stage="main",type="siphon"}
  - alert: SiphonServiceSiphonProducersTrafficCessation
    for: 5m
    annotations:
      title: The siphon_producers SLI of the siphon service (`{{ $labels.stage }}`
        stage) has not received any traffic in the past 30m
      description: |
        Siphon moves data from postgres to clickhouse

        This alert signifies that the SLI is reporting a cessation of traffic; the signal is present, but is zero.
      grafana_dashboard_id: siphon-main/siphon-overview
      grafana_dashboard_link: https://dashboards.gitlab.net/d/siphon-main/siphon-overview?from=now-6h/m&to=now-1m/m&var-environment={{
        $labels.environment }}&var-stage={{ $labels.stage }}
      grafana_datasource_id: mimir-analytics-eventsdot
      grafana_min_zoom_hours: "6"
      grafana_panel_id: "1838613329"
      grafana_variables: environment,stage
      promql_template_1: |
        sum by (env,environment,tier,stage) (
          rate(siphon_operations_total{cluster=~"orbit-.*",environment="{{ $labels.environment }}",namespace="siphon",stage="{{ $labels.stage }}"}[5m])
        )
      runbook: siphon/#alerts
    labels:
      aggregation: component
      alert_class: traffic_cessation
      alert_type: cause
      feature_category: not_owned
      pager: pagerduty
      rules_domain: general
      severity: s2
      sli_type: ops
      slo_alert: "no"
      user_impacting: "no"
    expr: |
      gitlab_component_ops:rate_30m{component="siphon_producers",monitor="global",stage="main",type="siphon"} == 0
      and
      gitlab_component_ops:rate_30m{component="siphon_producers",monitor="global",stage="main",type="siphon"} offset 1h >= 0.16666666666666666
  - alert: SiphonServiceSiphonProducersTrafficAbsent
    for: 30m
    annotations:
      title: The siphon_producers SLI of the siphon service (`{{ $labels.stage }}`
        stage) has not reported any traffic in the past 30m
      description: |
        Siphon moves data from postgres to clickhouse

        This alert signifies that the SLI was previously reporting traffic, but is no longer - the signal is absent.

        This could be caused by a change to the metrics used in the SLI, or by the service not receiving traffic.
      grafana_dashboard_id: siphon-main/siphon-overview
      grafana_dashboard_link: https://dashboards.gitlab.net/d/siphon-main/siphon-overview?from=now-6h/m&to=now-1m/m&var-environment={{
        $labels.environment }}&var-stage={{ $labels.stage }}
      grafana_datasource_id: mimir-analytics-eventsdot
      grafana_min_zoom_hours: "6"
      grafana_panel_id: "1838613329"
      grafana_variables: environment,stage
      promql_template_1: |
        sum by (env,environment,tier,stage) (
          rate(siphon_operations_total{cluster=~"orbit-.*",environment="{{ $labels.environment }}",namespace="siphon",stage="{{ $labels.stage }}"}[5m])
        )
      runbook: siphon/#alerts
    labels:
      aggregation: component
      alert_class: traffic_cessation
      alert_type: cause
      feature_category: not_owned
      pager: pagerduty
      rules_domain: general
      severity: s2
      sli_type: ops
      slo_alert: "no"
      user_impacting: "no"
    expr: |
      gitlab_component_ops:rate_5m{component="siphon_producers",monitor="global",stage="main",type="siphon"} offset 1h
      unless
      gitlab_component_ops:rate_5m{component="siphon_producers",monitor="global",stage="main",type="siphon"}
