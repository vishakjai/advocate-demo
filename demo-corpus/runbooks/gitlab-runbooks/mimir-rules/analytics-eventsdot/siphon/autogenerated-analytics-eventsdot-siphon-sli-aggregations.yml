# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/sli_aggregations.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'SLI Aggregations: siphon - siphon_consumers - 5m burn-rate'
  interval: 1m
  rules:
  - record: sli_aggregations:siphon_clickhouse_consumer_number_of_events:rate_5m
    expr: |
      sum by (cluster,component,env,environment,feature_category,fqdn,namespace,product_app_id,product_stage,region,shard,stage,stage_group,tier,type) (
        rate(siphon_clickhouse_consumer_number_of_events{cluster=~"orbit-.*",namespace=~"siphon",type=~"siphon"}[5m])
      )
- name: 'SLI Aggregations: siphon - siphon_producers - 5m burn-rate'
  interval: 1m
  rules:
  - record: sli_aggregations:siphon_operations_total:rate_5m
    expr: |
      sum by (app_id,cluster,component,env,environment,feature_category,fqdn,namespace,product_stage,region,shard,stage,stage_group,tier,type) (
        rate(siphon_operations_total{cluster=~"orbit-.*",namespace=~"siphon",type=~"siphon"}[5m])
      )
