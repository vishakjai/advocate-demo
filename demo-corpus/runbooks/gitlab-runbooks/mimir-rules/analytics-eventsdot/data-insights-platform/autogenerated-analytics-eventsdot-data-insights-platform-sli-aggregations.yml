groups:
- name: 'SLI Aggregations: data-insights-platform - ingester - 5m burn-rate'
  interval: 1m
  rules:
  - record: sli_aggregations:raw_ingestion_http_requests_total:rate_5m
    expr: |
      sum by (code,component,container,env,environment,feature_category,fqdn,product_stage,region,shard,stage,stage_group,tier,type) (
        rate(raw_ingestion_http_requests_total{container=~"data-insights-platform-.*",type=~"data-insights-platform"}[5m])
      )
- name: 'SLI Aggregations: data-insights-platform - ingester - 30m burn-rate'
  interval: 2m
  rules:
  - record: sli_aggregations:raw_ingestion_http_requests_total:rate_30m
    expr: |
      sum by (code,component,container,env,environment,feature_category,fqdn,product_stage,region,shard,stage,stage_group,tier,type) (
        rate(raw_ingestion_http_requests_total{container=~"data-insights-platform-.*",type=~"data-insights-platform"}[30m])
      )
- name: 'SLI Aggregations: data-insights-platform - ingester - 1h burn-rate'
  interval: 1m
  rules:
  - record: sli_aggregations:raw_ingestion_http_requests_total:rate_1h
    expr: |
      sum by (code,component,container,env,environment,feature_category,fqdn,product_stage,region,shard,stage,stage_group,tier,type) (
        rate(raw_ingestion_http_requests_total{container=~"data-insights-platform-.*",type=~"data-insights-platform"}[1h])
      )
