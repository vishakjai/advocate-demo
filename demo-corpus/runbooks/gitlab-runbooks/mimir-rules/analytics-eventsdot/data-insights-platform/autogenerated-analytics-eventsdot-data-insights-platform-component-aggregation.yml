# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/mimir-aggregations.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'Global SLI Metrics: data-insights-platform - Burn-Rate 5m'
  interval: 1m
  rules:
  - record: gitlab_component_ops:rate_5m
    labels:
      component: ingester
      monitor: global
      tier: sv
      type: data-insights-platform
    expr: |
      sum by (env,environment,stage) (
        sli_aggregations:raw_ingestion_http_requests_total:rate_5m{container=~"data-insights-platform-.*",type="data-insights-platform"}
      )
  - record: gitlab_component_errors:rate_5m
    labels:
      component: ingester
      monitor: global
      tier: sv
      type: data-insights-platform
    expr: |
      (
        sum by (env,environment,stage) (
          sli_aggregations:raw_ingestion_http_requests_total:rate_5m{code=~"^5.*",container=~"data-insights-platform-.*",type="data-insights-platform"}
        )
      )
      or
      (
        0 * group by(env,environment,stage) (
          gitlab_component_ops:rate_5m{component="ingester",monitor="global",tier="sv",type="data-insights-platform"}
        )
      )
  - record: gitlab_component_errors:ratio_5m
    labels:
      component: ingester
      monitor: global
      tier: sv
      type: data-insights-platform
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_errors:rate_5m{component="ingester",monitor="global",tier="sv",type="data-insights-platform"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_ops:rate_5m{component="ingester",monitor="global",tier="sv",type="data-insights-platform"}
      )
  - record: gitlab_component_apdex:ratio_5m
    labels:
      component: ingester
      monitor: global
      tier: sv
      type: data-insights-platform
    expr: |
      sum by (env,environment,stage) (
        gitlab_component_apdex:success:rate_5m{component="ingester",monitor="global",tier="sv",type="data-insights-platform"}
      )
      /
      sum by (env,environment,stage) (
        gitlab_component_apdex:weight:score_5m{component="ingester",monitor="global",tier="sv",type="data-insights-platform"}
      )
