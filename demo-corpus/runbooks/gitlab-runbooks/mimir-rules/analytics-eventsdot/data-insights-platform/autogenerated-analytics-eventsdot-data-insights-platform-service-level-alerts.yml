# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/service-component-alerts.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'Service Component Alerts: data-insights-platform'
  interval: 1m
  rules:
  - alert: DataInsightsPlatformServiceIngesterErrorSLOViolation
    for: 2m
    annotations:
      title: The ingester SLI of the data-insights-platform service (`{{ $labels.stage
        }}` stage) has an error rate violating SLO
      description: |
        Data Insights platform Ingestor is responsible for ingesting events generated across Gitlab.

        Currently the error-rate is {{ $value | humanizePercentage }}.
      grafana_dashboard_id: data-insights-platform-main/data-insights-platform-overview
      grafana_dashboard_link: https://dashboards.gitlab.net/d/data-insights-platform-main/data-insights-platform-overview?from=now-6h/m&to=now-1m/m&var-environment={{
        $labels.environment }}&var-stage={{ $labels.stage }}
      grafana_datasource_id: mimir-analytics-eventsdot
      grafana_min_zoom_hours: "6"
      grafana_panel_id: "1789980352"
      grafana_variables: environment,stage
      promql_template_1: |
        sum by (env,environment,tier,stage) (
          rate(raw_ingestion_http_requests_total{code=~"^5.*",container=~"data-insights-platform-.*",environment="{{ $labels.environment }}",stage="{{ $labels.stage }}"}[5m])
        )
      runbook: data-insights-platform/#alerts
    labels:
      aggregation: component
      alert_class: slo_violation
      alert_type: symptom
      feature_category: not_owned
      rules_domain: general
      severity: s3
      sli_type: error
      slo_alert: "yes"
      user_impacting: "no"
      window: 1h
    expr: |
      (
        (
          gitlab_component_errors:ratio_1h{component="ingester",monitor="global",type="data-insights-platform"}
          > (14.4 * 0.050000)
        )
        and on (env,environment,tier,type,stage,component)
        (
          gitlab_component_errors:ratio_5m{component="ingester",monitor="global",type="data-insights-platform"}
          > (14.4 * 0.050000)
        )
      )
      and on(env,environment,tier,type,stage,component)
      (
        sum by(env,environment,tier,type,stage,component) (gitlab_component_ops:rate_1h{component="ingester",monitor="global",type="data-insights-platform"}) >= 1
      )
  - alert: DataInsightsPlatformServiceIngesterErrorSLOViolation
    for: 2m
    annotations:
      title: The ingester SLI of the data-insights-platform service (`{{ $labels.stage
        }}` stage) has an error rate violating SLO
      description: |
        Data Insights platform Ingestor is responsible for ingesting events generated across Gitlab.

        Currently the error-rate is {{ $value | humanizePercentage }}.
      grafana_dashboard_id: data-insights-platform-main/data-insights-platform-overview
      grafana_dashboard_link: https://dashboards.gitlab.net/d/data-insights-platform-main/data-insights-platform-overview?from=now-6h/m&to=now-1m/m&var-environment={{
        $labels.environment }}&var-stage={{ $labels.stage }}
      grafana_datasource_id: mimir-analytics-eventsdot
      grafana_min_zoom_hours: "6"
      grafana_panel_id: "1789980352"
      grafana_variables: environment,stage
      promql_template_1: |
        sum by (env,environment,tier,stage) (
          rate(raw_ingestion_http_requests_total{code=~"^5.*",container=~"data-insights-platform-.*",environment="{{ $labels.environment }}",stage="{{ $labels.stage }}"}[5m])
        )
      runbook: data-insights-platform/#alerts
    labels:
      aggregation: component
      alert_class: slo_violation
      alert_type: symptom
      feature_category: not_owned
      rules_domain: general
      severity: s3
      sli_type: error
      slo_alert: "yes"
      user_impacting: "no"
      window: 6h
    expr: |
      (
        (
          gitlab_component_errors:ratio_6h{component="ingester",monitor="global",type="data-insights-platform"}
          > (6 * 0.050000)
        )
        and on (env,environment,tier,type,stage,component)
        (
          gitlab_component_errors:ratio_30m{component="ingester",monitor="global",type="data-insights-platform"}
          > (6 * 0.050000)
        )
      )
      and on(env,environment,tier,type,stage,component)
      (
        sum by(env,environment,tier,type,stage,component) (gitlab_component_ops:rate_6h{component="ingester",monitor="global",type="data-insights-platform"}) >= 0.16667
      )
  - alert: DataInsightsPlatformServiceIngesterTrafficCessation
    for: 5m
    annotations:
      title: The ingester SLI of the data-insights-platform service (`{{ $labels.stage
        }}` stage) has not received any traffic in the past 30m
      description: |
        Data Insights platform Ingestor is responsible for ingesting events generated across Gitlab.

        This alert signifies that the SLI is reporting a cessation of traffic; the signal is present, but is zero.
      grafana_dashboard_id: data-insights-platform-main/data-insights-platform-overview
      grafana_dashboard_link: https://dashboards.gitlab.net/d/data-insights-platform-main/data-insights-platform-overview?from=now-6h/m&to=now-1m/m&var-environment={{
        $labels.environment }}&var-stage={{ $labels.stage }}
      grafana_datasource_id: mimir-analytics-eventsdot
      grafana_min_zoom_hours: "6"
      grafana_panel_id: "1379802882"
      grafana_variables: environment,stage
      promql_template_1: |
        sum by (env,environment,tier,stage) (
          rate(raw_ingestion_http_requests_total{container=~"data-insights-platform-.*",environment="{{ $labels.environment }}",stage="{{ $labels.stage }}"}[5m])
        )
      runbook: data-insights-platform/#alerts
    labels:
      aggregation: component
      alert_class: traffic_cessation
      alert_type: cause
      feature_category: not_owned
      rules_domain: general
      severity: s3
      sli_type: ops
      slo_alert: "no"
      user_impacting: "no"
    expr: |
      gitlab_component_ops:rate_30m{component="ingester",monitor="global",stage="main",type="data-insights-platform"} == 0
      and
      gitlab_component_ops:rate_30m{component="ingester",monitor="global",stage="main",type="data-insights-platform"} offset 1h >= 0.16666666666666666
  - alert: DataInsightsPlatformServiceIngesterTrafficAbsent
    for: 30m
    annotations:
      title: The ingester SLI of the data-insights-platform service (`{{ $labels.stage
        }}` stage) has not reported any traffic in the past 30m
      description: |
        Data Insights platform Ingestor is responsible for ingesting events generated across Gitlab.

        This alert signifies that the SLI was previously reporting traffic, but is no longer - the signal is absent.

        This could be caused by a change to the metrics used in the SLI, or by the service not receiving traffic.
      grafana_dashboard_id: data-insights-platform-main/data-insights-platform-overview
      grafana_dashboard_link: https://dashboards.gitlab.net/d/data-insights-platform-main/data-insights-platform-overview?from=now-6h/m&to=now-1m/m&var-environment={{
        $labels.environment }}&var-stage={{ $labels.stage }}
      grafana_datasource_id: mimir-analytics-eventsdot
      grafana_min_zoom_hours: "6"
      grafana_panel_id: "1379802882"
      grafana_variables: environment,stage
      promql_template_1: |
        sum by (env,environment,tier,stage) (
          rate(raw_ingestion_http_requests_total{container=~"data-insights-platform-.*",environment="{{ $labels.environment }}",stage="{{ $labels.stage }}"}[5m])
        )
      runbook: data-insights-platform/#alerts
    labels:
      aggregation: component
      alert_class: traffic_cessation
      alert_type: cause
      feature_category: not_owned
      rules_domain: general
      severity: s3
      sli_type: ops
      slo_alert: "no"
      user_impacting: "no"
    expr: |
      gitlab_component_ops:rate_5m{component="ingester",monitor="global",stage="main",type="data-insights-platform"} offset 1h
      unless
      gitlab_component_ops:rate_5m{component="ingester",monitor="global",stage="main",type="data-insights-platform"}
