# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/service-component-alerts.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'Service Component Alerts: nats'
  interval: 1m
  rules:
  - alert: NatsServiceJetstreamErrorSLOViolation
    for: 2m
    annotations:
      title: The jetstream SLI of the nats service (`{{ $labels.stage }}` stage) has
        an error rate violating SLO
      description: |
        JetStream provides persistent message streaming for event processing across GitLab.

        Currently the error-rate is {{ $value | humanizePercentage }}.
      grafana_dashboard_id: nats-main/nats-overview
      grafana_dashboard_link: https://dashboards.gitlab.net/d/nats-main/nats-overview?from=now-6h/m&to=now-1m/m&var-environment={{
        $labels.environment }}&var-stage={{ $labels.stage }}
      grafana_datasource_id: mimir-analytics-eventsdot
      grafana_min_zoom_hours: "6"
      grafana_panel_id: "1698140601"
      grafana_variables: environment,stage
      promql_template_1: |
        sum by (env,environment,tier,stage) (
          rate(nats_consumer_num_redelivered{container="prom-exporter",environment="{{ $labels.environment }}",stage="{{ $labels.stage }}"}[5m])
        )
      runbook: nats/#alerts
    labels:
      aggregation: component
      alert_class: slo_violation
      alert_type: symptom
      feature_category: not_owned
      rules_domain: general
      severity: s3
      sli_type: error
      slo_alert: "yes"
      user_impacting: "no"
      window: 1h
    expr: |
      (
        (
          gitlab_component_errors:ratio_1h{component="jetstream",monitor="global",type="nats"}
          > (14.4 * 0.050000)
        )
        and on (env,environment,tier,type,stage,component)
        (
          gitlab_component_errors:ratio_5m{component="jetstream",monitor="global",type="nats"}
          > (14.4 * 0.050000)
        )
      )
      and on(env,environment,tier,type,stage,component)
      (
        sum by(env,environment,tier,type,stage,component) (gitlab_component_ops:rate_1h{component="jetstream",monitor="global",type="nats"}) >= 1
      )
  - alert: NatsServiceJetstreamErrorSLOViolation
    for: 2m
    annotations:
      title: The jetstream SLI of the nats service (`{{ $labels.stage }}` stage) has
        an error rate violating SLO
      description: |
        JetStream provides persistent message streaming for event processing across GitLab.

        Currently the error-rate is {{ $value | humanizePercentage }}.
      grafana_dashboard_id: nats-main/nats-overview
      grafana_dashboard_link: https://dashboards.gitlab.net/d/nats-main/nats-overview?from=now-6h/m&to=now-1m/m&var-environment={{
        $labels.environment }}&var-stage={{ $labels.stage }}
      grafana_datasource_id: mimir-analytics-eventsdot
      grafana_min_zoom_hours: "6"
      grafana_panel_id: "1698140601"
      grafana_variables: environment,stage
      promql_template_1: |
        sum by (env,environment,tier,stage) (
          rate(nats_consumer_num_redelivered{container="prom-exporter",environment="{{ $labels.environment }}",stage="{{ $labels.stage }}"}[5m])
        )
      runbook: nats/#alerts
    labels:
      aggregation: component
      alert_class: slo_violation
      alert_type: symptom
      feature_category: not_owned
      rules_domain: general
      severity: s3
      sli_type: error
      slo_alert: "yes"
      user_impacting: "no"
      window: 6h
    expr: |
      (
        (
          gitlab_component_errors:ratio_6h{component="jetstream",monitor="global",type="nats"}
          > (6 * 0.050000)
        )
        and on (env,environment,tier,type,stage,component)
        (
          gitlab_component_errors:ratio_30m{component="jetstream",monitor="global",type="nats"}
          > (6 * 0.050000)
        )
      )
      and on(env,environment,tier,type,stage,component)
      (
        sum by(env,environment,tier,type,stage,component) (gitlab_component_ops:rate_6h{component="jetstream",monitor="global",type="nats"}) >= 0.16667
      )
  - alert: NatsServiceJetstreamTrafficCessation
    for: 5m
    annotations:
      title: The jetstream SLI of the nats service (`{{ $labels.stage }}` stage) has
        not received any traffic in the past 30m
      description: |
        JetStream provides persistent message streaming for event processing across GitLab.

        This alert signifies that the SLI is reporting a cessation of traffic; the signal is present, but is zero.
      grafana_dashboard_id: nats-main/nats-overview
      grafana_dashboard_link: https://dashboards.gitlab.net/d/nats-main/nats-overview?from=now-6h/m&to=now-1m/m&var-environment={{
        $labels.environment }}&var-stage={{ $labels.stage }}
      grafana_datasource_id: mimir-analytics-eventsdot
      grafana_min_zoom_hours: "6"
      grafana_panel_id: "3331379972"
      grafana_variables: environment,stage
      promql_template_1: |
        sum by (env,environment,tier,stage) (
          rate(nats_stream_total_messages{container="prom-exporter",environment="{{ $labels.environment }}",stage="{{ $labels.stage }}"}[5m])
        )
      runbook: nats/#alerts
    labels:
      aggregation: component
      alert_class: traffic_cessation
      alert_type: cause
      feature_category: not_owned
      rules_domain: general
      severity: s3
      sli_type: ops
      slo_alert: "no"
      user_impacting: "no"
    expr: |
      gitlab_component_ops:rate_30m{component="jetstream",monitor="global",stage="main",type="nats"} == 0
      and
      gitlab_component_ops:rate_30m{component="jetstream",monitor="global",stage="main",type="nats"} offset 1h >= 0.16666666666666666
  - alert: NatsServiceJetstreamTrafficAbsent
    for: 30m
    annotations:
      title: The jetstream SLI of the nats service (`{{ $labels.stage }}` stage) has
        not reported any traffic in the past 30m
      description: |
        JetStream provides persistent message streaming for event processing across GitLab.

        This alert signifies that the SLI was previously reporting traffic, but is no longer - the signal is absent.

        This could be caused by a change to the metrics used in the SLI, or by the service not receiving traffic.
      grafana_dashboard_id: nats-main/nats-overview
      grafana_dashboard_link: https://dashboards.gitlab.net/d/nats-main/nats-overview?from=now-6h/m&to=now-1m/m&var-environment={{
        $labels.environment }}&var-stage={{ $labels.stage }}
      grafana_datasource_id: mimir-analytics-eventsdot
      grafana_min_zoom_hours: "6"
      grafana_panel_id: "3331379972"
      grafana_variables: environment,stage
      promql_template_1: |
        sum by (env,environment,tier,stage) (
          rate(nats_stream_total_messages{container="prom-exporter",environment="{{ $labels.environment }}",stage="{{ $labels.stage }}"}[5m])
        )
      runbook: nats/#alerts
    labels:
      aggregation: component
      alert_class: traffic_cessation
      alert_type: cause
      feature_category: not_owned
      rules_domain: general
      severity: s3
      sli_type: ops
      slo_alert: "no"
      user_impacting: "no"
    expr: |
      gitlab_component_ops:rate_5m{component="jetstream",monitor="global",stage="main",type="nats"} offset 1h
      unless
      gitlab_component_ops:rate_5m{component="jetstream",monitor="global",stage="main",type="nats"}
  - alert: NatsServiceServerErrorSLOViolation
    for: 2m
    annotations:
      title: The server SLI of the nats service (`{{ $labels.stage }}` stage) has
        an error rate violating SLO
      description: |
        NATS is responsible for buffering of events generated across Gitlab.

        Currently the error-rate is {{ $value | humanizePercentage }}.
      grafana_dashboard_id: nats-main/nats-overview
      grafana_dashboard_link: https://dashboards.gitlab.net/d/nats-main/nats-overview?from=now-6h/m&to=now-1m/m&var-environment={{
        $labels.environment }}&var-stage={{ $labels.stage }}
      grafana_datasource_id: mimir-analytics-eventsdot
      grafana_min_zoom_hours: "6"
      grafana_panel_id: "1631973137"
      grafana_variables: environment,stage
      promql_template_1: |
        sum by (env,environment,tier,stage) (
          rate(nats_varz_slow_consumers{container="prom-exporter",environment="{{ $labels.environment }}",stage="{{ $labels.stage }}"}[5m])
        )
      runbook: nats/#alerts
    labels:
      aggregation: component
      alert_class: slo_violation
      alert_type: symptom
      feature_category: not_owned
      rules_domain: general
      severity: s3
      sli_type: error
      slo_alert: "yes"
      user_impacting: "no"
      window: 1h
    expr: |
      (
        (
          gitlab_component_errors:ratio_1h{component="server",monitor="global",type="nats"}
          > (14.4 * 0.050000)
        )
        and on (env,environment,tier,type,stage,component)
        (
          gitlab_component_errors:ratio_5m{component="server",monitor="global",type="nats"}
          > (14.4 * 0.050000)
        )
      )
      and on(env,environment,tier,type,stage,component)
      (
        sum by(env,environment,tier,type,stage,component) (gitlab_component_ops:rate_1h{component="server",monitor="global",type="nats"}) >= 1
      )
