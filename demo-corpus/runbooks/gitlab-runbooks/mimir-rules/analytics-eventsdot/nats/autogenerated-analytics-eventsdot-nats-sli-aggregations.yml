# WARNING. DO NOT EDIT THIS FILE BY HAND. USE ./mimir-rules-jsonnet/sli_aggregations.jsonnet TO GENERATE IT
# YOUR CHANGES WILL BE OVERRIDDEN
groups:
- name: 'SLI Aggregations: nats - jetstream - 5m burn-rate'
  interval: 1m
  rules:
  - record: sli_aggregations:nats_consumer_num_redelivered:rate_5m
    expr: |
      sum by (component,container,env,environment,feature_category,fqdn,product_stage,region,shard,stage,stage_group,tier,type) (
        rate(nats_consumer_num_redelivered{container=~"prom-exporter",type=~"nats"}[5m])
      )
  - record: sli_aggregations:nats_stream_total_messages:rate_5m
    expr: |
      sum by (component,container,env,environment,feature_category,fqdn,product_stage,region,shard,stage,stage_group,tier,type) (
        rate(nats_stream_total_messages{container=~"prom-exporter",type=~"nats"}[5m])
      )
- name: 'SLI Aggregations: nats - server - 5m burn-rate'
  interval: 1m
  rules:
  - record: sli_aggregations:nats_varz_in_msgs:rate_5m
    expr: |
      sum by (component,container,env,environment,feature_category,fqdn,product_stage,region,shard,stage,stage_group,tier,type) (
        rate(nats_varz_in_msgs{container=~"prom-exporter",type=~"nats"}[5m])
      )
  - record: sli_aggregations:nats_varz_slow_consumers:rate_5m
    expr: |
      sum by (component,container,env,environment,feature_category,fqdn,product_stage,region,shard,stage,stage_group,tier,type) (
        rate(nats_varz_slow_consumers{container=~"prom-exporter",type=~"nats"}[5m])
      )
