# See ../docs/uncategorized/pingdom.md for details of how to use this
unique_tag: pingdom-automated
defaults:
  timeout_ms: 2000
integrations:
  - name: pagerduty
    id: 139568
  - name: incident-io
    id: 143050
checks:
  - url: https://gitlab.com/users/sign_in
    timeout_ms: 20000
    resolution_minutes: 5
    notify_when_restored: true
    tags:
      - web
      - patroni
      - sla
    teams:
      - Infrastructure
    integrations:
      - pagerduty
      - incident-io

  - url: https://gitlab.com/gitlab-org/gitlab-foss/-/tree/master
    timeout_ms: 20000
    resolution_minutes: 5
    notify_when_restored: true
    tags:
      - web
      - gitaly
      - patroni
      - sla
    teams:
      - Infrastructure
    integrations:
      - pagerduty
      - incident-io

  - url: https://gitlab.com/gitlab-org/gitlab-foss/-/work_items
    timeout_ms: 20000
    resolution_minutes: 5
    notify_when_restored: true
    tags:
      - web
      - patroni
      - sla
    teams:
      - Infrastructure
    integrations:
      - pagerduty
      - incident-io

  - url: https://gitlab.com/api/v4/projects/13083 # GitLab-CE / GitLab-FOSS
    timeout_ms: 20000
    resolution_minutes: 5
    notify_when_restored: true
    tags:
      - api
      - patroni
      - sla
    teams:
      - Infrastructure
    integrations:
      - pagerduty
      - incident-io

  - url: https://gitlab.com/
    timeout_ms: 30000
    resolution_minutes: 5
    notify_when_restored: true
    tags:
      - web
      - sla
      - pingdom-exporter-check
    teams:
      - Infrastructure
    integrations:
      - pagerduty
      - incident-io

  - url: https://staging.gitlab.com/
    timeout_ms: 30000
    resolution_minutes: 5
    notify_when_restored: true
    tags:
      - web
      - staging
      - pingdom-exporter-check
    teams:
      - Infrastructure

  - url: http://gitlab.org/
    timeout_ms: 30000
    resolution_minutes: 5
    notify_when_restored: true
    tags:
      - haproxy
      - pingdom-exporter-check
    teams:
      - Infrastructure
    integrations:
      - pagerduty
      - incident-io

  #######################################
  # registry.gitlab.com
  #######################################
  # Registry root URL will always return 200
  # if health check succeeds
  # https://github.com/docker/distribution/pull/874
  #######################################

  - url: https://registry.gitlab.com/
    timeout_ms: 5000
    resolution_minutes: 5
    notify_when_restored: true
    tags:
      - registry
      - sla
    teams:
      - Infrastructure
    integrations:
      - pagerduty
      - incident-io

  #######################################
  # about.gitlab.com
  #######################################

  - url: https://about.gitlab.com/
    timeout_ms: 30000
    resolution_minutes: 5
    notify_when_restored: true
    tags:
      - about-gitlab
    teams:
      - Infrastructure
    integrations:
      - pagerduty
      - incident-io

  - url: http://about.gitlab.com/
    timeout_ms: 30000
    resolution_minutes: 5
    notify_when_restored: true
    tags:
      - about-gitlab
    teams:
      - Infrastructure
    integrations:
      - pagerduty
      - incident-io

  #######################################
  # Cloudflare monitoring
  #######################################

  # Integrations disabled before rollout

  - url: https://gitlab.com/cdn-cgi/trace
    timeout_ms: 30000
    resolution_minutes: 5
    notify_when_restored: true
    tags:
      - cloudflare
      - pingdom-exporter-check
    teams:
      - Infrastructure
  # integrations:
  #   - pagerduty

  - url: https://staging.gitlab.com/cdn-cgi/trace
    timeout_ms: 30000
    resolution_minutes: 5
    notify_when_restored: true
    tags:
      - cloudflare
      - pingdom-exporter-check
    teams:
      - Infrastructure
  # integrations:
  #   - pagerduty

  - url: https://health-check.cdn.web-ide.gitlab-static.net/-/ping
    timeout_ms: 20000
    resolution_minutes: 5
    notify_when_restored: true
    tags:
      - cloudflare
    teams:
      - Infrastructure
    integrations:
      - pagerduty
      - incident-io

  #######################################
  # Ancillary Properties
  #######################################

  - url: https://ir.gitlab.com/
    timeout_ms: 30000
    resolution_minutes: 5
    notify_when_restored: true
    tags:
      - ir-gitlab
    teams:
      - Infrastructure
    integrations:
      - pagerduty
      - incident-io

  - url: https://version.gitlab.com/
    timeout_ms: 30000
    resolution_minutes: 5
    notify_when_restored: true
    tags:
