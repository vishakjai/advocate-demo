    friendly_name: Git Access
    teams:
      - create
      - deploy
      - geo
      - gitaly
      - manage
      - plan
    label: Git
    owner: reliability_unowned
    business:
      SLA:
        overall_sla_weighting: 5 # If this exists, this service will be included in the overall SLA, using this value as a weighted average
    technical:
      project:
        - https://gitlab.com/gitlab-org/gitlab-shell # SSH
        - https://gitlab.com/gitlab-org/gitlab-workhorse # HTTP
      documents:
        architecture: https://about.gitlab.com/handbook/engineering/infrastructure-platforms/production-architecture/#infra-current-archi-diagram
        sre_guide: https://runbooks.gitlab.com/git/
