# For each entry in services, a label is automatically created by the
# `reconcile_service_catalog_labels` job in CI when a service label does not
# already exist.
#
# The label name can be customized using the `label` field, which will
# automatically convert to scoped label, e.g. `Service::my-service`.
#
# The full list of service labels can be viewed under
# https://gitlab.com/groups/gitlab-com/gl-infra/-/labels?search=Service%3A%3A&sort=created_desc.
#
# You can check the schema for a service in https://gitlab-com.gitlab.io/runbooks/service-catalog-schema.html,
# and read more about it in https://gitlab.com/gitlab-com/runbooks/-/blob/master/services/README.md#schema
services:
  - name: amp
    tier: inf
    label: Amp
    friendly_name: Amp
    owner: cells_infrastructure
    technical:
      project:
        - https://gitlab.com/gitlab-com/gl-infra/gitlab-dedicated/amp/
      documents:
        architecture: https://gitlab.com/gitlab-com/gl-infra/gitlab-dedicated/team/-/tree/main/architecture
        sre_guide: https://runbooks.gitlab.com//cells/amp/
      logging:
        - name: cellsdev
          permalink: https://console.cloud.google.com/logs/query?project=amp-b6f1
        - name: cellsprod
          permalink: https://console.cloud.google.com/logs/query?project=amp-3c0d
  - name: api
    friendly_name: GitLab API
    tier: sv
    teams:
      - create
      - deploy
      - geo
      - gitaly
      - manage
      - plan
    label: API
    owner: api
    business:
      SLA:
        overall_sla_weighting: 5 # If this exists, this service will be included in the overall SLA, using this value as a weighted average
    technical:
      project:
        - https://gitlab.com/gitlab-org/gitlab-ce
        - https://gitlab.com/gitlab-org/gitlab-ee
      documents:
        architecture: https://about.gitlab.com/handbook/engineering/infrastructure-platforms/production-architecture/#service-architecture
        readiness_review: https://gitlab.com/gitlab-com/gl-infra/readiness/-/tree/master/api-k8s-migration
        sre_guide: https://runbooks.gitlab.com/api/
        developer_guide: https://docs.gitlab.com/ee/development/api_styleguide.html
        service:
          - https://docs.gitlab.com/ce/api/
          - https://docs.gitlab.com/ee/api/
      dependencies:
        - service: consul
        - service: postgres
        - service: gitaly
        - service: redis
      logging:
        - name: Rails
          permalink: https://log.gprd.gitlab.net/goto/f61f543b668c26f2dcdb8a0eb06e2edb
        - name: Workhorse
          permalink: https://log.gprd.gitlab.net/goto/66979d90ca195652b7a4d10d22ca2db7
        - name: Kubernetes
          permalink: https://log.gprd.gitlab.net/goto/88eab835042a07b213b8c7f24213d5bf
    observability:
      monitors:
        primary_grafana_dashboard: api-main/api-overview
        sentry_slug: gitlab/gitlabcom/?query=program%3A%22rails%22

