    - interval: 1m
      name: GitLab Saturation Alerts
      rules:
        - alert: component_saturation_slo_out_of_bounds:pending_builds
          annotations:
            description: |+
                This means that this resource is running close to capacity and is at risk of exceeding its current capacity limit.

                Details of the Hosted Runner Manager Concurrency Limit resource:

                Hosted Runner Manager Concurrency Limit.

                For more information, see: https://runbooks.gitlab.com/hosted-runners/#alerts

            grafana_dashboard_id: alerts-gitlab_runner_concurrent
            grafana_dashboard_link: https://dashboards.gitlab.net/d/alerts-gitlab_runner_concurrent?from=now-6h/m&to=now-1m/m&var-type={{ $labels.type }}
            grafana_min_zoom_hours: "6"
            grafana_panel_id: "1133763935"
            grafana_variables: type
            promql_query: |
                max by(hosted-runners,shard) (
                  clamp_min(
                    clamp_max(
                      (
                        sum by (shard, type) (gitlab_runner_jobs)
                      /
                        sum by (shard, type) (gitlab_runner_concurrent)
                      )
                      ,
                      1)
                  ,
                  0)
                )
            promql_template_1: |
                max by(hosted-runners,shard) (
                  clamp_min(
                    clamp_max(
                      (
                        sum by (shard, type) (gitlab_runner_jobs)
                      /
                        sum by (shard, type) (gitlab_runner_concurrent)
                      )
                      ,
                      1)
                  ,
                  0)
                )
            runbook: '{{ $labels.type }}/'
            title: The Hosted Runner Manager Concurrency Limit resource of the {{ $labels.type }} service has a saturation exceeding SLO and is close to its capacity limit.
          expr: |
            gitlab_component_saturation:ratio{component="pending_builds"} > on(component) group_left
            slo:max:hard:gitlab_component_saturation:ratio{component="pending_builds"}
          for: 5m
          labels:
            alert_type: cause
            pager: pagerduty
            rules_domain: general
            severity: s2
    - interval: 1m
      name: 'Custom Alerts: hosted-runners'
      rules:
        - alert: HostedRunnersServiceRunnerManagerDownSingleShard
          annotations:
            description: The runner manager in HostedRunnersService has disconnected for a single shard. This may impact job scheduling for that shard.
            runbook: hosted-runners/
          expr: gitlab_component_shard_ops:rate_5m{component="api_requests",type="hosted-runners"} == 0
          for: 5m
          labels:
            alert_type: cause
            severity: s1
