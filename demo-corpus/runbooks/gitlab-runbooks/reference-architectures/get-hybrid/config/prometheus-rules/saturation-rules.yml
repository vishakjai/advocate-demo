# WARNING. DO NOT EDIT THIS FILE BY HAND. RUN ./scripts/generate-all-reference-architecture-configs.sh TO GENERATE IT. YOUR CHANGES WILL BE OVERRIDDEN
groups:
- interval: 1m
  name: Saturation Rules (autogenerated)
  rules:
  - expr: |
      max by(shard,type) (
        clamp_min(
          clamp_max(
            1 - avg by (shard,type) (
              rate(node_cpu_seconds_total{mode="idle", type=~"gitaly|consul|praefect|secrets-manager"}[5m])
            )
            ,
            1)
        ,
        0)
      )
    labels:
      component: cpu
    record: gitlab_component_saturation:ratio
  - expr: |
      max by(shard,type) (
        clamp_min(
          clamp_max(
            1 - (
              node_filesystem_files_free{fstype=~"(ext.|xfs)", type=~"gitaly|consul|praefect|secrets-manager"}
              /
              node_filesystem_files{fstype=~"(ext.|xfs)", type=~"gitaly|consul|praefect|secrets-manager"}
            )
            ,
            1)
        ,
        0)
      )
    labels:
      component: disk_inodes
    record: gitlab_component_saturation:ratio
  - expr: |
      max by(shard,type) (
        clamp_min(
          clamp_max(
            (
              1 - node_filesystem_avail_bytes{fstype=~"ext.|xfs", type=~"gitaly|consul|praefect|secrets-manager"} / node_filesystem_size_bytes{fstype=~"ext.|xfs", type=~"gitaly|consul|praefect|secrets-manager"}
            )
            ,
            1)
        ,
        0)
      )
    labels:
      component: disk_space
    record: gitlab_component_saturation:ratio
  - expr: |
      quantile by(shard,type) (
        0.99,
        clamp_min(
          clamp_max(
            (
              container_memory_rss:labeled{container!="", container!="POD", shard="gitaly-throttled", type="sidekiq"}
              unless on(pod) (
                kube_pod_labels:labeled{label_gitlab_com_exclude_saturation_point=~"(^|.*[.])kube_container_rss_request([.].*|$)", type="sidekiq"}
              )
            )
            / on(container,deployment,pod,shard,type) group_left()
            max by(container,deployment,pod,shard,type) (
              kube_pod_container_resource_requests:labeled{container!="", resource="memory", shard="gitaly-throttled", type="sidekiq"} > 0
            )
            ,
            1)
        ,
        0)
      )
    labels:
      component: excluded_sidekiq_kube_container_rss_request
    record: gitlab_component_saturation:ratio
  - expr: |
      max by(shard,type) (
        clamp_min(
          clamp_max(
            sum by (fqdn,instance,region,shard,type) (
              go_goroutines{type=~"gitaly|praefect|secrets-manager"}
            )
            /
            250000
            ,
            1)
        ,
        0)
      )
    labels:
      component: go_goroutines
    record: gitlab_component_saturation:ratio
  - expr: |
      max by(shard,type) (
        clamp_min(
          clamp_max(
            max by (fqdn,shard,type) (
              go_memstats_alloc_bytes{type=~"gitaly|praefect|secrets-manager"}
            )
            /
            sum by (fqdn,shard,type) (
              node_memory_MemTotal_bytes{type=~"gitaly|praefect|secrets-manager"}
            )
            ,
            1)
        ,
        0)
      )
    labels:
      component: go_memory
    record: gitlab_component_saturation:ratio
  - expr: |
      max by(shard,type) (
        clamp_min(
          clamp_max(
            sum by (container,pod,shard,type) (
              rate(container_cpu_usage_seconds_total:labeled{container!="", container!="POD", type=~"consul|gitlab-shell|nginx|registry|sidekiq|webservice"}[5m])
              unless on(pod) (
                kube_pod_labels:labeled{label_gitlab_com_exclude_saturation_point=~"(^|.*[.])kube_container_cpu_limit([.].*|$)", type=~"consul|gitlab-shell|nginx|registry|sidekiq|webservice"}
              )
            )
            /
            sum by(container,pod,shard,type) (
              container_spec_cpu_quota:labeled{container!="", container!="POD", type=~"consul|gitlab-shell|nginx|registry|sidekiq|webservice"}
              /
              container_spec_cpu_period:labeled{container!="", container!="POD", type=~"consul|gitlab-shell|nginx|registry|sidekiq|webservice"}
            )
            ,
            1)
        ,
        0)
      )
    labels:
      component: kube_container_cpu_limit
    record: gitlab_component_saturation:ratio
  - expr: |
      max by(shard,type) (
        clamp_min(
          clamp_max(
            (
              container_memory_working_set_bytes:labeled{container!="", container!="POD", type=~"consul|gitlab-shell|registry"}
              unless on(pod) (
                kube_pod_labels:labeled{label_gitlab_com_exclude_saturation_point=~"(^|.*[.])kube_container_memory_limit([.].*|$)", type=~"consul|gitlab-shell|registry"}
              )
            )
            / on(container,deployment,pod,shard,type) group_left()
            max by(container,deployment,pod,shard,type) (
              kube_pod_container_resource_limits:labeled{container!="", resource="memory", type=~"consul|gitlab-shell|registry"} > 0
            )
            ,
            1)
        ,
        0)
      )
    labels:
      component: kube_container_memory_limit
    record: gitlab_component_saturation:ratio
  - expr: |
      quantile by(shard,type) (
        0.99,
        clamp_min(
          clamp_max(
            (
              container_memory_working_set_bytes:labeled{container!="", container!="POD", type=~"consul|gitlab-shell|registry|sidekiq"}
              unless on(pod) (
                kube_pod_labels:labeled{label_gitlab_com_exclude_saturation_point=~"(^|.*[.])kube_container_memory_request([.].*|$)", type=~"consul|gitlab-shell|registry|sidekiq"}
              )
            )
            / on(container,deployment,pod,shard,type) group_left()
            max by(container,deployment,pod,shard,type) (
              kube_pod_container_resource_requests:labeled{container!="", resource="memory", type=~"consul|gitlab-shell|registry|sidekiq"} > 0
            )
            ,
            1)
        ,
        0)
      )
    labels:
      component: kube_container_memory_request
    record: gitlab_component_saturation:ratio
  - expr: |
      max by(shard,type) (
        clamp_min(
          clamp_max(
            (
              container_memory_rss:labeled{container!="", container!="POD", type=~"nginx|sidekiq|webservice"}
              unless on(pod) (
                kube_pod_labels:labeled{label_gitlab_com_exclude_saturation_point=~"(^|.*[.])kube_container_rss_limit([.].*|$)", type=~"nginx|sidekiq|webservice"}
              )
            )
            / on(container,deployment,pod,shard,type) group_left()
            max by(container,deployment,pod,shard,type) (
              kube_pod_container_resource_limits:labeled{container!="", resource="memory", type=~"nginx|sidekiq|webservice"} > 0
            )
            ,
            1)
        ,
        0)
      )
    labels:
      component: kube_container_rss_limit
    record: gitlab_component_saturation:ratio
  - expr: |
      quantile by(shard,type) (
        0.99,
        clamp_min(
          clamp_max(
            (
              container_memory_rss:labeled{container!="", container!="POD", type=~"nginx|webservice"}
              unless on(pod) (
                kube_pod_labels:labeled{label_gitlab_com_exclude_saturation_point=~"(^|.*[.])kube_container_rss_request([.].*|$)", type=~"nginx|webservice"}
              )
            )
            / on(container,deployment,pod,shard,type) group_left()
            max by(container,deployment,pod,shard,type) (
              kube_pod_container_resource_requests:labeled{container!="", resource="memory", type=~"nginx|webservice"} > 0
            )
            ,
            1)
        ,
        0)
      )
    labels:
      component: kube_container_rss_request
    record: gitlab_component_saturation:ratio
  - expr: |
      max by(cluster,namespace,persistentvolumeclaim,shard) (
        clamp_min(
          clamp_max(
            kubelet_volume_stats_used_bytes
            /
            kubelet_volume_stats_capacity_bytes
            ,
            1)
        ,
        0)
      )
    labels:
      component: kube_persistent_volume_claim_disk_space
      stage: main
      tier: inf
      type: kube
    record: gitlab_component_saturation:ratio
  - expr: |
      max by(shard) (
        clamp_min(
          clamp_max(
            kubelet_volume_stats_inodes_used
            /
            kubelet_volume_stats_inodes
            ,
            1)
        ,
        0)
      )
    labels:
      component: kube_persistent_volume_claim_inodes
      stage: main
      tier: inf
      type: kube
    record: gitlab_component_saturation:ratio
  - expr: |
      max by(shard,type) (
        clamp_min(
          clamp_max(
            instance:node_memory_utilization:ratio{type=~"gitaly|consul|praefect|secrets-manager"} or instance:node_memory_utilisation:ratio{type=~"gitaly|consul|praefect|secrets-manager"}
            ,
            1)
        ,
        0)
      )
    labels:
      component: memory
    record: gitlab_component_saturation:ratio
  - expr: |
      max by(shard,type) (
        clamp_min(
          clamp_max(
            1 - avg by (shard,type) (
              rate(node_cpu_seconds_total{mode="idle", type=~".*pool"}[5m])
            )
            ,
            1)
        ,
        0)
      )
    labels:
      component: node_group_cpu
    record: gitlab_component_saturation:ratio
  - expr: |
      max by(shard,type) (
        clamp_min(
          clamp_max(
            avg without (cpu) (rate(node_schedstat_waiting_seconds_total{type=~"consul|gitaly|praefect|secrets-manager"}[1h]))
            ,
            1)
        ,
        0)
      )
    labels:
      component: node_schedstat_waiting
    record: gitlab_component_saturation:ratio
  - expr: |
      max by(shard,type) (
        clamp_min(
          clamp_max(
            sum by(shard,type) (avg_over_time(sum without (pid,worker) (puma_active_connections{type="webservice"})[1m:]))
            /
            sum by(shard,type) (sum without (pid,worker) (puma_max_threads{pid="puma_master", type="webservice"}))
            ,
            1)
        ,
        0)
      )
    labels:
      component: puma_workers
    record: gitlab_component_saturation:ratio
  - expr: |
      quantile by(shard,type) (
        0.99,
        clamp_min(
          clamp_max(
            (
              container_memory_rss:labeled{container!="", container!="POD", shard!~"gitaly-throttled", type="sidekiq"}
              unless on(pod) (
                kube_pod_labels:labeled{label_gitlab_com_exclude_saturation_point=~"(^|.*[.])kube_container_rss_request([.].*|$)", type="sidekiq"}
              )
            )
            / on(container,deployment,pod,shard,type) group_left()
            max by(container,deployment,pod,shard,type) (
              kube_pod_container_resource_requests:labeled{container!="", resource="memory", shard!~"gitaly-throttled", type="sidekiq"} > 0
            )
            ,
            1)
        ,
        0)
      )
    labels:
      component: sidekiq_kube_container_rss_request
    record: gitlab_component_saturation:ratio
  - expr: |
      max by(shard,type) (
        clamp_min(
          clamp_max(
            avg without(cpu, mode) (1 - rate(node_cpu_seconds_total{mode="idle", type=~"gitaly|consul|praefect|secrets-manager"}[5m]))
            ,
            1)
        ,
        0)
      )
    labels:
      component: single_node_cpu
    record: gitlab_component_saturation:ratio
